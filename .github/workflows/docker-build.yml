name: Spring Boot Docker Build & Push

# 1. 언제 이 스크립트가 실행될 것인가? (main 브랜치에 코드가 push 될 때)
on:
  push:
    branches: [ "main" ] # 본인의 기본 브랜치 이름(main 또는 master)에 맞게 확인하세요.

jobs:
  build:
    runs-on: ubuntu-latest # GitHub가 제공하는 가상 우분투 서버에서 실행됨

    steps:
    # 1. GitHub 레포지토리의 최신 코드 가져오기
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Java(JDK) 세팅 (자신의 스프링 부트 버전에 맞게 '17' 부분을 수정)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Gradle 빌드 권한 부여 및 빌드 실행 (테스트 코드가 꼬여서 빌드 실패하는 것을 막기 위해 -x test 추가)
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean build -x test

    # 4. 아까 설정한 Secrets를 이용해 Docker Hub 로그인
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    # 5. Docker 이미지 빌드 및 Docker Hub로 푸시(업로드)
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 주의: 아래 태그를 '본인도커아이디/이미지이름:latest' 형식으로 꼭 수정하세요!
        # 예시: ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-app:latest
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-app:latest