# ============================================================
# application-test.properties  |  BNK 테스트 환경 설정
#
# [수정 이력]
# 1. aes.secret-key 추가
#    AesCryptoUtil(@Value("${aes.secret-key}") 생성자 → 키 없으면 빈 초기화 실패
#    → MyBatisConfig(AesCryptoUtil 의존) → SqlSessionFactory 실패 → 전 컨텍스트 붕괴
#
# 2. Mail AutoConfiguration exclude 추가
#    spring.mail.* 값 없으면 MailSenderAutoConfiguration이 실패 빈 생성
#
# 3. H2 DataSource 명시 (MyBatisConfig.sqlSessionFactory가 DataSource 파라미터 요구)
# ============================================================

# ── DataSource (H2 인메모리) ──────────────────────────────────
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# ── AutoConfiguration Exclude ────────────────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration

# ── AES 암호화 키 (필수) ──────────────────────────────────────
# AesCryptoUtil 생성자: @Value("${aes.secret-key}")
# 이 값이 없으면 MyBatisConfig -> SqlSessionFactory -> 전 컨텍스트 실패
aes.secret-key=TestAesSecretKey32BytesForJUnit!!

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=BnkCardSystemSecretKey2024!@#$%^&*
jwt.access-expiration=7200000
jwt.refresh-expiration=604800000

# ── Cookie ───────────────────────────────────────────────────
cookie.secure=false

# ── AI ───────────────────────────────────────────────────────
spring.ai.google.genai.project-id=gen-lang-client-0998457737
spring.ai.google.genai.api-key=AIzaSyD1qOdIPZBWjVR9r28J5C64ViQEDLU7opw
spring.ai.ollama.chat.enabled=false
spring.ai.ollama.embedding.enabled=false

spring.ai.google.genai.embedding.project-id=dummy
spring.ai.google.genai.embedding.api-key=dummy

# ── Scheduling / Logging ─────────────────────────────────────
spring.task.scheduling.enabled=false
logging.level.org.springframework.ai=DEBUG
logging.level.com.google.ai.client.generativeai=DEBUG

# ── OCI (ObjectStorageConfig @Profile("!test") 제외됨, 값만 선언) ──
oci.auth.type=simple
oci.private-key-path=
oci.namespace=
oci.bucket-name=
oci.region=ap-chuncheon-1

# ── CI Salt ──────────────────────────────────────────────────
ci.salt=TestCiSaltForJUnit2025
