# =============================================================
# application.properties  |  BNK 부산은행 카드 플랫폼
# 민감 정보(시크릿, 비밀번호, API 키)는 application-local.properties 에 위치
# spring.profiles.active=local → application-local.properties 자동 로드
# =============================================================
spring.profiles.active=local

spring.application.name=BNKcard
server.forward-headers-strategy=framework
# =============================================================
# DataSource (실제 값은 application-local.properties 에서 override)
# =============================================================
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000

# =============================================================
# MyBatis
# =============================================================
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=com.bnk.domain.**.model
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-statement-timeout=30
mybatis.configuration.cache-enabled=false

# =============================================================
# Server / Encoding
# =============================================================
server.port=8088
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true
app.base-url=http://localhost:8088

# =============================================================
# JWT
# [주의] Spring Boot 4.x (Spring Framework 7) PlaceholderParser 변경으로
#        spring.profiles.active=local 활성 시 base 파일의 빈값 속성이 있으면
#        플레이스홀더 resolve 불안정 → 실제 값은 application-local.properties 에 선언
# =============================================================
jwt.secret=
jwt.access-expiration=7200000
jwt.refresh-expiration=604800000

# =============================================================
# AES / CORS / Cookie
# =============================================================
aes.secret-key=
# 로컬
cors.allowed-origins=http://localhost:8088,http://localhost:8089,http://localhost:3000,https://bnkcard.store,https://www.bnkcard.store,http://bnkcard.store,http://www.bnkcard.store
# 운영
# cors.allowed-origins=https://도메인.store
cookie.secure=false

# =============================================================
# Redis (MemoryTokenStore → RedisTokenStore 전환)
# 실제 host/port/password 는 application-local.properties 에서 override
# =============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=1000ms
spring.data.redis.enabled=false

# =============================================================
# Logging
# =============================================================
logging.level.com.bnk=DEBUG
logging.level.org.mybatis=DEBUG

# =============================================================
# AI — Vectorstore (Qdrant)
# =============================================================
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=bnkcard
spring.ai.vectorstore.qdrant.use-tls=false
spring.ai.vectorstore.qdrant.initialize-schema=true

# =============================================================
# AI — Ollama (로컬 임베딩)
# =============================================================
ai.enabled=true
#spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.embedding.enabled=true
#spring.ai.ollama.embedding.options.model=bge-m3
#spring.ai.ollama.chat.enabled=false

# =============================================================
# AI — Google GenAI (실제 키는 application-local.properties)
# =============================================================
spring.ai.google.genai.api-key=
spring.ai.google.genai.project-id=

spring.ai.google.genai.embedding.enabled=false
spring.ai.google.genai.embedding.options.model=text-embedding-004
spring.ai.google.genai.embedding.api-key=
spring.ai.google.genai.embedding.project-id=

spring.ai.google.genai.chat.enabled=true
# Gemini 2.5 Flash (기본)
spring.ai.google.genai.chat.model=gemini-2.5-flash
# Gemma 4 26B
#spring.ai.google.genai.chat.model=gemma-4-26b-a4b-it
# Gemma 4 31B
#spring.ai.google.genai.chat.model=google/gemma-4-31B-it

# =============================================================
# OCI Object Storage (실제 값은 application-local.properties)
# =============================================================
oci.tenancy-id=
oci.user-id=
oci.fingerprint=
oci.private-key-path=
oci.region=
oci.bucket-name=
oci.namespace=

# =============================================================
# Mail (실제 계정은 application-local.properties)
# =============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.username=
spring.mail.password=
mail.from.name=BNK\uce74\ub4dc

# =============================================================
# File Upload
# =============================================================
file.upload-dir=C:/upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
spring.servlet.multipart.enabled=true