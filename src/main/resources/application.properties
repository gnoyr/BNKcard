# Load local settings (application-local.properties)
spring.profiles.active=local

spring.application.name=BNKcard

spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=com.bnk.domain.**.model
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-statement-timeout=30
mybatis.configuration.cache-enabled=false

server.port=8080
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true

jwt.secret=
jwt.access-expiration=7200000
jwt.refresh-expiration=604800000

aes.secret-key=
cors.allowed-origins=http://localhost:8088,http://localhost:8089,http://localhost:3000

cookie.secure=false

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Logging
logging.level.com.bnk=DEBUG
logging.level.org.mybatis=DEBUG

# Vectorstore
spring.ai.vectorstore.qdrant.host=140.245.76.237
spring.ai.vectorstore.qdrant.port=6333
spring.ai.vectorstore.qdrant.collection-name=bnkcard
spring.ai.vectorstore.qdrant.use-tls=false

# ── Gmail SMTP ─────────────────────────────────────────────
# Gmail 계정의 앱 비밀번호를 사용하세요 (Google 계정 → 보안 → 2단계 인증 → 앱 비밀번호)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
 
# 발송자 표시명
mail.from.name=BNK카드