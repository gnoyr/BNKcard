# =============================================================
# application.properties  |  BNK 부산은행 카드 플랫폼
#
# [운영 배포 방식]
#   민감 값은 Docker 환경변수로 주입 (application-local.properties 미사용)
#   예) SPRING_DATASOURCE_URL, JWT_SECRET, AES_SECRET_KEY 등
#
# [보안 패치] 2026-06-08
#   - cookie.secure=true (운영 HTTPS 필수)
#   - cors.allowed-origins 운영 도메인만 허용
#   - springdoc Swagger 비활성화
#   - server.forward-headers-strategy=framework (XFF 신뢰 프록시 한정)
# =============================================================

spring.profiles.active=local
spring.application.name=BNKcard

# =============================================================
# Proxy / Forward Header (XFF 스푸핑 방어 핵심 설정)
# Nginx가 X-Forwarded-For를 overwrite로 전달하고
# Spring이 신뢰 프록시 헤더만 수용하도록 framework 전략 사용
# =============================================================
server.forward-headers-strategy=framework

# =============================================================
# DataSource
# 실제 값: Docker 환경변수 SPRING_DATASOURCE_URL / USERNAME / PASSWORD
# =============================================================
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.hikari.idle-timeout=300000

# =============================================================
# MyBatis
# =============================================================
#mybatis.mapper-locations=classpath:mappers/**/*.xml
#mybatis.type-aliases-package=com.bnk.domain.**.model
#mybatis.configuration.map-underscore-to-camel-case=true
#mybatis.configuration.default-statement-timeout=30
#mybatis.configuration.cache-enabled=false

# =============================================================
# Server / Encoding
# =============================================================
server.port=8088
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true

# 운영: Docker 환경변수 APP_BASE_URL=https://www.bnkcard.store 로 override
app.base-url=http://localhost:8088

# =============================================================
# JWT
# 실제 값: Docker 환경변수 JWT_SECRET / JWT_ACCESS_EXPIRATION 등
# =============================================================
jwt.secret=
jwt.access-expiration=7200000
jwt.refresh-expiration=604800000

# =============================================================
# AES
# 실제 값: Docker 환경변수 AES_SECRET_KEY
# =============================================================
aes.secret-key=

# =============================================================
# CORS
# [보안 패치] 로컬 개발용은 주석 처리, 운영 도메인만 허용
# 운영: Docker 환경변수 CORS_ALLOWED_ORIGINS=https://bnkcard.store,https://www.bnkcard.store
# =============================================================
cors.allowed-origins=http://localhost:8088,http://localhost:8089,http://localhost:3000

# =============================================================
# Cookie
# [보안 패치] 운영은 반드시 true (HTTPS에서만 쿠키 전송)
# 운영: Docker 환경변수 COOKIE_SECURE=true
# 로컬: false 유지
# =============================================================
cookie.secure=false

# =============================================================
# Redis
# 실제 값: Docker 환경변수 SPRING_DATA_REDIS_HOST / PORT / PASSWORD
# =============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=  ← 운영은 Docker 환경변수로 주입

# [보안 패치] 운영은 true 필수 (Rate Limit + RedisTokenStore 활성화)
# 운영: Docker 환경변수 SPRING_DATA_REDIS_ENABLED=true
spring.data.redis.enabled=false

# =============================================================
# Springdoc / Swagger
# 운영 환경에서 API 명세 외부 노출 차단
# 운영: Docker 환경변수로 아래 두 값을 false 주입
#   SPRINGDOC_API_DOCS_ENABLED=false
#   SPRINGDOC_SWAGGER_UI_ENABLED=false
# SecurityConfig에서 /swagger-ui/** → authenticated() 로 1차 차단
# 아래는 엔드포인트 자체를 비활성화하는 2차 방어
# =============================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# =============================================================
# AI (Google GenAI)
# 실제 값: Docker 환경변수 주입
# =============================================================
spring.ai.google.genai.chat.enabled=true
spring.ai.google.genai.chat.model=gemini-2.5-flash
spring.ai.google.genai.embedding.enabled=true
spring.ai.google.genai.embedding.api-key=
spring.ai.google.genai.embedding.project-id=
spring.ai.google.genai.embedding.options.model=text-embedding-004

# =============================================================
# OCI Object Storage
# 실제 값: Docker 환경변수 주입
# =============================================================
oci.auth.type=simple
oci.tenancy-id=
oci.user-id=
oci.fingerprint=
oci.private-key-path=
oci.region=
oci.bucket-name=
oci.namespace=

# =============================================================
# Mail
# 실제 값: Docker 환경변수 SPRING_MAIL_USERNAME / PASSWORD
# =============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.username=
spring.mail.password=
mail.from.name=BNK카드

# =============================================================
# File Upload
# =============================================================
file.upload-dir=/data/uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
spring.servlet.multipart.enabled=true

# =============================================================
# CI Salt
# 실제 값: Docker 환경변수 CI_SALT
# =============================================================
ci.salt=

# =============================================================
# Migration (일회성 — 완료 후 false 유지)
# =============================================================
migration.enabled=false