<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>비밀번호 변경 | 부산은행</title>
  <link rel="stylesheet" href="/css/mypage.css"/>
  <script src="/js/mypage.js" defer></script>
</head>
<body>

<header class="mp-header">
  <a href="/" class="mp-header__logo">🏦 부산은행</a>
  <button class="mp-header__back" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    뒤로
  </button>
</header>

<div class="page-wrap">

  <div class="page-title">
    <h1>비밀번호 변경</h1>
    <p>현재 비밀번호 확인 후 새 비밀번호로 변경합니다.</p>
  </div>

  <form id="pwForm" novalidate>
    <div class="card">
      <div class="card__head">비밀번호 변경</div>

      <!-- 현재 비밀번호 -->
      <div class="form-group">
        <label class="form-label" for="currentPw">현재 비밀번호 <span class="req">*</span></label>
        <div class="pw-field">
          <input class="form-control" type="password" id="currentPw"
                 placeholder="현재 비밀번호 입력" autocomplete="current-password"/>
          <button type="button" class="pw-eye" data-target="currentPw" aria-label="표시/숨기기"></button>
        </div>
        <span class="form-error" id="currentPw-err"></span>
      </div>

      <hr style="border:none;border-top:1px solid var(--gray-100);margin:18px 0;"/>

      <!-- 새 비밀번호 -->
      <div class="form-group">
        <label class="form-label" for="newPw">새 비밀번호 <span class="req">*</span></label>
        <div class="pw-field">
          <input class="form-control" type="password" id="newPw"
                 placeholder="새 비밀번호 입력" autocomplete="new-password"/>
          <button type="button" class="pw-eye" data-target="newPw" aria-label="표시/숨기기"></button>
        </div>

        <!-- 강도 바 (입력 시 표시) -->
        <div class="pw-strength" id="strengthWrap" style="display:none;">
          <div class="pw-strength__bar">
            <div class="pw-strength__fill" id="strengthFill"></div>
          </div>
          <span class="pw-strength__text" id="strengthText"></span>
        </div>

        <span class="form-error" id="newPw-err"></span>

        <!-- 비밀번호 규칙 안내 -->
        <ul class="pw-rules" id="pwRules">
          <li data-rule="length">✗ 8~50자 이내</li>
          <li data-rule="letter">✗ 영문 포함</li>
          <li data-rule="number">✗ 숫자 포함</li>
          <li data-rule="special">✗ 특수문자 포함 (@$!%*#?&amp;)</li>
        </ul>
      </div>

      <!-- 새 비밀번호 확인 -->
      <div class="form-group">
        <label class="form-label" for="confirmPw">새 비밀번호 확인 <span class="req">*</span></label>
        <div class="pw-field">
          <input class="form-control" type="password" id="confirmPw"
                 placeholder="새 비밀번호 재입력" autocomplete="new-password"/>
          <button type="button" class="pw-eye" data-target="confirmPw" aria-label="표시/숨기기"></button>
        </div>
        <span class="form-error" id="confirmPw-err"></span>
      </div>
    </div>

    <!-- 액션 버튼 -->
    <div class="form-actions">
      <a href="/mypage/index.html" class="btn btn-outline">취소</a>
      <button type="submit" class="btn btn-primary" id="submitBtn">변경 완료</button>
    </div>
  </form>

</div>

<!-- 변경 완료 모달 -->
<div class="modal-overlay" id="doneModal">
  <div class="modal">
    <div class="modal__title">🔒 비밀번호 변경 완료</div>
    <div class="modal__body">
      비밀번호가 성공적으로 변경되었습니다.<br><br>
      보안을 위해 <strong>다른 기기 세션은 자동으로 종료</strong>되었으며,<br>
      현재 기기는 계속 이용하실 수 있습니다.
    </div>
    <div class="modal__actions">
      <button class="btn btn-primary btn-block" id="doneOk">확인</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const { API, Toast, V, btnLoading, initPwEyes } = MP;

  initPwEyes();

  const form      = document.getElementById('pwForm');
  const submitBtn = document.getElementById('submitBtn');
  const newPw     = document.getElementById('newPw');
  const confirmPw = document.getElementById('confirmPw');

  // ── 규칙 정의 ──
  const rules = {
    length:  { test: v => v.length >= 8 && v.length <= 50 },
    letter:  { test: v => /[A-Za-z]/.test(v) },
    number:  { test: v => /\d/.test(v) },
    special: { test: v => /[@$!%*#?&]/.test(v) },
  };
  document.querySelectorAll('#pwRules li').forEach(li => {
    rules[li.dataset.rule].el = li;
  });

  // ── 새 비밀번호 실시간 체크 ──
  newPw.addEventListener('input', () => {
    const v = newPw.value;
    document.getElementById('strengthWrap').style.display = v ? 'block' : 'none';

    let score = 0;
    Object.values(rules).forEach(r => {
      const pass = r.test(v); if (pass) score++;
      if (r.el) {
        r.el.classList.toggle('pass', pass);
        r.el.textContent = r.el.textContent.replace(/^[✓✗]\s/, (pass ? '✓ ' : '✗ '));
      }
    });

    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    fill.className = 'pw-strength__fill';
    if (score <= 1) { fill.classList.add('fill-weak');   text.textContent = '보안 강도: 약함'; }
    else if (score <= 3) { fill.classList.add('fill-medium'); text.textContent = '보안 강도: 보통'; }
    else             { fill.classList.add('fill-strong'); text.textContent = '보안 강도: 강함'; }

    V.setErr('newPw', '');
  });

  // 확인 필드 실시간 일치 체크
  confirmPw.addEventListener('input', () => {
    if (confirmPw.value) V.setErr('confirmPw', V.match(newPw.value, confirmPw.value));
  });

  // ── 폼 제출 ──
  form.addEventListener('submit', async e => {
    e.preventDefault();
    let ok = true;

    if (!V.setErr('currentPw',  V.required(document.getElementById('currentPw').value, '현재 비밀번호를 입력해주세요.'))) ok = false;
    if (!V.setErr('newPw',      V.password(newPw.value))) ok = false;
    if (ok && !V.setErr('confirmPw', V.match(newPw.value, confirmPw.value))) ok = false;
    if (!ok) return;

    btnLoading(submitBtn, true);
    try {
      await API.patch('/api/users/me/password', {
        currentPassword:    document.getElementById('currentPw').value,
        newPassword:        newPw.value,
        newPasswordConfirm: confirmPw.value,
      });

      Toast.success('비밀번호가 변경되었습니다.');
      setTimeout(() => {
        document.getElementById('doneModal').classList.add('open');
      }, 500);
    } catch (err) {
      if (err.message?.includes('비밀번호')) {
        V.setErr('currentPw', err.message);
      } else {
        Toast.error(err.message || '변경 중 오류가 발생했습니다.');
      }
    } finally {
      btnLoading(submitBtn, false);
    }
  });

  // 완료 모달 확인 버튼
  document.getElementById('doneOk').onclick = () => {
    window.location.href = '/mypage/index.html';
  };
});
</script>
</body>
</html>
