<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>비밀번호 변경 | 부산은행</title>
<link rel="stylesheet" href="/css/mypage.css" />
<link rel="stylesheet" href="/css/components.css" />
<link rel="stylesheet" href="/css/teal-theme.css" />
</head>
<body>

	<div id="app-header"></div>

	<nav class="page-nav">
		<button class="page-nav__back" onclick="history.back()">마이페이지</button>
		<span class="page-nav__sep">›</span>
		<span class="page-nav__title">비밀번호 변경</span>
	</nav>

	<div class="page-wrap">
		<div class="page-title">
			<h1>비밀번호 변경</h1>
			<p>현재 비밀번호 확인 후 새 비밀번호로 변경합니다.</p>
		</div>

		<form id="pwForm" novalidate>
			<div class="card">
				<div class="card__head">비밀번호 변경</div>

				<div class="form-group">
					<label class="form-label" for="currentPw">
						현재 비밀번호 <span class="req">*</span>
					</label>
					<div class="pw-field">
						<input class="form-control" type="password" id="currentPw"
							placeholder="현재 비밀번호" autocomplete="current-password" />
						<button type="button" class="pw-toggle" data-target="currentPw">표시</button>
					</div>
					<span class="form-error" id="currentPw-err"></span>
				</div>

				<hr class="form-divider" />

				<div class="form-group">
					<label class="form-label" for="newPw">
						새 비밀번호 <span class="req">*</span>
					</label>
					<div class="pw-field">
						<input class="form-control" type="password" id="newPw"
							placeholder="새 비밀번호" autocomplete="new-password" />
						<button type="button" class="pw-toggle" data-target="newPw">표시</button>
					</div>

					<div class="strength-wrap" id="strengthWrap" hidden=hidden>
						<div class="strength-bar">
							<div class="strength-fill" id="strengthFill"></div>
						</div>
						<span class="strength-label" id="strengthLabel"></span>
					</div>

					<span class="form-error" id="newPw-err"></span>

					<ul class="pw-rules" id="pwRules">
						<li data-rule="length">✗ 8~50자 이내</li>
						<li data-rule="letter">✗ 영문 포함</li>
						<li data-rule="number">✗ 숫자 포함</li>
						<li data-rule="special">✗ 특수문자 포함</li>
					</ul>
				</div>

				<div class="form-group">
					<label class="form-label" for="confirmPw">
						새 비밀번호 확인 <span class="req">*</span>
					</label>
					<div class="pw-field">
						<input class="form-control" type="password" id="confirmPw"
							placeholder="새 비밀번호 재입력" autocomplete="new-password" />
						<button type="button" class="pw-toggle" data-target="confirmPw">표시</button>
					</div>
					<span class="form-error" id="confirmPw-err"></span>
				</div>
			</div>

			<div class="form-actions">
				<a href="/mypage/index.html" class="btn btn-outline">취소</a>
				<button type="submit" class="btn btn-primary" id="submitBtn">변경하기</button>
			</div>
		</form>

		<!-- 완료 모달 -->
		<div class="modal-overlay" id="doneModal">
			<div class="modal">
				<div class="modal__title">비밀번호 변경 완료</div>
				<div class="modal__body">비밀번호가 성공적으로 변경되었습니다.</div>
				<div class="modal__footer">
					<button class="btn btn-primary btn-block" id="doneOk">확인</button>
				</div>
			</div>
		</div>
	</div>

	<div id="toast-container"></div>
	<script type="/js/utils.js"></script>
	<script src="/js/header.js"></script>
	<script src="/js/mypage.js"></script>
</body>
</html>
