<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 변경 | 부산은행</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/mypage.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
</head>
<body data-page="mypage-password">

  <nav class="sub-nav" aria-label="페이지 이동">
    <button class="sub-nav__back" type="button">마이페이지</button>
    <span class="sub-nav__sep" aria-hidden="true">›</span>
    <span class="sub-nav__title" aria-current="page">비밀번호 변경</span>
  </nav>

  <main class="page-wrap">

    <header class="page-title">
      <h1>비밀번호 변경</h1>
      <p>현재 비밀번호 확인 후 새 비밀번호로 변경합니다.</p>
    </header>

    <form class="card" id="pwForm" novalidate>
      <h2 class="card__head">비밀번호 변경</h2>

      <div class="form-group">
        <label class="form-label" for="currentPw">현재 비밀번호 <span class="req" aria-label="필수">*</span></label>
        <span class="pw-field">
          <input class="form-control" type="password" id="currentPw"
                 placeholder="현재 비밀번호" autocomplete="current-password">
          <button type="button" class="pw-toggle" data-target="currentPw">표시</button>
        </span>
        <span class="form-error" id="currentPw-err" role="alert"></span>
      </div>

      <hr class="form-divider">

      <div class="form-group">
        <label class="form-label" for="newPw">새 비밀번호 <span class="req" aria-label="필수">*</span></label>
        <span class="pw-field">
          <input class="form-control" type="password" id="newPw"
                 placeholder="새 비밀번호" autocomplete="new-password">
          <button type="button" class="pw-toggle" data-target="newPw">표시</button>
        </span>
        <span class="strength-wrap" id="strengthWrap" hidden>
          <span class="strength-bar"><span class="strength-fill" id="strengthFill"></span></span>
          <span class="strength-label" id="strengthLabel"></span>
        </span>
        <span class="form-error" id="newPw-err" role="alert"></span>
        <ul class="pw-rules" id="pwRules" aria-label="비밀번호 조건">
          <li data-rule="length">8~50자 이내</li>
          <li data-rule="letter">영문 포함</li>
          <li data-rule="number">숫자 포함</li>
          <li data-rule="special">특수문자 포함</li>
        </ul>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPw">새 비밀번호 확인 <span class="req" aria-label="필수">*</span></label>
        <span class="pw-field">
          <input class="form-control" type="password" id="confirmPw"
                 placeholder="새 비밀번호 재입력" autocomplete="new-password">
          <button type="button" class="pw-toggle" data-target="confirmPw">표시</button>
        </span>
        <span class="form-error" id="confirmPw-err" role="alert"></span>
      </div>

      <div class="form-actions">
        <a href="/mypage" class="btn btn-outline">취소</a>
        <button type="submit" class="btn btn-primary" id="submitBtn">변경하기</button>
      </div>
    </form>

  </main>

  <!-- 완료 모달 -->
  <div class="modal-overlay" id="doneModal"
       role="dialog" aria-modal="true" aria-labelledby="doneModalTitle" hidden>
    <div class="modal">
      <h2 class="modal__title" id="doneModalTitle">비밀번호 변경 완료</h2>
      <p class="modal__body">비밀번호가 성공적으로 변경되었습니다.</p>
      <div class="modal__footer">
        <button class="btn btn-primary btn-block" id="doneOk" type="button">확인</button>
      </div>
    </div>
  </div>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/mypage.js"></script>
</body>
</html>
