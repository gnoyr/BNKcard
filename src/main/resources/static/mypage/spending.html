<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>소비 패턴 관리 | 부산은행</title>
  <link rel="stylesheet" href="/css/mypage.css"/>
  <script src="/js/mypage.js" defer></script>
</head>
<body>

<header class="mp-header">
  <a href="/" class="mp-header__logo">🏦 부산은행</a>
  <button class="mp-header__back" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    뒤로
  </button>
</header>

<div class="page-wrap">
  <div class="page-title">
    <h1>소비 패턴 관리</h1>
    <p>카테고리별 월 지출 금액을 입력하면 소비 패턴 차트에 반영됩니다.</p>
  </div>

  <div class="alert alert-info">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" style="flex-shrink:0;margin-top:1px">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span>입력한 금액은 <strong>수동(MANUAL)</strong> 출처로 저장되며 메인 차트에 즉시 반영됩니다.</span>
  </div>

  <form id="spendingForm" novalidate>
    <div class="card">
      <div class="card__head">카테고리별 월 지출액 입력</div>
      <div id="rowContainer">
        <!-- 스켈레톤 -->
        <div class="spending-row">
          <div class="skeleton spending-dot" style="background:var(--gray-200);"></div>
          <div class="skeleton" style="flex:1;height:13px;border-radius:4px;"></div>
          <div class="skeleton" style="width:150px;height:36px;border-radius:8px;"></div>
        </div>
        <div class="spending-row">
          <div class="skeleton spending-dot" style="background:var(--gray-200);"></div>
          <div class="skeleton" style="flex:1;height:13px;border-radius:4px;"></div>
          <div class="skeleton" style="width:150px;height:36px;border-radius:8px;"></div>
        </div>
      </div>
      <div class="spending-total">
        <span class="spending-total__label">월 합계</span>
        <span class="spending-total__amount" id="totalAmount">0원</span>
      </div>
    </div>

    <div class="form-actions">
      <a href="/mypage/index.html" class="btn btn-outline">취소</a>
      <button type="submit" class="btn btn-primary" id="submitBtn">저장하기</button>
    </div>
  </form>
</div>

<div id="toast-container"></div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const { API, Toast, Fmt, btnLoading, initMoneyInputs, fallbackColor } = MP;

  const container = document.getElementById('rowContainer');
  const totalEl   = document.getElementById('totalAmount');

  // ── 기존 소비 패턴 로드 (SpendingController GET /api/users/me/spending)
  // SpendingChartResponse: { categoryId, categoryName, iconCode, monthlyAmount, ratio }
  let spendingItems = [];
  try {
    const data = await API.get('/api/users/me/spending');
    // 응답이 List<SpendingChartResponse> 형태
    spendingItems = Array.isArray(data) ? data : (data.items ?? []);
  } catch (err) {
    Toast.error('데이터를 불러오지 못했습니다.');
  }

  // ── 입력 행 렌더
  if (spendingItems.length === 0) {
    container.innerHTML = `<div class="empty-state">등록된 카테고리가 없습니다.</div>`;
  } else {
    container.innerHTML = spendingItems.map(item => {
      const color   = fallbackColor(item.categoryId);
      const amt     = Number(item.monthlyAmount || 0);
      const display = amt > 0 ? amt.toLocaleString('ko-KR') : '';
      return `
        <div class="spending-row" data-category-id="${item.categoryId}">
          <span class="spending-dot" style="background:${color};"></span>
          <span class="spending-label">${item.categoryName}</span>
          <input class="form-control spending-input money-input"
                 type="text" inputmode="numeric"
                 placeholder="0" value="${display}"
                 data-raw="${amt}"
                 aria-label="${item.categoryName} 월 지출액"/>
          <span class="spending-unit">원</span>
        </div>`;
    }).join('');

    initMoneyInputs('.money-input');
    recalcTotal();
    container.addEventListener('input', recalcTotal);
  }

  function recalcTotal() {
    const sum = [...document.querySelectorAll('.money-input')]
      .reduce((acc, inp) => acc + Number(inp.dataset.raw || 0), 0);
    totalEl.textContent = Fmt.money(sum);
  }

  // ── 폼 제출 → SpendingController PUT /api/users/me/spending
  // 요청 형식: { patterns: [{ categoryId, monthlyAmount }] }  ← SpendingPatternRequest
  document.getElementById('spendingForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');

    const patterns = [...document.querySelectorAll('#rowContainer .spending-row')]
      .map(row => ({
        categoryId:    Number(row.dataset.categoryId),
        monthlyAmount: Number(row.querySelector('.money-input')?.dataset.raw || 0),
      }));

    if (patterns.length === 0) { Toast.warning('저장할 항목이 없습니다.'); return; }

    btnLoading(btn, true);
    try {
      // SpendingController: PUT /api/users/me/spending
      await API.put('/api/users/me/spending', { patterns });
      Toast.success('소비 패턴이 저장되었습니다.');
      setTimeout(() => { window.location.href = '/mypage/index.html'; }, 1100);
    } catch (err) {
      Toast.error(err.message || '저장 중 오류가 발생했습니다.');
    } finally {
      btnLoading(btn, false);
    }
  });
});
</script>
</body>
</html>
