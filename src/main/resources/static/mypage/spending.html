<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소비 패턴 관리 | 부산은행</title>
  <link rel="stylesheet" href="/css/mypage.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
</head>
<body data-page="mypage-spending">
  <div id="app-header"></div>
  <nav class="page-nav">
    <button class="page-nav__back" id="btn-page-back">마이페이지</button>
    <span class="page-nav__sep">›</span>
    <span class="page-nav__title">소비 패턴 관리</span>
  </nav>
  <div class="page-wrap">
    <div class="page-title">
      <h1>소비 패턴 관리</h1>
      <p>카테고리별 월 지출 금액을 입력하면 소비 패턴 차트에 반영됩니다.</p>
    </div>
    <div class="alert alert-info">
      입력한 금액은 <strong>수동(MANUAL)</strong> 출처로 저장되며 메인 차트에 즉시 반영됩니다.
    </div>
    <form id="spendingForm" novalidate>
      <div class="card">
        <div class="card__head">카테고리별 월 지출액 입력</div>
        <div id="rowContainer">
          <div class="skeleton-row">
            <span class="skeleton spending-dot skeleton-dot"></span>
            <span class="skeleton skeleton-text-long"></span>
            <span class="skeleton skeleton-input"></span>
          </div>
        </div>
        <div class="spending-total">
          <span class="spending-total__label">월 합계</span>
          <span class="spending-total__amount" id="totalAmount">0원</span>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="history.back()">뒤로가기</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">저장하기</button>
      </div>
    </form>
  </div>
  <div id="toast-container"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/mypage.js"></script>
  <script>
    document.getElementById('btn-page-back')?.addEventListener('click', () => history.back());
  </script>
</body>
</html>
