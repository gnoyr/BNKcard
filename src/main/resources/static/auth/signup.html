<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>회원가입 – BNK 부산은행</title>
<link rel="stylesheet" href="/css/auth-style.css" />
</head>
<body data-page="signup">

	<header class="site-header">
		<a href="/" class="logo"> <span class="logo-badge">BNK</span> <span
			class="logo-text">부산은행</span>
		</a>
		<nav class="header-nav" id="headerNav">
			<a href="/auth/signup.html" class="active">회원가입</a> <a
				href="/auth/login.html">로그인</a>
		</nav>
	</header>

	<main class="page-wrap">
		<div class="auth-card wide">

			<div class="step-bar">
				<div class="step-item active" id="step-dot-1">
					<div class="step-num" id="step-num-1">1</div>
					약관동의
				</div>
				<div class="step-sep"></div>
				<div class="step-item" id="step-dot-2">
					<div class="step-num" id="step-num-2">2</div>
					회원정보 입력
				</div>
				<div class="step-sep"></div>
				<div class="step-item" id="step-dot-3">
					<div class="step-num" id="step-num-3">3</div>
					가입완료
				</div>
			</div>

			<h1 class="page-title">회원가입</h1>

			<!-- ── STEP 1 : 약관동의 ── -->
			<div id="view-step1" class="view active">
				<div id="terms-loading" class="notice-box">약관을 불러오는 중...</div>
				<div id="terms-error" class="alert alert-error"></div>
				<div id="terms-list"></div>

				<div class="btn-row btn-row--top">
					<a href="login.html" class="btn btn-secondary">취소</a>
					<button class="btn btn-primary" onclick="signup.step1Next()">다음</button>
				</div>
			</div>

			<!-- ── STEP 2 : 회원정보 입력 ── -->
			<div id="view-step2" class="view">
				<div class="form-group">
					<label class="form-label">이메일 <span class="required">*</span></label>
					<div class="input-row">
						<input class="form-input" type="email" id="email"
							placeholder="이메일 주소를 입력하세요" autocomplete="email"
							oninput="signup.onEmailInput()" />
						<button class="btn btn-outline btn-sm" id="send-code-btn" onclick="signup.sendVerifyCode()">인증코드
							발송</button>
					</div>
					<p class="helper" id="email-msg"></p>
				</div>

				<div class="form-group is-hidden" id="code-section">
					<label class="form-label">인증코드 <span class="required">*</span></label>
					<div class="input-row">
						<input class="form-input" type="text" id="su-code"
							placeholder="인증코드 6자리 입력" maxlength="6" />
						<span id="su-timer"></span>
						<button class="btn btn-outline btn-sm"
							onclick="signup.verifyEmail()">확인</button>
					</div>
					<p class="helper" id="verify-msg"></p>
				</div>

				<div class="form-group">
					<label class="form-label">비밀번호 <span class="required">*</span></label>
					<div class="pw-wrap">
						<input class="form-input" type="password" id="pw"
							placeholder="영문, 숫자, 특수문자 포함 8자 이상" autocomplete="new-password"
							oninput="signup.checkPwStrength()" />
						<button class="pw-toggle" type="button"
							onclick="togglePw('pw','pw-eye1')" id="pw-eye1"></button>
					</div>
					<div class="strength-wrap is-hidden" id="pw-strength">
						<div class="strength-track">
							<div class="strength-fill" id="strength-bar"></div>
						</div>
						<p class="helper" id="strength-label"></p>
					</div>
				</div>

				<div class="form-group">
					<label class="form-label">비밀번호 확인 <span class="required">*</span></label>
					<div class="pw-wrap">
						<input class="form-input" type="password" id="pw-confirm"
							placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password"
							oninput="signup.checkPwMatch()" />
						<button class="pw-toggle" type="button"
							onclick="togglePw('pw-confirm','pw-eye2')" id="pw-eye2"></button>
					</div>
					<p class="helper" id="pw-match-msg"></p>
				</div>

				<div class="form-group">
					<label class="form-label">이름 <span class="required">*</span></label>
					<input class="form-input" type="text" id="name" placeholder="실명 입력"
						autocomplete="name" />
				</div>

				<div class="form-group">
					<label class="form-label">휴대전화 <span class="required">*</span></label>
					<input class="form-input" type="tel" id="phone"
						placeholder="'-' 없이 숫자만 입력" maxlength="11" />
				</div>

				<div class="form-group">
					<label class="form-label">생년월일</label> <input class="form-input"
						type="text" id="birth" placeholder="YYYYMMDD" maxlength="8" />
				</div>

				<div class="form-group form-group--toggle">
					<label class="form-label">마케팅 수신 동의</label>
					<label class="toggle">
						<input type="checkbox" id="su-mkt" />
						<span class="toggle__track"></span>
					</label>
				</div>

				<div id="signup-error" class="alert alert-error"></div>

				<div class="btn-row btn-row--top">
					<button class="btn btn-secondary" onclick="signup.step2Back()">이전</button>
					<button class="btn btn-primary" onclick="signup.step2Next()">가입
						완료</button>
				</div>
			</div>

			<!-- ── STEP 3 : 가입완료 ── -->
			<div id="view-step3" class="view">
				<div class="success-box">
					<div class="success-icon">✓</div>
					<div>
						<p class="success-text">회원가입이 완료되었습니다!</p>
						<p class="success-sub"><span id="done-name"></span><span id="done-name-display"></span>님, 환영합니다!</p>
						<p class="success-sub" id="welcome-msg"><span id="done-email-display"></span></p>
					</div>
				</div>
				<div class="btn-row">
					<a href="login.html" class="btn btn-primary">로그인 하기</a>
				</div>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<strong>BNK부산은행</strong><br /> 부산광역시 부산진구 부전동 830-38 &nbsp;|&nbsp;
		대표전화 1588-6200<br /> © 2025 BNK Busan Bank. All rights reserved.
	</footer>

	<div id="toast-container"></div>
	<script src="/js/header.js"></script>
	<script src="/js/auth-js.js"></script>
</body>
</html>
