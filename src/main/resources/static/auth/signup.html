<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>회원가입 – BNK 부산은행</title>
<link rel="stylesheet" href="/css/auth-style.css" />
</head>
<body data-page="signup">

  <header class="site-header">
    <a href="/" class="logo">
      <span class="logo-badge">BNK</span>
      <span class="logo-text">부산은행</span>
    </a>
    <nav class="header-nav" id="headerNav">
      <a href="/auth/signup.html" class="active">회원가입</a>
      <a href="/auth/login.html">로그인</a>
    </nav>
  </header>

  <main class="page-wrap">
    <div class="auth-card wide">

      <!-- 스텝 바 -->
      <div class="step-bar">
        <div class="step-item active" id="step-dot-1">
          <div class="step-num" id="step-num-1">1</div>
          약관동의
        </div>
        <div class="step-sep"></div>
        <div class="step-item" id="step-dot-2">
          <div class="step-num" id="step-num-2">2</div>
          회원정보 입력
        </div>
        <div class="step-sep"></div>
        <div class="step-item" id="step-dot-3">
          <div class="step-num" id="step-num-3">3</div>
          가입완료
        </div>
      </div>

      <h1 class="page-title">회원가입</h1>

      <!-- ════════════════════════════════════════
           STEP 1 : 약관 동의
      ════════════════════════════════════════ -->
      <div id="view-step1" class="view active">
        <form id="termsForm" novalidate>
          <div id="terms-loading" class="notice-box">약관을 불러오는 중...</div>
          <div id="terms-error" class="alert alert-error"></div>
          <div id="terms-list"></div>

          <div class="btn-row btn-row--top">
            <a href="login.html" class="btn btn-secondary">취소</a>
            <button class="btn btn-primary" type="submit" id="btnStep1Next">다음</button>
          </div>
        </form>
      </div>

      <!-- ════════════════════════════════════════
           STEP 2 : 회원정보 입력
      ════════════════════════════════════════ -->
      <div id="view-step2" class="view">
        <form id="signupForm" novalidate>

          <!-- ── 이메일 인증 ── -->
          <div class="form-section-title">이메일 인증</div>

          <div class="form-group">
            <label class="form-label" for="email">이메일 <span class="required">*</span></label>
            <div class="input-row">
              <input class="form-input" type="email" id="email"
                placeholder="이메일 주소를 입력하세요" autocomplete="email" />
              <button class="btn btn-outline" type="button" id="btnSendCode">인증코드 발송</button>
            </div>
            <div id="code-sent-msg" class="helper is-hidden">
              인증코드가 발송되었습니다.
              <span class="timer-text" id="code-timer"></span>
            </div>
          </div>

          <div class="form-group" id="group-verify-code">
            <label class="form-label" for="verifyCode">이메일 인증코드 <span class="required">*</span></label>
            <div class="input-row">
              <input class="form-input" type="text" id="verifyCode"
                placeholder="6자리 코드 입력" maxlength="6"
                inputmode="numeric" autocomplete="one-time-code" />
              <button class="btn btn-outline" type="button" id="btnVerifyCode">확인</button>
            </div>
            <div id="verify-success" class="helper ok is-hidden">✓ 이메일 인증이 완료되었습니다.</div>
            <div id="verify-error" class="alert alert-error"></div>
          </div>

          <!-- ── 비밀번호 ── -->
          <div class="form-section-title">비밀번호 설정</div>

          <div class="form-group">
            <label class="form-label" for="password">비밀번호 <span class="required">*</span></label>
            <div class="pw-wrap">
              <input class="form-input" type="password" id="password"
                placeholder="영문, 숫자, 특수문자 포함 8자 이상"
                autocomplete="new-password" />
              <button class="pw-toggle" type="button" id="btnPwToggle1" title="비밀번호 표시/숨김"></button>
            </div>
            <div class="strength-wrap is-hidden" id="signup-pw-strength">
              <div class="strength-track">
                <div class="strength-fill" id="signup-strength-bar"></div>
              </div>
              <p class="helper" id="signup-strength-label"></p>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="passwordConfirm">비밀번호 확인 <span class="required">*</span></label>
            <div class="pw-wrap">
              <input class="form-input" type="password" id="passwordConfirm"
                placeholder="비밀번호를 다시 입력하세요"
                autocomplete="new-password" />
              <button class="pw-toggle" type="button" id="btnPwToggle2" title="비밀번호 표시/숨김"></button>
            </div>
            <p class="helper" id="pw-match-msg"></p>
          </div>

          <!-- ── 기본 정보 (필수) ── -->
          <div class="form-section-title">기본 정보 <span class="required">*</span></div>

          <div class="form-group">
            <label class="form-label" for="name">이름 <span class="required">*</span></label>
            <input class="form-input" type="text" id="name"
              placeholder="실명을 입력하세요" autocomplete="name" />
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">휴대전화 번호 <span class="required">*</span></label>
            <input class="form-input" type="tel" id="phone"
              placeholder="01012345678 (숫자만 입력)" maxlength="11"
              inputmode="numeric" autocomplete="tel" />
          </div>

          <div class="form-group">
            <label class="form-label" for="birthDate">생년월일</label>
            <input class="form-input" type="date" id="birthDate"
              min="1900-01-01" max="2010-12-31" />
          </div>

          <!-- ── 추가 정보 (선택) ── -->
          <div class="form-section-title">추가 정보 <span class="form-label-note">(선택)</span></div>

          <div class="form-group">
            <label class="form-label" for="job">직업</label>
            <select class="form-input" id="job">
              <option value="">선택 안함</option>
              <option value="EMPLOYED">직장인</option>
              <option value="SELF_EMPLOYED">자영업자</option>
              <option value="STUDENT">학생</option>
              <option value="UNEMPLOYED">무직</option>
              <option value="OTHER">기타</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="incomeLevelCode">소득 등급</label>
            <select class="form-input" id="incomeLevelCode">
              <option value="">선택 안함</option>
              <option value="LV1">LV1 (연 3천만원 미만)</option>
              <option value="LV2">LV2 (연 3천~5천만원)</option>
              <option value="LV3">LV3 (연 5천만~1억원)</option>
              <option value="LV4">LV4 (연 1억원 이상)</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="creditScore">신용점수
              <span class="form-label-note">(300~1000)</span>
            </label>
            <input class="form-input" type="number" id="creditScore"
              placeholder="신용점수를 입력하세요 (예: 750)"
              min="300" max="1000" inputmode="numeric" />
            <p class="helper">신용점수를 모르시면 비워두셔도 됩니다.</p>
          </div>

          <!-- ── 마케팅 동의 ── -->
          <div class="form-group">
            <label class="form-check-row">
              <input type="checkbox" id="marketingAgree" />
              <span>마케팅 정보 수신 동의 <span class="form-label-note">(선택)</span></span>
            </label>
          </div>

          <!-- ── 에러 / 버튼 ── -->
          <div id="signup-error" class="alert alert-error"></div>

          <div class="btn-row">
            <button class="btn btn-secondary" type="button" id="btnStep2Back">이전</button>
            <button class="btn btn-primary" type="submit" id="btnSignup">가입 완료</button>
          </div>

        </form>
      </div>

      <!-- ════════════════════════════════════════
           STEP 3 : 가입 완료
      ════════════════════════════════════════ -->
      <div id="view-step3" class="view">
        <div class="done-wrap">
          <div class="done-icon">🎉</div>
          <h2 class="done-title"><span id="done-name"></span>님, 환영합니다!</h2>
          <p class="done-email" id="done-email-display"></p>
          <p class="done-msg">부산은행 회원가입이 완료되었습니다.</p>
        </div>
        <div class="btn-row">
          <a href="/auth/login.html" class="btn btn-primary">로그인하기</a>
        </div>
      </div>

    </div><!-- /.auth-card -->
  </main>

  <script src="/js/auth-js.js"></script>
</body>
</html>
