<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>관리자 로그인 – BNK</title>
<link rel="stylesheet" href="/css/auth.css"/>
<link rel="stylesheet" href="/css/teal-theme.css"/>
<style>
  body { background: #1a1a2e; }
  .site-header { background: #16213e; border-bottom: 1px solid #0f3460; }
  .logo-badge  { background: var(--teal-600); }
  .auth-card   { border-top: 3px solid var(--teal-600); }
  .admin-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--teal-50); color: var(--teal-800); font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--teal-200);
    margin-bottom: 16px; letter-spacing: .05em;
  }
  .admin-warn {
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px;
    padding: 10px 13px; font-size: 12px; color: #92400e;
    margin-bottom: 18px; line-height: 1.6;
  }
  .lock-info { font-size: 12px; color: #6b7280; text-align: center; margin-top: 14px; }
  .back-link { display: block; text-align: center; margin-top: 16px;
               font-size: 12px; color: #9ca3af; text-decoration: none; }
  .back-link:hover { color: var(--teal-400); }
  .site-footer { background: #111827; }
</style>
</head>
<body>

<header class="site-header">
  <a href="login.html" class="logo">
    <span class="logo-badge">BNK</span>
    <span class="logo-text">부산은행</span>
  </a>
</header>

<main class="page-wrap">
  <div class="auth-card">
    <div class="admin-badge">🔐 ADMIN</div>
    <h1 class="page-title" style="font-size:20px;">관리자 로그인</h1>
    <div class="admin-warn">관리자 전용 페이지입니다. 권한이 없는 접근은 기록됩니다.</div>

    <div class="form-group">
      <label class="form-label">관리자 아이디<span class="required">*</span></label>
      <input class="form-input" type="text" id="username" placeholder="관리자 아이디"
             autocomplete="username"
             onkeydown="if(event.key==='Enter') document.getElementById('password').focus()"/>
    </div>

    <div class="form-group">
      <label class="form-label">비밀번호<span class="required">*</span></label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="password" placeholder="비밀번호"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter') adminLogin()"/>
        <button class="pw-toggle" type="button" onclick="togglePw()" title="표시/숨김"></button>
      </div>
    </div>

    <div id="login-error" class="alert alert-error"></div>

    <button class="btn btn-primary btn-block" id="loginBtn" onclick="adminLogin()">
      관리자 로그인
    </button>

    <p class="lock-info">로그인 실패 5회 시 계정이 30분간 잠깁니다.</p>
    <a href="login.html" class="back-link">← 일반 로그인으로 돌아가기</a>
  </div>
</main>

<footer class="site-footer">
  <strong>BNK부산은행</strong> 관리자 시스템<br/>
  © 2025 BNK Busan Bank. All rights reserved.
</footer>

<div id="toast-container"></div>
<script src="/js/header.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
