<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로그인 – BNK 부산은행</title>
<link rel="stylesheet" href="/css/auth.css" />
</head>
<body data-page="login">

  <header class="site-header">
    <a href="/" class="logo">
      <span class="logo-badge">BNK</span>
      <span class="logo-text">부산은행</span>
    </a>
    <!-- header.js 가 로그인/비로그인 상태에 따라 채움 -->
    <!-- 기본값: 비로그인 상태 미리 렌더 (FOUC 방지) -->
    <nav class="header-nav" id="headerNav">
      <a href="/auth/signup.html">회원가입</a>
      <a href="/auth/login.html" class="active">로그인</a>
    </nav>
  </header>

  <main class="page-wrap">
    <div class="auth-card">
      <h1 class="page-title">로그인</h1>

      <!-- [개선] form 태그 추가 → Enter 키 제출 지원 / novalidate → JS 검증 통일 -->
      <form id="loginForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">아이디 (이메일)<span class="required">*</span></label>
          <input class="form-input" type="email" id="email"
            placeholder="이메일 주소를 입력하세요" autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호<span class="required">*</span></label>
          <div class="pw-wrap">
            <input class="form-input" type="password" id="password"
              placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
            <!-- [개선] onclick 제거 → auth-js.js addEventListener로 이동 -->
            <button class="pw-toggle" type="button" id="btnPwToggle"
              title="비밀번호 표시/숨김"></button>
          </div>
          <p class="helper">로그인 실패 5회 시 계정이 잠깁니다.</p>
        </div>

        <!-- [개선] onclick 제거 → form submit 이벤트로 처리 -->
        <button class="btn btn-primary btn-block" type="submit">로그인</button>

        <div id="login-error" class="alert alert-error"></div>

      </form>

      <div class="divider"></div>

      <div class="link-row">
        <a href="signup.html">회원가입</a>
        <span class="link-sep">|</span>
        <a href="find-id.html">아이디 찾기</a>
        <span class="link-sep">|</span>
        <a href="reset-password.html">비밀번호 찾기</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <strong>BNK부산은행</strong><br />
    부산광역시 부산진구 부전동 830-38 &nbsp;|&nbsp; 대표전화 1588-6200<br />
    © 2025 BNK Busan Bank. All rights reserved.<br />
    <a href="/auth/admin-login.html"
      style="color: inherit; opacity: 0.15; font-size: 10px; text-decoration: none; letter-spacing: 0.05em; user-select: none;"
      tabindex="-1" aria-hidden="true">관리자</a>
  </footer>

  <div id="toast-container"></div>
  <script src="/js/header.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
