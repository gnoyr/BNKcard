<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아이디 찾기 – BNK 부산은행</title>
<link rel="stylesheet" href="/css/auth.css" />
</head>
<body data-page="find-id">

  <header class="site-header">
    <a href="/" class="logo">
      <span class="logo-badge">BNK</span>
      <span class="logo-text">부산은행</span>
    </a>
    <!-- 아이디 찾기는 로그인 여부와 무관하게 접근 허용 — header.js 가 상태 채움 -->
    <nav class="header-nav" id="headerNav">
      <a href="/auth/signup.html">회원가입</a>
      <a href="/auth/login.html">로그인</a>
    </nav>
  </header>

  <main class="page-wrap">
    <div class="auth-card">

      <!-- ── VIEW 1 : 입력 ── -->
      <div id="view-input" class="view active">
        <h1 class="page-title">아이디 찾기</h1>

        <p class="page-desc">
          가입 시 등록한 이름과 휴대전화 번호를 입력하시면<br />
          아이디(이메일)를 알려드립니다.
        </p>

        <!-- [개선] form 태그 추가 → Enter 키 제출 지원 / novalidate → JS 검증 통일 -->
        <form id="findIdForm" novalidate>

          <div class="form-group">
            <label class="form-label" for="name">이름 <span class="required">*</span></label>
            <input class="form-input" type="text" id="name"
              placeholder="가입 시 등록한 이름을 입력하세요" autocomplete="name" />
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">휴대전화 번호 <span class="required">*</span></label>
            <input class="form-input" type="tel" id="phone"
              placeholder="'-' 없이 숫자만 입력" maxlength="11" autocomplete="tel" />
          </div>

          <div id="find-error" class="alert alert-error"></div>

          <div class="btn-row btn-row--top">
            <a href="login.html" class="btn btn-secondary">취소</a>
            <!-- [개선] onclick 제거 → form submit 이벤트로 처리 -->
            <button class="btn btn-primary" type="submit">아이디 찾기</button>
          </div>

        </form>
      </div>

      <!-- ── VIEW 2 : 결과 ── -->
      <div id="view-result" class="view">
        <h1 class="page-title">아이디 찾기</h1>

        <p class="page-desc">
          입력하신 정보와 일치하는 아이디를 찾았습니다.<br />
          개인정보 보호를 위해 아이디 일부가 마스킹 처리됩니다.
        </p>

        <div class="result-box">
          <p class="result-label">가입된 아이디 (이메일)</p>
          <p class="result-value" id="result-email">–</p>
          <div class="result-meta">
            <span class="result-meta__label">보안 안내</span>
            <span class="result-meta__value">전체 주소는 로그인 후 확인하세요.</span>
          </div>
        </div>

        <div class="btn-row">
          <a href="login.html" class="btn btn-primary">로그인 하기</a>
          <a href="reset-password.html" class="btn btn-outline">비밀번호 찾기</a>
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <strong>BNK부산은행</strong><br />
    부산광역시 부산진구 부전동 830-38 &nbsp;|&nbsp; 대표전화 1588-6200<br />
    © 2025 BNK Busan Bank. All rights reserved.
  </footer>

  <div id="toast-container"></div>
  <script src="/js/header.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
