<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNK 부산은행 카드</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f4f6fa;
      color: #222;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* ── Header ── */
    .header {
      background: #003087;
      color: #fff;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-logo span { color: #ffd700; }
    .header-nav { display: flex; gap: 20px; align-items: center; font-size: 14px; }
    .header-nav a { opacity: 0.85; transition: opacity .2s; }
    .header-nav a:hover { opacity: 1; }

    /* ── Hero / 검색 영역 ── */
    .hero {
      background: linear-gradient(135deg, #003087 0%, #0066cc 60%, #0099ff 100%);
      padding: 60px 32px 80px;
      text-align: center;
      color: #fff;
    }
    .hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
    .hero p  { font-size: 16px; opacity: 0.85; margin-bottom: 32px; }

    .search-bar {
      display: flex;
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 50px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 24px;
      font-size: 15px;
      color: #222;
    }
    .search-bar button {
      background: #ffd700;
      color: #003087;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 28px;
      transition: background .2s;
    }
    .search-bar button:hover { background: #ffcc00; }

    /* 인기 검색어 태그 */
    .popular-keywords {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .popular-keywords span {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }
    .kw-tag {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background .2s;
    }
    .kw-tag:hover { background: rgba(255,255,255,0.32); }

    /* ── 섹션 공통 ── */
    .section {
      max-width: 1120px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: #003087;
      margin-bottom: 6px;
    }
    .section-sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    /* ── 카드 Flip 공통 ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .flip-wrapper {
      perspective: 1000px;
      height: 340px;
    }
    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4,0.2,0.2,1);
    }
    .flip-wrapper:hover .flip-inner { transform: rotateY(180deg); }

    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,48,135,0.12);
    }

    /* 앞면 */
    .flip-front {
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    .card-img-wrap {
      flex: 1;
      background: linear-gradient(145deg, #e8eef6, #d0ddf0);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-img-wrap img {
      max-height: 160px;
      max-width: 90%;
      object-fit: contain;
      filter: drop-shadow(0 6px 16px rgba(0,48,135,0.18));
      transition: transform .3s;
    }
    .flip-wrapper:hover .card-img-wrap img { transform: scale(1.04); }
    .card-img-placeholder {
      width: 200px; height: 120px;
      background: linear-gradient(135deg, #003087, #0066cc);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 600; text-align: center;
      padding: 12px;
    }
    .card-front-info {
      padding: 16px 18px;
      border-top: 1px solid #f0f2f6;
    }
    .card-type-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: #0066cc;
      background: #e8f0fe;
      border-radius: 4px;
      padding: 2px 8px;
      margin-bottom: 6px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-company { font-size: 12px; color: #888; }
    .card-fee { font-size: 13px; color: #444; margin-top: 4px; }

    /* 뒷면 */
    .flip-back {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, #003087, #0055bb);
      color: #fff;
      display: flex;
      flex-direction: column;
      padding: 24px 20px 20px;
    }
    .back-card-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 10px;
    }
    .back-benefit {
      flex: 1;
      font-size: 13px;
      line-height: 1.7;
      opacity: 0.9;
      overflow: hidden;
    }
    .back-benefit .benefit-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 6px;
    }
    .benefit-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ffd700;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .back-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .btn-detail, .btn-compare, .btn-apply {
      flex: 1;
      padding: 9px 6px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      transition: opacity .2s, transform .1s;
    }
    .btn-detail  { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
    .btn-compare { background: #ffd700; color: #003087; }
    .btn-apply   { background: #fff; color: #003087; }
    .btn-detail:hover, .btn-compare:hover, .btn-apply:hover { opacity: 0.85; transform: translateY(-1px); }

    /* TOP3 특별 스타일 */
    .top3-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 28px; }
    @media (max-width: 768px) { .top3-grid { grid-template-columns: 1fr; } }
    .top3-rank {
      position: absolute;
      top: 12px; left: 12px;
      z-index: 2;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
    }
    .rank-1 { background: #ffd700; color: #003087; }
    .rank-2 { background: #c0c0c0; color: #333; }
    .rank-3 { background: #cd7f32; color: #fff; }

    /* ── 카테고리 필터 버튼 ── */
    .category-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .cat-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid #dde3ef;
      color: #444;
      background: #fff;
      transition: all .2s;
    }
    .cat-btn:hover, .cat-btn.active {
      border-color: #003087;
      color: #003087;
      background: #e8f0fe;
    }
    .cat-icon { font-size: 16px; }

    /* ── 카드 필터 바 ── */
    .filter-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-row select, .filter-row input[type=text] {
      padding: 8px 14px;
      border: 1.5px solid #dde3ef;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
      color: #333;
      transition: border-color .2s;
    }
    .filter-row select:focus, .filter-row input:focus { border-color: #003087; }
    .filter-count { font-size: 13px; color: #888; margin-left: auto; }

    /* ── 로딩 / 빈 화면 ── */
    .loading-wrap, .empty-wrap {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid #e0e7f5;
      border-top-color: #003087;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 페이지네이션 ── */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 40px;
    }
    .page-btn {
      width: 38px; height: 38px;
      border-radius: 8px;
      border: 1.5px solid #dde3ef;
      background: #fff;
      color: #444;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .page-btn:hover, .page-btn.active { background: #003087; color: #fff; border-color: #003087; }
    .page-btn:disabled { opacity: 0.4; pointer-events: none; }

    /* ── 비교 카트 (우측 고정) ── */
    .compare-cart {
      position: fixed;
      right: 0; bottom: 80px;
      width: 220px;
      background: #fff;
      border-radius: 16px 0 0 16px;
      box-shadow: -4px 4px 24px rgba(0,48,135,0.18);
      padding: 16px 14px;
      z-index: 200;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(0.4,0.2,0.2,1);
    }
    .compare-cart.open { transform: translateX(0); }
    .cart-toggle {
      position: fixed;
      right: 0; bottom: 80px;
      background: #003087;
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px 0 0 8px;
      font-size: 12px;
      font-weight: 600;
      z-index: 201;
      writing-mode: vertical-rl;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: -2px 2px 8px rgba(0,0,0,0.2);
      transition: background .2s;
    }
    .cart-toggle:hover { background: #0055bb; }
    .cart-title {
      font-size: 14px;
      font-weight: 700;
      color: #003087;
      margin-bottom: 12px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f2f6;
      font-size: 12px;
    }
    .cart-item-name { flex: 1; line-height: 1.4; color: #333; }
    .cart-remove {
      color: #cc0000;
      font-size: 16px;
      font-weight: 700;
      padding: 0 4px;
    }
    .cart-empty {
      text-align: center;
      color: #bbb;
      font-size: 13px;
      padding: 20px 0;
    }
    .btn-cart-compare {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #003087;
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      transition: background .2s;
    }
    .btn-cart-compare:hover { background: #0055bb; }
    .btn-cart-compare:disabled { background: #ccc; }

    /* ── 검색 오버레이 ── */
    .search-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 500;
      align-items: flex-start;
      justify-content: center;
      padding-top: 60px;
    }
    .search-overlay.open { display: flex; }
    .search-modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 720px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      animation: slideDown 0.25s ease;
    }
    @keyframes slideDown { from { transform: translateY(-20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

    .modal-search-bar {
      display: flex;
      border: 2px solid #003087;
      border-radius: 50px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .modal-search-bar input {
      flex: 1;
      border: none;
      outline: none;
      padding: 12px 20px;
      font-size: 15px;
      color: #222;
    }
    .modal-search-bar button {
      background: #003087;
      color: #fff;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
    }
    .modal-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #666;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .suggest-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .suggest-tag {
      background: #f0f4fb;
      color: #003087;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background .2s;
    }
    .suggest-tag:hover { background: #d4e2f7; }

    /* 혜택 카테고리 버튼 (검색 모달) */
    .modal-cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .modal-cat-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 8px;
      border: 1.5px solid #dde3ef;
      border-radius: 10px;
      font-size: 12px;
      color: #444;
      background: #fafbff;
      cursor: pointer;
      transition: all .2s;
    }
    .modal-cat-btn:hover, .modal-cat-btn.active {
      border-color: #003087;
      background: #e8f0fe;
      color: #003087;
    }
    .modal-cat-btn .cat-em { font-size: 22px; }

    /* 검색 결과 (모달 내) */
    .modal-results { margin-top: 8px; }
    .modal-result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f2f6;
      cursor: pointer;
      transition: background .15s;
      border-radius: 8px;
    }
    .modal-result-item:hover { background: #f8faff; }
    .modal-result-thumb {
      width: 64px; height: 40px;
      background: linear-gradient(135deg, #003087, #0066cc);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .modal-result-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .modal-result-info { flex: 1; }
    .modal-result-name { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .modal-result-company { font-size: 12px; color: #888; }
    .modal-result-benefit { font-size: 12px; color: #0066cc; margin-top: 2px; }
    .modal-result-actions { display: flex; gap: 6px; }
    .modal-result-actions button {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }
    .btn-m-detail { background: #f0f4fb; color: #003087; }
    .btn-m-compare { background: #003087; color: #fff; }

    /* ── 카드 비교 섹션 ── */
    .compare-section {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,48,135,0.08);
      padding: 28px 24px;
      margin-top: 40px;
      display: none;
    }
    .compare-section.open { display: block; }
    .compare-table { width: 100%; border-collapse: collapse; }
    .compare-table th {
      background: #003087;
      color: #fff;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
    }
    .compare-table td {
      padding: 10px 16px;
      font-size: 13px;
      border-bottom: 1px solid #f0f2f6;
      vertical-align: top;
    }
    .compare-table tr:nth-child(even) td { background: #f8faff; }
    .compare-table .label-col { font-weight: 600; color: #555; width: 120px; }

    /* ── 알림 토스트 ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transition: all .3s;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="header">
  <div class="header-logo">BNK <span>부산은행</span> 카드</div>
  <nav class="header-nav">
    <a href="#top3">추천 카드</a>
    <a href="#card-list">전체 카드</a>
    <a href="/auth-test.html">로그인</a>
  </nav>
</header>

<!-- ── 히어로 / 검색 ── -->
<section class="hero">
  <h1>나에게 맞는 카드를 찾아보세요</h1>
  <p>BNK 부산은행의 다양한 카드 혜택을 비교하고 선택하세요</p>
  <div class="search-bar">
    <input type="text" id="hero-search" placeholder="카드명, 혜택 검색..." autocomplete="off">
    <button onclick="openSearchModal()">검색</button>
  </div>
  <div class="popular-keywords" id="popular-keywords">
    <span>인기 :</span>
  </div>
</section>

<!-- ── TOP3 추천 ── -->
<section class="section" id="top3">
  <div class="section-title">🏆 TOP3 추천 카드</div>
  <div class="section-sub">많은 분들이 선택한 인기 카드입니다</div>
  <div class="top3-grid" id="top3-grid">
    <div class="loading-wrap"><div class="loading-spinner"></div><p>불러오는 중...</p></div>
  </div>
</section>

<!-- ── 전체 카드 목록 ── -->
<section class="section" id="card-list">
  <div class="section-title">💳 전체 카드</div>
  <div class="section-sub">조건에 맞는 카드를 찾아보세요</div>

  <!-- 카테고리 필터 -->
  <div class="category-bar" id="category-bar">
    <button class="cat-btn active" data-category="" onclick="selectCategory(this, '')">
      <span class="cat-icon">🃏</span> 전체
    </button>
    <button class="cat-btn" data-category="1" onclick="selectCategory(this, '1')">
      <span class="cat-icon">⛽</span> 주유
    </button>
    <button class="cat-btn" data-category="2" onclick="selectCategory(this, '2')">
      <span class="cat-icon">🚇</span> 교통
    </button>
    <button class="cat-btn" data-category="3" onclick="selectCategory(this, '3')">
      <span class="cat-icon">🛍️</span> 쇼핑
    </button>
    <button class="cat-btn" data-category="4" onclick="selectCategory(this, '4')">
      <span class="cat-icon">✈️</span> 항공
    </button>
    <button class="cat-btn" data-category="5" onclick="selectCategory(this, '5')">
      <span class="cat-icon">🌏</span> 해외
    </button>
    <button class="cat-btn" data-category="6" onclick="selectCategory(this, '6')">
      <span class="cat-icon">☕</span> 카페
    </button>
    <button class="cat-btn" data-category="7" onclick="selectCategory(this, '7')">
      <span class="cat-icon">🍽️</span> 음식점
    </button>
    <button class="cat-btn" data-category="8" onclick="selectCategory(this, '8')">
      <span class="cat-icon">💊</span> 의료
    </button>
  </div>

  <!-- 필터 바 -->
  <div class="filter-row">
    <select id="filter-type" onchange="loadCards(0)">
      <option value="">전체 유형</option>
      <option value="CREDIT">신용카드</option>
      <option value="CHECK">체크카드</option>
      <option value="PREPAID">선불카드</option>
    </select>
    <input type="text" id="filter-q" placeholder="카드명 검색..."
           onkeydown="if(event.key==='Enter') loadCards(0)" style="width:200px">
    <button onclick="loadCards(0)"
      style="padding:8px 18px; background:#003087; color:#fff; border-radius:8px; font-size:13px;">
      검색
    </button>
    <button onclick="resetFilter()"
      style="padding:8px 14px; background:#f0f2f6; color:#666; border-radius:8px; font-size:13px;">
      초기화
    </button>
    <span class="filter-count" id="filter-count"></span>
  </div>

  <!-- 카드 그리드 -->
  <div class="card-grid" id="card-grid">
    <div class="loading-wrap" style="grid-column:1/-1">
      <div class="loading-spinner"></div><p>카드를 불러오는 중...</p>
    </div>
  </div>

  <!-- 페이지네이션 -->
  <div class="pagination" id="pagination"></div>

  <!-- 카드 비교 결과 -->
  <div class="compare-section" id="compare-section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h3 style="color:#003087; font-size:18px;">📊 카드 비교</h3>
      <button onclick="closeCompare()"
        style="background:#f0f2f6; color:#666; padding:6px 14px; border-radius:8px; font-size:13px;">
        닫기
      </button>
    </div>
    <div id="compare-result"></div>
  </div>
</section>

<!-- ── 검색 오버레이 모달 ── -->
<div class="search-overlay" id="search-overlay" onclick="handleOverlayClick(event)">
  <div class="search-modal">
    <div class="modal-search-bar">
      <input type="text" id="modal-search-input" placeholder="카드명, 혜택 검색..."
             onkeydown="if(event.key==='Enter') runModalSearch()">
      <button onclick="runModalSearch()">검색</button>
    </div>

    <!-- 추천 검색어 -->
    <div class="modal-section-title">추천 검색어</div>
    <div class="suggest-list" id="suggest-list"></div>

    <!-- 혜택 카테고리 -->
    <div class="modal-section-title">혜택 카테고리</div>
    <div class="modal-cat-grid">
      <button class="modal-cat-btn" onclick="modalSelectCategory(this,'1')">
        <span class="cat-em">⛽</span>주유
      </button>
      <button class="modal-cat-btn" onclick="modalSelectCategory(this,'2')">
        <span class="cat-em">🚇</span>교통
      </button>
      <button class="modal-cat-btn" onclick="modalSelectCategory(this,'3')">
        <span class="cat-em">🛍️</span>쇼핑
      </button>
      <button class="modal-cat-btn" onclick="modalSelectCategory(this,'4')">
        <span class="cat-em">✈️</span>항공
      </button>
      <button class="modal-cat-btn" onclick="modalSelectCategory(this,'5')">
        <span class="cat-em">🌏</span>해외
      </button>
      <button class="modal-cat-btn" onclick="modalSelectCategory(this,'6')">
        <span class="cat-em">☕</span>카페
      </button>
      <button class="modal-cat-btn" onclick="modalSelectCategory(this,'7')">
        <span class="cat-em">🍽️</span>음식점
      </button>
      <button class="modal-cat-btn" onclick="modalSelectCategory(this,'8')">
        <span class="cat-em">💊</span>의료
      </button>
    </div>

    <!-- 검색 결과 -->
    <div id="modal-results-wrap" style="display:none">
      <div class="modal-section-title" id="modal-result-title">검색 결과</div>
      <div class="modal-results" id="modal-results"></div>
    </div>
  </div>
</div>

<!-- ── 비교 카트 토글 버튼 ── -->
<div class="cart-toggle" id="cart-toggle" onclick="toggleCart()">비교<br>카트</div>

<!-- ── 비교 카트 ── -->
<div class="compare-cart" id="compare-cart">
  <div class="cart-title">비교 카트 <span id="cart-count" style="color:#0066cc">(0/3)</span></div>
  <div id="cart-items">
    <div class="cart-empty">카드를 추가하세요</div>
  </div>
  <button class="btn-cart-compare" id="btn-do-compare"
          onclick="doCompare()" disabled>비교하기</button>
</div>

<!-- ── 토스트 ── -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  전역 상태
// ══════════════════════════════════════════════
const state = {
  compareCart: [],    // { cardId, cardName, companyName }
  cartOpen:    false,
  currentPage: 0,
  currentCategoryId: '',
  totalCount: 0,
  PAGE_SIZE: 12,
};

// ══════════════════════════════════════════════
//  유틸
// ══════════════════════════════════════════════
function toast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function fmtFee(v) {
  if (v === null || v === undefined) return '-';
  return Number(v).toLocaleString() + '원';
}

function cardTypeBadge(t) {
  return { CREDIT: '신용', CHECK: '체크', PREPAID: '선불' }[t] ?? t;
}

// ══════════════════════════════════════════════
//  API 호출
// ══════════════════════════════════════════════
async function api(url) {
  try {
    const res = await fetch(url, { credentials: 'include' });
    if (!res.ok) return null;
    const json = await res.json();
    return json?.data ?? null;
  } catch { return null; }
}

// ══════════════════════════════════════════════
//  인기 검색어 로드
// ══════════════════════════════════════════════
async function loadPopularKeywords() {
  const data = await api('/api/search/keywords/popular');
  const wrap = document.getElementById('popular-keywords');
  if (!data?.length) return;
  data.slice(0, 8).forEach(kw => {
    const tag = document.createElement('button');
    tag.className = 'kw-tag';
    tag.textContent = kw.keyword ?? kw.keywordRaw ?? kw;
    tag.onclick = () => {
      document.getElementById('hero-search').value = tag.textContent;
      openSearchModal(tag.textContent);
    };
    wrap.appendChild(tag);
  });
}

// ══════════════════════════════════════════════
//  TOP3 추천 카드 로드
// ══════════════════════════════════════════════
async function loadTop3() {
  const grid = document.getElementById('top3-grid');
  // surveyResult 빈 값으로 비회원 처리
  const data = await api('/api/cards/top3?surveyResult=');
  if (!data || !data.length) {
    grid.innerHTML = '<div class="empty-wrap">추천 카드를 불러올 수 없습니다.</div>';
    return;
  }
  grid.innerHTML = data.slice(0, 3).map((card, i) => buildFlipCard(card, i + 1)).join('');
}

// ══════════════════════════════════════════════
//  카드 목록 로드
// ══════════════════════════════════════════════
async function loadCards(page = 0) {
  state.currentPage = page;
  const grid = document.getElementById('card-grid');
  grid.innerHTML = `<div class="loading-wrap" style="grid-column:1/-1">
    <div class="loading-spinner"></div><p>불러오는 중...</p></div>`;

  const q        = document.getElementById('filter-q').value.trim();
  const cardType = document.getElementById('filter-type').value;
  const catId    = state.currentCategoryId;

  let url = `/api/cards?page=${page}&size=${state.PAGE_SIZE}`;
  if (q)        url += `&q=${encodeURIComponent(q)}`;
  if (cardType) url += `&cardType=${cardType}`;
  if (catId)    url += `&categoryId=${catId}`;

  const data = await api(url);

  if (!data || !data.content?.length) {
    grid.innerHTML = `<div class="empty-wrap" style="grid-column:1/-1">
      🔍 조건에 맞는 카드가 없습니다.</div>`;
    document.getElementById('filter-count').textContent = '';
    renderPagination(0);
    return;
  }

  state.totalCount = data.totalCount ?? 0;
  document.getElementById('filter-count').textContent =
    `총 ${state.totalCount.toLocaleString()}개`;

  grid.innerHTML = data.content.map(card => buildFlipCard(card)).join('');
  renderPagination(state.totalCount);
}

// ══════════════════════════════════════════════
//  카드 플립 카드 HTML 빌더
// ══════════════════════════════════════════════
function buildFlipCard(card, rank = null) {
  const thumb = card.thumbnailUrl
    ? `<img src="${card.thumbnailUrl}" alt="${card.cardName}"
           onerror="this.style.display='none'">`
    : `<div class="card-img-placeholder">${card.cardName}</div>`;

  const rankBadge = rank
    ? `<div class="top3-rank rank-${rank}">${rank}</div>` : '';

  const benefit = card.topBenefit ?? card.summaryDescription ?? '다양한 혜택 제공';
  const benefitLines = benefit.split(/[,\.]\s*/).slice(0, 3)
    .map(b => b.trim()).filter(Boolean)
    .map(b => `<div class="benefit-item"><span class="benefit-dot"></span>${b}</div>`)
    .join('');

  return `
    <div class="flip-wrapper">
      <div class="flip-inner">
        <!-- 앞면 -->
        <div class="flip-front">
          ${rankBadge}
          <div class="card-img-wrap">${thumb}</div>
          <div class="card-front-info">
            <span class="card-type-badge">${cardTypeBadge(card.cardType)}</span>
            <div class="card-name">${card.cardName}</div>
            <div class="card-company">${card.companyName ?? 'BNK부산은행'}</div>
            <div class="card-fee">연회비 ${fmtFee(card.annualFeeDomestic)}</div>
          </div>
        </div>
        <!-- 뒷면 -->
        <div class="flip-back">
          <div class="back-card-name">${card.cardName}</div>
          <div class="back-benefit">${benefitLines || benefit}</div>
          <div class="back-actions">
            <button class="btn-detail"
              onclick="location.href='/card-detail.html?cardId=${card.cardId}'">
              자세히
            </button>
            <button class="btn-compare"
              onclick="addToCart(${card.cardId}, '${card.cardName.replace(/'/g,"\\'")}', '${(card.companyName??'').replace(/'/g,"\\'")}')">
              비교
            </button>
            <button class="btn-apply"
              onclick="applyCard(${card.cardId})">
              신청
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════
//  페이지네이션
// ══════════════════════════════════════════════
function renderPagination(totalCount) {
  const totalPages = Math.ceil(totalCount / state.PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  const cur   = state.currentPage;
  const start = Math.max(0, cur - 2);
  const end   = Math.min(totalPages - 1, start + 4);

  let html = `<button class="page-btn" onclick="loadCards(${cur-1})" ${cur===0?'disabled':''}>‹</button>`;
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i===cur?'active':''}" onclick="loadCards(${i})">${i+1}</button>`;
  }
  html += `<button class="page-btn" onclick="loadCards(${cur+1})" ${cur===totalPages-1?'disabled':''}>›</button>`;
  el.innerHTML = html;
}

// ══════════════════════════════════════════════
//  카테고리 필터
// ══════════════════════════════════════════════
function selectCategory(btn, catId) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.currentCategoryId = catId;
  loadCards(0);
}

function resetFilter() {
  document.getElementById('filter-q').value = '';
  document.getElementById('filter-type').value = '';
  state.currentCategoryId = '';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cat-btn[data-category=""]')?.classList.add('active');
  loadCards(0);
}

// ══════════════════════════════════════════════
//  비교 카트
// ══════════════════════════════════════════════
function toggleCart() {
  state.cartOpen = !state.cartOpen;
  document.getElementById('compare-cart').classList.toggle('open', state.cartOpen);
}

function addToCart(cardId, cardName, companyName) {
  if (state.compareCart.find(c => c.cardId === cardId)) {
    toast('이미 비교 카트에 있는 카드입니다.');
    return;
  }
  if (state.compareCart.length >= 3) {
    toast('최대 3개까지 비교할 수 있습니다.');
    return;
  }
  state.compareCart.push({ cardId, cardName, companyName });
  renderCart();
  if (!state.cartOpen) toggleCart();
  toast(`"${cardName}" 비교 카트에 추가됐습니다.`);
}

function removeFromCart(cardId) {
  state.compareCart = state.compareCart.filter(c => c.cardId !== cardId);
  renderCart();
}

function renderCart() {
  const cnt  = state.compareCart.length;
  const wrap = document.getElementById('cart-items');
  const btn  = document.getElementById('btn-do-compare');

  document.getElementById('cart-count').textContent = `(${cnt}/3)`;
  btn.disabled = cnt < 2;

  if (cnt === 0) {
    wrap.innerHTML = '<div class="cart-empty">카드를 추가하세요</div>';
    return;
  }

  wrap.innerHTML = state.compareCart.map(c => `
    <div class="cart-item">
      <div class="cart-item-name">${c.cardName}<br>
        <span style="color:#999;font-size:11px">${c.companyName}</span>
      </div>
      <button class="cart-remove" onclick="removeFromCart(${c.cardId})">✕</button>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════
//  카드 비교 실행
// ══════════════════════════════════════════════
async function doCompare() {
  const cardIds = state.compareCart.map(c => c.cardId);
  if (cardIds.length < 2) { toast('2개 이상 선택하세요.'); return; }

  const res = await fetch('/api/cards/compare', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ cardIds }),
  });
  const json = await res.json().catch(() => null);
  const data = json?.data;

  if (!data?.length) { toast('비교 데이터를 불러올 수 없습니다.'); return; }

  renderCompare(data);

  // 비교 섹션으로 스크롤
  const section = document.getElementById('compare-section');
  section.classList.add('open');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });

  if (state.cartOpen) toggleCart();
}

function renderCompare(cards) {
  const labels = ['카드명', '카드사', '유형', '국내 연회비', '해외 연회비', '주요 혜택'];

  // 카드별 값 추출
  const rows = [
    cards.map(c => c.cardName),
    cards.map(c => c.companyName ?? '-'),
    cards.map(c => cardTypeBadge(c.cardType)),
    cards.map(c => fmtFee(c.annualFeeDomestic)),
    cards.map(c => fmtFee(c.annualFeeOverseas)),
    cards.map(c => {
      const benefits = c.benefits?.slice(0,3) ?? [];
      return benefits.map(b => b.displayText ?? b.benefitTitle).join('<br>') || '-';
    }),
  ];

  const headerCells = cards.map(c =>
    `<th style="text-align:center">${c.cardName}</th>`).join('');

  const bodyRows = rows.map((row, i) => `
    <tr>
      <td class="label-col">${labels[i]}</td>
      ${row.map(v => `<td>${v}</td>`).join('')}
    </tr>
  `).join('');

  document.getElementById('compare-result').innerHTML = `
    <table class="compare-table">
      <thead><tr><th>항목</th>${headerCells}</tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>
  `;
}

function closeCompare() {
  document.getElementById('compare-section').classList.remove('open');
}

// ══════════════════════════════════════════════
//  카드 신청
// ══════════════════════════════════════════════
function applyCard(cardId) {
  // 카드 상세 페이지로 이동 (실제 신청 플로우는 상세 페이지에서 처리)
  location.href = `/card-detail.html?cardId=${cardId}`;
}

// ══════════════════════════════════════════════
//  검색 모달
// ══════════════════════════════════════════════
async function openSearchModal(keyword = '') {
  document.getElementById('search-overlay').classList.add('open');
  const input = document.getElementById('modal-search-input');
  input.value = keyword;
  input.focus();
  document.body.style.overflow = 'hidden';

  // 추천 검색어 로드
  const suggest = await api('/api/search/keywords/suggest');
  const suggestEl = document.getElementById('suggest-list');
  if (suggest?.length) {
    suggestEl.innerHTML = suggest.slice(0, 12).map(kw => `
      <button class="suggest-tag" onclick="modalSetKeyword('${(kw.keyword??kw).replace(/'/g,"\\'")}')">
        ${kw.keyword ?? kw}
      </button>
    `).join('');
  }

  if (keyword) runModalSearch();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('search-overlay')) {
    closeSearchModal();
  }
}

function closeSearchModal() {
  document.getElementById('search-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSearchModal();
});

function modalSetKeyword(kw) {
  document.getElementById('modal-search-input').value = kw;
  runModalSearch();
}

let modalSelectedCat = '';
function modalSelectCategory(btn, catId) {
  document.querySelectorAll('.modal-cat-btn').forEach(b => b.classList.remove('active'));
  if (modalSelectedCat === catId) {
    // 같은 카테고리 클릭 시 해제
    modalSelectedCat = '';
  } else {
    btn.classList.add('active');
    modalSelectedCat = catId;
  }
  runModalSearch();
}

async function runModalSearch() {
  const q   = document.getElementById('modal-search-input').value.trim();
  const cat = modalSelectedCat;

  if (!q && !cat) {
    document.getElementById('modal-results-wrap').style.display = 'none';
    return;
  }

  document.getElementById('modal-results-wrap').style.display = '';
  document.getElementById('modal-result-title').textContent = '검색 중...';
  document.getElementById('modal-results').innerHTML = `
    <div style="text-align:center; padding:20px; color:#999">
      <div class="loading-spinner" style="margin:0 auto 8px"></div>불러오는 중...
    </div>`;

  let url = '/api/cards?page=0&size=10';
  if (q)   url += `&q=${encodeURIComponent(q)}`;
  if (cat) url += `&categoryId=${cat}`;

  const data = await api(url);
  const results = data?.content ?? [];

  document.getElementById('modal-result-title').textContent =
    `검색 결과 (${data?.totalCount ?? 0}건)`;

  if (!results.length) {
    document.getElementById('modal-results').innerHTML =
      '<div style="text-align:center; color:#999; padding:20px">결과가 없습니다.</div>';
    return;
  }

  document.getElementById('modal-results').innerHTML = results.map(card => `
    <div class="modal-result-item" onclick="goDetail(${card.cardId})">
      <div class="modal-result-thumb">
        ${card.thumbnailUrl
          ? `<img src="${card.thumbnailUrl}" alt="${card.cardName}">`
          : ''}
      </div>
      <div class="modal-result-info">
        <div class="modal-result-name">${card.cardName}</div>
        <div class="modal-result-company">${card.companyName ?? ''} · ${cardTypeBadge(card.cardType)}</div>
        ${card.topBenefit
          ? `<div class="modal-result-benefit">${card.topBenefit}</div>` : ''}
      </div>
      <div class="modal-result-actions" onclick="event.stopPropagation()">
        <button class="btn-m-detail" onclick="goDetail(${card.cardId})">상세</button>
        <button class="btn-m-compare"
          onclick="addToCart(${card.cardId},'${card.cardName.replace(/'/g,"\\'")}','${(card.companyName??'').replace(/'/g,"\\'")}'); closeSearchModal()">
          비교
        </button>
      </div>
    </div>
  `).join('');
}

function goDetail(cardId) {
  closeSearchModal();
  location.href = `/card-detail.html?cardId=${cardId}`;
}

// 히어로 검색 입력에서 엔터
document.getElementById('hero-search')
  .addEventListener('keydown', e => {
    if (e.key === 'Enter') openSearchModal(e.target.value.trim());
  });

// ══════════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════════
(async function init() {
  await loadPopularKeywords();
  await loadTop3();
  await loadCards(0);
})();
</script>

</body>
</html>
