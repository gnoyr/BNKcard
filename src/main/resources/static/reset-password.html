<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 — BNK카드</title>
  <style>
    /* ── reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      font-size: 14px;
      background: #f2f2f2;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── header ── */
    header {
      background: #fff;
      border-bottom: 2px solid #DC2626;
      padding: 0 28px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { font-size: 15px; font-weight: 700; color: #DC2626; letter-spacing: -0.3px; }
    .header-sub { font-size: 12px; color: #aaa; }

    /* ── main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── card ── */
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      width: 100%;
      max-width: 460px;
      overflow: hidden;
    }

    /* ── card header band ── */
    .card-head {
      background: #DC2626;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-head-title { color: #fff; font-size: 15px; font-weight: 700; }
    .card-head-sub   { color: rgba(255,255,255,0.65); font-size: 11px; }

    /* ── card body ── */
    .card-body { padding: 32px; }

    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle {
      font-size: 13px;
      color: #888;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    /* ── field ── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #111;
      transition: border-color 0.15s;
    }
    .field input:focus { outline: none; border-color: #DC2626; }
    .field input::placeholder { color: #bbb; }

    /* ── password strength bar ── */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .seg {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: #eee;
      transition: background 0.2s;
    }
    .seg.weak   { background: #DC2626; }
    .seg.medium { background: #f97316; }
    .seg.strong { background: #22c55e; }

    .hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 5px;
      min-height: 16px;
    }
    .hint.ok  { color: #22c55e; }
    .hint.err { color: #DC2626; }

    /* ── submit button ── */
    .btn-submit {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: #DC2626;
      border: none;
      border-radius: 24px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s;
    }
    .btn-submit:hover    { background: #b91c1c; }
    .btn-submit:disabled { background: #f5f5f5; color: #ccc; cursor: not-allowed; }

    /* ── status message ── */
    .msg {
      display: none;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.6;
      margin-top: 14px;
    }
    .msg.ok  { display: block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .msg.err { display: block; background: #fef2f2; color: #DC2626; border: 1px solid #fca5a5; }

    /* ── back link ── */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
      text-decoration: none;
    }
    .back-link:hover { color: #DC2626; }

    /* ── invalid token state ── */
    #invalidState {
      display: none;
      text-align: center;
      padding: 12px 0 4px;
    }
    .invalid-ico {
      width: 56px;
      height: 56px;
      border: 2px solid #fca5a5;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .invalid-ico svg {
      stroke: #DC2626;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      width: 24px;
      height: 24px;
    }
    #invalidState p {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .btn-outline {
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid #DC2626;
      border-radius: 24px;
      color: #DC2626;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .btn-outline:hover { background: #fef2f2; }

    /* ── done state ── */
    #doneState {
      display: none;
      text-align: center;
      padding: 12px 0 4px;
    }
    .done-ico {
      width: 64px;
      height: 64px;
      background: #DC2626;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .done-ico svg {
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      width: 32px;
      height: 32px;
    }
    #doneState h2 { font-size: 18px; margin-bottom: 8px; }
    #doneState p  { font-size: 13px; color: #888; line-height: 1.7; margin-bottom: 20px; }
    .counter {
      font-size: 12px;
      color: #DC2626;
      font-weight: 700;
      padding: 8px 20px;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      display: inline-block;
    }

    /* ── card footer ── */
    .card-foot {
      background: #fafafa;
      border-top: 1px solid #eee;
      padding: 14px 32px;
      font-size: 11px;
      color: #ccc;
      display: flex;
      justify-content: space-between;
    }

    footer {
      padding: 16px;
      text-align: center;
      font-size: 11px;
      color: #ccc;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ════════════════════════
     HEADER
════════════════════════ -->
<header>
  <span class="logo">BNK 부산은행</span>
  <span class="header-sub">카드 서비스</span>
</header>

<!-- ════════════════════════
     MAIN CARD
════════════════════════ -->
<main>
  <div class="card">

    <!-- 카드 헤더 (빨간 띠) -->
    <div class="card-head">
      <span class="card-head-title">비밀번호 재설정</span>
      <span class="card-head-sub">BNK카드</span>
    </div>

    <!-- 카드 본문 -->
    <div class="card-body">

      <!-- ── 토큰 없음 / 만료 상태 ── -->
      <div id="invalidState">
        <div class="invalid-ico">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
        <p>비밀번호 재설정 링크가<br>만료되었거나 올바르지 않습니다.</p>
        <a href="/" class="btn-outline">← 처음으로 돌아가기</a>
      </div>

      <!-- ── 재설정 폼 ── -->
      <div id="formState">
        <h1>새 비밀번호 설정</h1>
        <p class="subtitle">
          새로운 비밀번호를 입력해 주세요.<br>
          변경 후 모든 기기의 로그인 세션이 만료됩니다.
        </p>

        <div class="field">
          <label>새 비밀번호</label>
          <input id="pw" type="password"
                 placeholder="영문 + 숫자 + 특수문자 8자 이상"
                 oninput="onPwInput(this.value)">
          <div class="strength-bar">
            <div class="seg" id="seg1"></div>
            <div class="seg" id="seg2"></div>
            <div class="seg" id="seg3"></div>
            <div class="seg" id="seg4"></div>
          </div>
          <div class="hint" id="strength-hint"></div>
        </div>

        <div class="field">
          <label>비밀번호 확인</label>
          <input id="pw2" type="password"
                 placeholder="비밀번호를 다시 입력하세요"
                 oninput="onPw2Input()">
          <div class="hint" id="match-hint"></div>
        </div>

        <button class="btn-submit" id="submit-btn" onclick="submit()" disabled>
          비밀번호 변경
        </button>

        <div class="msg" id="msg"></div>

        <a href="/" class="back-link">← 로그인으로 돌아가기</a>
      </div>

      <!-- ── 완료 상태 ── -->
      <div id="doneState">
        <div class="done-ico">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>비밀번호가 변경되었습니다</h2>
        <p>
          새 비밀번호로 다시 로그인해 주세요.<br>
          기존 기기의 세션은 모두 만료되었습니다.
        </p>
        <span class="counter" id="redirect-counter">잠시 후 창이 닫힙니다...</span>
      </div>

    </div><!-- /card-body -->

    <!-- 카드 푸터 -->
    <div class="card-foot">
      <span>&copy; BNK카드</span>
      <span>부산광역시 동대신구 수정로 60</span>
    </div>

  </div><!-- /card -->
</main>

<footer>BNK부산은행 카드 플랫폼</footer>

<!-- ════════════════════════
     SCRIPT
════════════════════════ -->
<script>
  const BASE   = 'http://localhost:8080';
  const PW_RE  = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,50}$/;

  // URL ?token= 파라미터 추출
  const token = new URLSearchParams(location.search).get('token');

  // 토큰이 없으면 즉시 invalid 상태 표시
  if (!token) {
    document.getElementById('formState').style.display   = 'none';
    document.getElementById('invalidState').style.display = 'block';
  }

  /* ── 비밀번호 강도 체크 ── */
  function onPwInput(val) {
    const segs  = [1, 2, 3, 4].map(i => document.getElementById('seg' + i));
    const hint  = document.getElementById('strength-hint');

    // 모두 리셋
    segs.forEach(s => s.className = 'seg');

    if (!val) { hint.textContent = ''; toggleBtn(); return; }

    let score = 0;
    if (val.length >= 8)           score++;
    if (/[A-Z]/.test(val))         score++;
    if (/\d/.test(val))            score++;
    if (/[@$!%*#?&]/.test(val))    score++;

    const cls  = score <= 1 ? 'weak'   : score <= 2 ? 'medium' : 'strong';
    const txt  = score <= 1 ? '약함'   : score <= 2 ? '보통'   :
                 score === 3 ? '양호'  : '강함';
    const col  = score <= 1 ? 'err'    : score <= 2 ? ''       : 'ok';

    for (let i = 0; i < score; i++) segs[i].classList.add(cls);
    hint.textContent = `강도: ${txt}`;
    hint.className   = `hint ${col}`;

    onPw2Input();
  }

  /* ── 비밀번호 일치 체크 ── */
  function onPw2Input() {
    const v1   = document.getElementById('pw').value;
    const v2   = document.getElementById('pw2').value;
    const hint = document.getElementById('match-hint');

    if (!v2) { hint.textContent = ''; hint.className = 'hint'; toggleBtn(); return; }

    if (v1 === v2) {
      hint.textContent = '✓ 일치합니다';
      hint.className   = 'hint ok';
    } else {
      hint.textContent = '✗ 비밀번호가 일치하지 않습니다';
      hint.className   = 'hint err';
    }
    toggleBtn();
  }

  /* ── 버튼 활성/비활성 ── */
  function toggleBtn() {
    const pw  = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    document.getElementById('submit-btn').disabled = !(PW_RE.test(pw) && pw === pw2);
  }

  /* ── 제출 ── */
  async function submit() {
    const pw  = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('msg');

    btn.disabled    = true;
    btn.textContent = '변경 중...';
    msg.className   = 'msg';

    try {
      const res = await fetch(`${BASE}/api/auth/reset-password`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token, newPassword: pw, newPasswordConfirm: pw2 }),
      });

      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        // 성공 → 완료 상태 전환 후 창 닫기
        document.getElementById('formState').style.display = 'none';
        document.getElementById('doneState').style.display = 'block';
        setTimeout(() => window.close(), 2000);
      } else {
        // 실패 메시지
        const errMsg = data?.message || '오류가 발생했습니다. 링크가 만료되었을 수 있습니다.';
        msg.className   = 'msg err';
        msg.textContent = errMsg;
        btn.disabled    = false;
        btn.textContent = '비밀번호 변경';
      }
    } catch {
      msg.className   = 'msg err';
      msg.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.';
      btn.disabled    = false;
      btn.textContent = '비밀번호 변경';
    }
  }

</script>

</body>
</html>
