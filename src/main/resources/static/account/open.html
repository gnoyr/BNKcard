<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

    <span style="color:#ccc;">—</span>

    <span id="si-4" style="color:#ccc;">④ 완료</span>
  </div>

  <!-- 각 단계 콘텐츠 -->
  <div id="step-1"><!-- 약관 동의 --></div>
  <div id="step-2" style="display:none;"><!-- 계좌 정보 --></div>
  <div id="step-3" style="display:none;"><!-- 비밀번호 --></div>
  <div id="step-4" style="display:none;"><!-- 완료 --></div>

</main>

<script src="/js/utils.js"></script>
