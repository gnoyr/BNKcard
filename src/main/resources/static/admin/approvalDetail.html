<!-- approval-detail.html?approvalId=1 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결재 상세 | BNK 관리자</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
</head>
<body>

<div id="app-header"></div>

<h2>결재 상세</h2>
<p><a href="/admin/approvalList.html">← 결재 목록</a></p>

<h3>기본 정보</h3>
<table border="1" cellpadding="6" cellspacing="0" id="infoTable">
  <tr><td>로딩 중...</td></tr>
</table>

<br>
<h3>결재 라인</h3>
<table border="1" cellpadding="6" cellspacing="0">
  <thead>
    <tr>
      <th>순서</th>
      <th>결재자</th>
      <th>상태</th>
      <th>의견</th>
      <th>처리일시</th>
    </tr>
  </thead>
  <tbody id="lineTbody">
    <tr><td colspan="5">로딩 중...</td></tr>
  </tbody>
</table>

<br>
<div id="actionArea" style="display:none">
  <h3>결재 처리</h3>
  <p>내 처리 순서 차례입니다.</p>
  <label>의견 (반려 시 필수):
    <input type="text" id="commentInput" placeholder="결재 의견 입력" style="width:300px">
  </label>
  <br><br>
  <button onclick="doApprove()" style="background:#28a745;color:#fff;padding:8px 20px">✔ 승인</button>
  &nbsp;
  <button onclick="doReject()" style="background:#dc3545;color:#fff;padding:8px 20px">✗ 반려</button>
</div>

<br>
<div id="msg"></div>

<script>
  const params     = new URLSearchParams(location.search);
  const approvalId = params.get('approvalId');

  if (!approvalId) {
    document.body.innerHTML = '<p>approvalId 파라미터가 없습니다.</p>';
    throw new Error('no approvalId');
  }

  async function api(method, url, body) {
    const opts = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    return { ok: res.ok, data: await res.json().catch(() => null) };
  }

  async function loadDetail() {
    const r = await api('GET', `/api/admin/approvals/${approvalId}`);
    const infoTable = document.getElementById('infoTable');
    const lineTbody = document.getElementById('lineTbody');
    const actionArea = document.getElementById('actionArea');

    if (!r.ok || !r.data?.data) {
      infoTable.innerHTML = '<tr><td>조회 실패</td></tr>';
      return;
    }

    const a = r.data.data;

    infoTable.innerHTML = `
      <tr><th>결재 ID</th><td>${a.approvalId}</td></tr>
      <tr><th>유형</th><td>${a.requestTypeCode}</td></tr>
      <tr><th>대상</th><td>${a.targetName ?? '-'}</td></tr>
      <tr><th>요청자</th><td>${a.requesterName ?? '-'}</td></tr>
      <tr><th>요청 의견</th><td>${a.requestComment ?? '-'}</td></tr>
      <tr><th>상태</th><td><b>${a.statusCode}</b></td></tr>
      <tr><th>요청일시</th><td>${a.requestedAt ? a.requestedAt.substring(0,16) : '-'}</td></tr>
      <tr><th>완료일시</th><td>${a.completedAt ? a.completedAt.substring(0,16) : '-'}</td></tr>
    `;

    let canProcess = false;
    if (a.lines && a.lines.length > 0) {
      lineTbody.innerHTML = a.lines.map(l => {
        if (l.isCurrentUser) canProcess = true;
        return `
          <tr style="background:${l.isCurrentUser ? '#fffde7' : ''}">
            <td>${l.approvalOrder}</td>
            <td>${l.approverName ?? '-'}${l.isCurrentUser ? ' ★ (내 차례)' : ''}</td>
            <td><b style="color:${l.statusCode === 'PENDING' ? 'orange' : l.statusCode === 'APPROVED' ? 'green' : 'red'}">${l.statusCode}</b></td>
            <td>${l.commentText ?? '-'}</td>
            <td>${l.approvedAt ? l.approvedAt.substring(0,16) : '-'}</td>
          </tr>`;
      }).join('');
    } else {
      lineTbody.innerHTML = '<tr><td colspan="5">결재 라인 없음</td></tr>';
    }

    if (canProcess && a.statusCode === 'PENDING') actionArea.style.display = 'block';
  }

  async function doApprove() {
    const comment = document.getElementById('commentInput').value.trim();
    const r = await api('POST', `/api/admin/approvals/${approvalId}/approve`, { comment });
    const msg = document.getElementById('msg');
    if (r.ok) {
      msg.textContent = '승인 처리 완료';
      document.getElementById('actionArea').style.display = 'none';
      loadDetail();
    } else {
      msg.textContent = '승인 실패: ' + JSON.stringify(r.data);
    }
  }

  async function doReject() {
    const comment = document.getElementById('commentInput').value.trim();
    if (!comment) { alert('반려 시 의견은 필수입니다.'); return; }
    const r = await api('POST', `/api/admin/approvals/${approvalId}/reject`, { comment });
    const msg = document.getElementById('msg');
    if (r.ok) {
      msg.textContent = '반려 처리 완료';
      document.getElementById('actionArea').style.display = 'none';
      loadDetail();
    } else {
      msg.textContent = '반려 실패: ' + JSON.stringify(r.data);
    }
  }

  loadDetail();
</script>

<script src="/js/header.js"></script>
</body>
</html>
