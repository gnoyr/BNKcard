<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 | BNK 관리자</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    body { background:#f0f2f7; font-family:'Pretendard',sans-serif; }
    .wrap { max-width:1200px; margin:32px auto; padding:0 20px; }
    .page-title { font-size:20px; font-weight:700; color:#1a2340; margin-bottom:24px; }

    /* 요약 카드 */
    .summary-grid {
        display:grid; grid-template-columns:repeat(4,1fr);
        gap:16px; margin-bottom:28px;
    }
    .summary-card {
        background:#fff; border-radius:10px; padding:20px 22px;
        box-shadow:0 1px 4px rgba(0,0,0,.07);
    }
    .summary-card .label { font-size:12px; color:#888; font-weight:500; margin-bottom:6px; }
    .summary-card .value { font-size:28px; font-weight:700; color:#1a2340; }
    .summary-card .sub   { font-size:12px; color:#aaa; margin-top:4px; }

    /* 차트 그리드 */
    .chart-grid {
        display:grid; grid-template-columns:1fr 1fr;
        gap:20px; margin-bottom:28px;
    }
    .chart-grid.single { grid-template-columns:1fr; }
    .chart-card {
        background:#fff; border-radius:10px; padding:20px 22px;
        box-shadow:0 1px 4px rgba(0,0,0,.07);
    }
    .chart-card h3 {
        font-size:14px; font-weight:600; color:#1a2340;
        margin-bottom:16px; padding-bottom:10px;
        border-bottom:1px solid #f0f2f7;
    }

    /* 테이블 */
    .table-card {
        background:#fff; border-radius:10px; padding:20px 22px;
        box-shadow:0 1px 4px rgba(0,0,0,.07); margin-bottom:20px;
    }
    .table-card h3 {
        font-size:14px; font-weight:600; color:#1a2340;
        margin-bottom:16px; padding-bottom:10px;
        border-bottom:1px solid #f0f2f7;
        display:flex; justify-content:space-between; align-items:center;
    }
    .table-card h3 a {
        font-size:12px; color:#003087; font-weight:500; text-decoration:none;
    }
    .data-table { width:100%; border-collapse:collapse; font-size:13px; }
    .data-table th {
        text-align:left; padding:8px 10px; color:#888;
        font-weight:600; font-size:12px; border-bottom:1px solid #f0f2f7;
    }
    .data-table td {
        padding:9px 10px; border-bottom:1px solid #f8f9fc; color:#333;
    }
    .data-table tr:last-child td { border-bottom:none; }
    .data-table tr:hover td { background:#f8faff; }

    /* 배지 */
    .badge {
        display:inline-block; padding:2px 8px; border-radius:20px;
        font-size:11px; font-weight:600;
    }
    .badge-approved  { background:#e8f5e9; color:#2e7d32; }
    .badge-rejected  { background:#fff0f0; color:#c62828; }
    .badge-pending   { background:#fff8e1; color:#f57f17; }
    .badge-published { background:#e3f2fd; color:#1565c0; }
    .badge-draft     { background:#f5f5f5; color:#666; }
    .badge-super     { background:#fce4ec; color:#880e4f; }
    .badge-manager   { background:#e8f5e9; color:#1b5e20; }
    .badge-operator  { background:#e3f2fd; color:#0d47a1; }
    .badge-success   { background:#e8f5e9; color:#2e7d32; }
    .badge-fail      { background:#fff0f0; color:#c62828; }

    /* 바로가기 */
    .shortcut-grid {
        display:grid; grid-template-columns:repeat(3,1fr);
        gap:14px; margin-bottom:28px;
    }
    .shortcut-btn {
        background:#fff; border:1px solid #e8eaf0; border-radius:10px;
        padding:16px 20px; text-align:center; cursor:pointer;
        text-decoration:none; color:#1a2340;
        font-size:14px; font-weight:600;
        box-shadow:0 1px 3px rgba(0,0,0,.05);
        transition:all .18s;
        display:block;
    }
    .shortcut-btn:hover {
        border-color:#003087; color:#003087;
        box-shadow:0 2px 8px rgba(0,48,135,.12);
    }
    .shortcut-btn .sc-label { font-size:12px; color:#888;
                               font-weight:400; margin-top:4px; }

    /* 잠금 회원 해제 버튼 */
    .btn-unlock {
        padding:4px 10px; background:#fff3e0; color:#e65100;
        border:none; border-radius:6px; font-size:12px;
        font-weight:600; cursor:pointer;
    }
  </style>
  <link rel="stylesheet" href="/css/admin-nav.css">
</head>
<body>
<div id="app-header"></div>

<div class="wrap">
  <div class="page-title" id="page-title">대시보드</div>

  <!-- 동적으로 렌더링 -->
  <div id="dashboard-root"></div>
</div>

<script>
// ── API 헬퍼 ─────────────────────────────────────────────────────────
async function adminApi(method, url, body) {
    const opts = { method, credentials:'include',
                   headers:{'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res  = await fetch(url, opts);
    const json = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, json };
}

// ── 색상 팔레트 ───────────────────────────────────────────────────────
const COLORS = {
    blue:   '#1565c0',
    green:  '#2e7d32',
    red:    '#c62828',
    orange: '#e65100',
    gray:   '#78909c',
    purple: '#6a1b9a',
    teal:   '#00695c',
    navy:   '#003087',
};
const PALETTE = Object.values(COLORS);

// ── 차트 공통 옵션 ────────────────────────────────────────────────────
const CHART_DEFAULTS = {
    plugins: { legend: { labels: { font: { size: 12 } } } },
    responsive: true,
    maintainAspectRatio: true,
};

// ── 역할별 대시보드 렌더링 진입점 ────────────────────────────────────
async function initDashboard() {
    const r = await adminApi('GET', '/api/admin/dashboard/stats');
    if (!r.ok) {
        document.getElementById('dashboard-root').innerHTML =
            '<p style="color:red;">데이터를 불러오지 못했습니다.</p>';
        return;
    }

    const data     = r.json.data ?? {};
    const roleCode = data.roleCode ?? detectRoleFromStorage();

    if      (roleCode === 'SUPER_ADMIN') renderSuperAdmin(data);
    else if (roleCode === 'MANAGER')     renderManager(data);
    else                                  renderOperator(data);
}

function detectRoleFromStorage() {
    // 헤더에서 역할 확인 (fallback)
    return sessionStorage.getItem('bnk_admin_role') ?? 'OPERATOR';
}

// ════════════════════════════════════════════════════════════════════
// SUPER_ADMIN
// ════════════════════════════════════════════════════════════════════
function renderSuperAdmin(data) {
    document.getElementById('page-title').textContent = '대시보드 — 최상위 관리자';
    const root = document.getElementById('dashboard-root');

    root.innerHTML = `
        <!-- 요약 카드 -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="label">전체 회원</div>
                <div class="value">${(data.totalUsers ?? 0).toLocaleString()}</div>
                <div class="sub">오늘 가입 ${data.todaySignup ?? 0}명</div>
            </div>
            <div class="summary-card">
                <div class="label">정지 계정</div>
                <div class="value">${(data.suspendedUsers ?? 0).toLocaleString()}</div>
                <div class="sub">관리 필요</div>
            </div>
            <div class="summary-card">
                <div class="label">게시중 카드</div>
                <div class="value" id="sa-published-card">-</div>
                <div class="sub">전체 카드 현황</div>
            </div>
            <div class="summary-card">
                <div class="label">전체 관리자</div>
                <div class="value" id="sa-total-admin">-</div>
                <div class="sub">역할별 현황</div>
            </div>
        </div>

        <!-- 바로가기 -->
        <div class="shortcut-grid">
            <a href="/admin/cardManage.html" class="shortcut-btn">
                카드 / 약관 관리
                <div class="sc-label">카드 등록, 약관 관리</div>
            </a>
            <a href="/admin/admins.html" class="shortcut-btn">
                관리자 계정 관리
                <div class="sc-label">계정 등록, 역할 변경</div>
            </a>
            <a href="/admin/logs.html" class="shortcut-btn">
                상세 로그 조회
                <div class="sc-label">감사 로그, 활동 로그</div>
            </a>
        </div>

        <!-- 차트 -->
        <div class="chart-grid">
            <div class="chart-card">
                <h3>카드 상태 분포</h3>
                <canvas id="chart-cards"></canvas>
            </div>
            <div class="chart-card">
                <h3>관리자 역할 분포</h3>
                <canvas id="chart-admins"></canvas>
            </div>
            <div class="chart-card">
                <h3>최근 7일 결재 처리 현황</h3>
                <canvas id="chart-approvals"></canvas>
            </div>
            <div class="chart-card">
                <h3>최근 7일 회원 가입 추이</h3>
                <canvas id="chart-signup"></canvas>
            </div>
        </div>

        <!-- 최근 관리자 활동 -->
        <div class="table-card">
            <h3>
                최근 관리자 활동
                <a href="/admin/logs.html">전체 보기</a>
            </h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>관리자</th><th>역할</th><th>액션</th>
                        <th>결과</th><th>대상</th><th>일시</th>
                    </tr>
                </thead>
                <tbody id="sa-activity-tbody">
                    <tr><td colspan="6" style="text-align:center;color:#999;">
                        불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
    `;

    // 카드 상태 도넛
    const cardStatus = data.cardsByStatus ?? [];
    drawDoughnut('chart-cards',
        cardStatus.map(d => d.STATUS ?? d.status),
        cardStatus.map(d => d.CNT    ?? d.cnt));

    // 게시중 카드 수
    const published = cardStatus.find(d =>
        (d.STATUS ?? d.status) === 'PUBLISHED');
    document.getElementById('sa-published-card').textContent =
        published ? (published.CNT ?? published.cnt) : 0;

    // 관리자 역할 도넛
    const adminRole = data.adminsByRole ?? [];
    drawDoughnut('chart-admins',
        adminRole.map(d => d.ROLECODE ?? d.roleCode),
        adminRole.map(d => d.CNT      ?? d.cnt));

    // 전체 관리자 수
    const totalAdmin = adminRole.reduce((s, d) =>
        s + Number(d.CNT ?? d.cnt ?? 0), 0);
    document.getElementById('sa-total-admin').textContent = totalAdmin;

    // 결재 처리 막대
    drawApprovalBar('chart-approvals', data.approvalsByDay ?? []);

    // 회원 가입 라인
    drawSignupLine('chart-signup', data.signupByDay ?? []);

    // 활동 로그 테이블
    const tbody = document.getElementById('sa-activity-tbody');
    const acts  = data.recentAdminActivity ?? [];
    if (!acts.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">데이터 없음</td></tr>';
    } else {
        tbody.innerHTML = acts.map(a => `
            <tr>
                <td>${a.ADMINNAME  ?? a.adminName  ?? '-'}</td>
                <td>${roleBadge(a.ROLECODE ?? a.roleCode)}</td>
                <td>${a.ACTION     ?? a.action     ?? '-'}</td>
                <td>${resultBadge(a.RESULT ?? a.result)}</td>
                <td style="font-size:12px;color:#888;">
                    ${a.TARGETID   ?? a.targetId   ?? '-'}</td>
                <td style="font-size:12px;color:#888;">
                    ${a.OCCURREDAT ?? a.occurredAt ?? '-'}</td>
            </tr>`).join('');
    }
}

// ════════════════════════════════════════════════════════════════════
// MANAGER
// ════════════════════════════════════════════════════════════════════
function renderManager(data) {
    document.getElementById('page-title').textContent = '대시보드 — 중간 관리자';
    const root = document.getElementById('dashboard-root');

    const pending = data.pendingApprovals ?? [];

    root.innerHTML = `
        <!-- 요약 카드 -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="label">대기중 결재</div>
                <div class="value">${pending.length}</div>
                <div class="sub">처리 필요</div>
            </div>
            <div class="summary-card">
                <div class="label">게시중 카드</div>
                <div class="value" id="mg-published-card">-</div>
                <div class="sub">카드 현황</div>
            </div>
            <div class="summary-card">
                <div class="label">게시중 약관</div>
                <div class="value" id="mg-published-terms">-</div>
                <div class="sub">약관 현황</div>
            </div>
            <div class="summary-card">
                <div class="label">이번달 처리</div>
                <div class="value" id="mg-my-total">-</div>
                <div class="sub">내 결재 처리 건수</div>
            </div>
        </div>

        <!-- 바로가기 -->
        <div class="shortcut-grid">
            <a href="/admin/cardManage.html" class="shortcut-btn">
                카드 / 약관 관리
                <div class="sc-label">카드 등록, 약관 관리</div>
            </a>
            <a href="/admin/cardManage.html#approvals" class="shortcut-btn">
                결재 처리
                <div class="sc-label">대기중 결재 목록</div>
            </a>
            <a href="/admin/logs.html" class="shortcut-btn">
                상세 로그 조회

        </div>

        <!-- 차트 -->
        <div class="chart-grid">
            <div class="chart-card">
                <h3>카드 상태 분포</h3>
                <canvas id="chart-cards"></canvas>
            </div>
            <div class="chart-card">
                <h3>약관 상태 분포</h3>
                <canvas id="chart-terms"></canvas>
            </div>
            <div class="chart-card" style="grid-column:1/-1;">
                <h3>이번달 내 결재 처리 현황</h3>
                <canvas id="chart-my-approvals"></canvas>
            </div>
        </div>

        <!-- 대기중 결재 -->
        <div class="table-card">
            <h3>
                대기중 결재 목록
                <a href="/admin/cardManage.html">결재 페이지로</a>
            </h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>결재 ID</th><th>유형</th><th>대상</th>
                        <th>요청자</th><th>요청일시</th>
                    </tr>
                </thead>
                <tbody id="mg-pending-tbody"></tbody>
            </table>
        </div>

        <!-- 내 최근 활동 -->
        <div class="table-card">
            <h3>
                내 최근 활동
                <a href="/admin/logs.html">전체 보기</a>
            </h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>액션</th><th>결과</th><th>대상</th><th>일시</th>
                    </tr>
                </thead>
                <tbody id="mg-activity-tbody"></tbody>
            </table>
        </div>
    `;

    // 카드 도넛
    const cardStatus = data.cardsByStatus ?? [];
    drawDoughnut('chart-cards',
        cardStatus.map(d => d.STATUS ?? d.status),
        cardStatus.map(d => d.CNT    ?? d.cnt));

    const publishedCard = cardStatus.find(d =>
        (d.STATUS ?? d.status) === 'PUBLISHED');
    document.getElementById('mg-published-card').textContent =
        publishedCard ? (publishedCard.CNT ?? publishedCard.cnt) : 0;

    // 약관 도넛
    const termsStatus = data.termsByStatus ?? [];
    drawDoughnut('chart-terms',
        termsStatus.map(d => d.STATUS ?? d.status),
        termsStatus.map(d => d.CNT    ?? d.cnt));

    const publishedTerms = termsStatus.find(d =>
        (d.STATUS ?? d.status) === 'PUBLISHED');
    document.getElementById('mg-published-terms').textContent =
        publishedTerms ? (publishedTerms.CNT ?? publishedTerms.cnt) : 0;

    // 내 결재 막대
    const myApprovals = data.myApprovalsByDay ?? [];
    drawApprovalBar('chart-my-approvals', myApprovals);

    // 이번달 내 결재 총 건수
    const myTotal = myApprovals.reduce((s, d) =>
        s + Number(d.CNT ?? d.cnt ?? 0), 0);
    document.getElementById('mg-my-total').textContent = myTotal;

    // 대기중 결재 테이블
    const pendingTbody = document.getElementById('mg-pending-tbody');
    if (!pending.length) {
        pendingTbody.innerHTML =
            '<tr><td colspan="5" style="text-align:center;color:#999;">대기중 결재 없음</td></tr>';
    } else {
        pendingTbody.innerHTML = pending.map(a => `
            <tr>
                <td>${a.APPROVALID    ?? a.approvalId    ?? '-'}</td>
                <td>${a.APPROVALTYPE  ?? a.approvalType  ?? '-'}</td>
                <td>${a.TARGETNAME    ?? a.targetName    ?? '-'}</td>
                <td>${a.REQUESTERNAME ?? a.requesterName ?? '-'}</td>
                <td style="font-size:12px;color:#888;">
                    ${a.CREATEDAT     ?? a.createdAt     ?? '-'}</td>
            </tr>`).join('');
    }

    // 내 최근 활동 테이블
    renderActivityTable('mg-activity-tbody', data.myRecentActivity ?? []);
}

        </div>
    `;

    // 회원 상태 도넛
    const userStatus = data.usersByStatus ?? [];
    drawDoughnut('chart-users',
        userStatus.map(d => d.STATUS ?? d.status),
        userStatus.map(d => d.CNT    ?? d.cnt));

    // 키워드 TOP5 가로 막대
    const keywords = data.topKeywords ?? [];
    document.getElementById('op-keyword-cnt').textContent = keywords.length;
    new Chart(document.getElementById('chart-keywords'), {
        type: 'bar',
        data: {
            labels:   keywords.map(d => d.KEYWORD  ?? d.keyword  ?? '-'),
            datasets: [{
                label: '검색 횟수',
                data:  keywords.map(d => d.CNT ?? d.cnt ?? 0),
                backgroundColor: PALETTE.slice(0, keywords.length),
                borderRadius: 6,
            }]
        },
        options: {
            ...CHART_DEFAULTS,
            indexAxis: 'y',
            plugins: { legend: { display: false } },
            scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } }
        }
    });

    // 로그인 추이 라인
    drawLoginLine('chart-login', data.loginByDay ?? []);

    // 잠금 회원 테이블
    const lockedTbody = document.getElementById('op-locked-tbody');
    if (!lockedUsers.length) {
        lockedTbody.innerHTML =
            '<tr><td colspan="5" style="text-align:center;color:#999;">잠금 회원 없음</td></tr>';
    } else {
        lockedTbody.innerHTML = lockedUsers.map(u => `
            <tr>
                <td>${u.USERID      ?? u.userId      ?? '-'}</td>
                <td>${u.NAME        ?? u.name        ?? '-'}</td>
                <td>${u.FAILCOUNT   ?? u.failCount   ?? '-'}</td>
                <td style="font-size:12px;color:#888;">
                    ${u.LOCKEDUNTIL ?? u.lockedUntil ?? '-'}</td>
                <td>
                    <button class="btn-unlock"
                            onclick="unlockUser(${u.USERID ?? u.userId})">
                        잠금 해제
                    </button>
                </td>
            </tr>`).join('');
    }

    // 내 최근 활동 테이블
    renderActivityTable('op-activity-tbody', data.myRecentActivity ?? []);
}

// ════════════════════════════════════════════════════════════════════
// 공통 차트 함수
// ════════════════════════════════════════════════════════════════════

function drawDoughnut(canvasId, labels, values) {
    new Chart(document.getElementById(canvasId), {
        type: 'doughnut',
        data: {
            labels,
            datasets: [{
                data: values,
                backgroundColor: PALETTE.slice(0, labels.length),
                borderWidth: 2,
                borderColor: '#fff',
            }]
        },
        options: {
            ...CHART_DEFAULTS,
            plugins: {
                legend: { position: 'right',
                          labels: { font: { size: 12 }, padding: 12 } }
            }
        }
    });
}

function drawApprovalBar(canvasId, rawData) {
    // rawData: [{day, status, cnt}, ...]
    const days     = [...new Set(rawData.map(d => d.DAY ?? d.day))].sort();
    const approved = days.map(day => {
        const found = rawData.find(d =>
            (d.DAY ?? d.day) === day &&
            (d.STATUS ?? d.status) === 'APPROVED');
        return found ? Number(found.CNT ?? found.cnt) : 0;
    });
    const rejected = days.map(day => {
        const found = rawData.find(d =>
            (d.DAY ?? d.day) === day &&
            (d.STATUS ?? d.status) === 'REJECTED');
        return found ? Number(found.CNT ?? found.cnt) : 0;
    });

    new Chart(document.getElementById(canvasId), {
        type: 'bar',
        data: {
            labels: days,
            datasets: [
                { label: '승인', data: approved,
                  backgroundColor: COLORS.green, borderRadius: 4 },
                { label: '반려', data: rejected,
                  backgroundColor: COLORS.red,   borderRadius: 4 },
            ]
        },
        options: {
            ...CHART_DEFAULTS,
            scales: { x: { stacked: false }, y: { beginAtZero: true } }
        }
    });
}

function drawSignupLine(canvasId, rawData) {
    const days  = rawData.map(d => d.DAY ?? d.day);
    const cnts  = rawData.map(d => Number(d.CNT ?? d.cnt ?? 0));

    new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
            labels: days,
            datasets: [{
                label: '가입자 수',
                data: cnts,
                borderColor: COLORS.blue,
                backgroundColor: 'rgba(21,101,192,.08)',
                fill: true,
                tension: 0.4,
                pointRadius: 4,
            }]
        },
        options: {
            ...CHART_DEFAULTS,
            scales: { y: { beginAtZero: true } }
        }
    });
}

function drawLoginLine(canvasId, rawData) {
    const days    = [...new Set(rawData.map(d => d.DAY ?? d.day))].sort();
    const success = days.map(day => {
        const found = rawData.find(d =>
            (d.DAY ?? d.day) === day &&
            (d.RESULT ?? d.result) === 'S');
        return found ? Number(found.CNT ?? found.cnt) : 0;
    });
    const fail = days.map(day => {
        const found = rawData.find(d =>
            (d.DAY ?? d.day) === day &&
            (d.RESULT ?? d.result) === 'F');
        return found ? Number(found.CNT ?? found.cnt) : 0;
    });

    new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
            labels: days,
            datasets: [
                { label: '성공', data: success,
                  borderColor: COLORS.green,
                  backgroundColor: 'rgba(46,125,50,.08)',
                  fill: true, tension: 0.4, pointRadius: 4 },
                { label: '실패', data: fail,
                  borderColor: COLORS.red,
                  backgroundColor: 'rgba(198,40,40,.08)',
                  fill: true, tension: 0.4, pointRadius: 4 },
            ]
        },
        options: {
            ...CHART_DEFAULTS,
            scales: { y: { beginAtZero: true } }
        }
    });
}

// ── 공통 활동 테이블 ──────────────────────────────────────────────────
function renderActivityTable(tbodyId, acts) {
    const tbody = document.getElementById(tbodyId);
    if (!acts.length) {
        tbody.innerHTML =
            '<tr><td colspan="4" style="text-align:center;color:#999;">데이터 없음</td></tr>';
        return;
    }
    tbody.innerHTML = acts.map(a => `
        <tr>
            <td>${a.ACTION     ?? a.action     ?? '-'}</td>
            <td>${resultBadge(a.RESULT ?? a.result)}</td>
            <td style="font-size:12px;color:#888;">
                ${a.TARGETID   ?? a.targetId   ?? '-'}</td>
            <td style="font-size:12px;color:#888;">
                ${a.OCCURREDAT ?? a.occurredAt ?? '-'}</td>
        </tr>`).join('');
}

// ── 배지 헬퍼 ────────────────────────────────────────────────────────
function roleBadge(code) {
    const cls = code === 'SUPER_ADMIN' ? 'badge-super'
              : code === 'MANAGER'     ? 'badge-manager'
              : 'badge-operator';
    return `<span class="badge ${cls}">${code ?? '-'}</span>`;
}

function resultBadge(result) {
    const cls   = result === 'S' ? 'badge-success' : 'badge-fail';
    const label = result === 'S' ? '성공' : '실패';
    return `<span class="badge ${cls}">${label}</span>`;
}

// ── 잠금 해제 ────────────────────────────────────────────────────────
async function unlockUser(userId) {
    if (!confirm('잠금을 해제하시겠습니까?')) return;
    const r = await adminApi('PATCH', `/api/admin/users/${userId}/unlock`, {});
    if (!r.ok) { alert('처리 실패: ' + (r.json?.message ?? '오류')); return; }
    alert('잠금이 해제되었습니다.');
    initDashboard();
}

// ── 초기화 ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => initDashboard());
