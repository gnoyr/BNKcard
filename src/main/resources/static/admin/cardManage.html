<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카드 관리</title>
</head>
<body>


<!-- ===================== 카드 목록 화면 ===================== -->
<div class="page">

  <div class="header">
    <div>
      <div class="page-title">카드 관리</div>
      <div class="card-count">전체 카드 <strong id="totalCount">-</strong>개</div>
    </div>
    <a href="/admin/cards/new">＋ 카드 등록 신청</a>
  </div>

  <div class="filters">
	<input
	  type="text"
	  id="searchKeyword"
	  placeholder="카드명, 카드사명, 키워드 검색..."
	  onkeydown="if(event.key==='Enter') loadCards(0)"
	/>
	<select id="filterType">
	  <option value="">전체 유형</option>
	  <option value="CREDIT">신용</option>
	  <option value="CHECK">체크</option>
	  <option value="PREPAID">선불</option>
	</select>
	<select id="filterStatus">
	  <option value="">전체 상태</option>
	  <option value="DRAFT">초안</option>
	  <option value="REVIEW">심사중</option>
	  <option value="APPROVED">승인</option>
	  <option value="PUBLISHED">게시중</option>
	  <option value="STOPPED">중단</option>
	  <option value="EXPIRED">만료</option>
	</select>
	<input type="date" id="publishStartFrom" />
	~
	<input type="date" id="publishStartTo" />
	<button onclick="loadCards(0)">검색</button>
	<button onclick="resetSearch()">초기화</button>
  </div>

  <table border="1">
	<thead>
	  <tr>
	    <th>카드 ID</th>
	    <th>카드명</th>
	    <th>카드사</th>
	    <th>유형</th>
	    <th>상태</th>
	    <th>배포기간</th>
	  </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="6">불러오는 중...</td></tr>
    </tbody>
  </table>

  <div id="pagination"></div>

</div>


<!-- ===================== 카드 상세 화면 ===================== -->



<script>
	let currentPage = 0;
	const PAGE_SIZE = 20;
	
	const TYPE_LABEL = { CREDIT: '신용', CHECK: '체크', PREPAID: '선불' };
	const STAT_LABEL = {
	  DRAFT:     '초안',
	  REVIEW:    '심사중',
	  APPROVED:  '승인',
	  PUBLISHED: '게시중',
	  STOPPED:   '중단',
	  EXPIRED:   '만료',
	};	
	
	function renderTable(items) {
	  const tbody = document.getElementById('tableBody');

	  if (!items || items.length === 0) {
	    tbody.innerHTML = `<tr><td colspan="6">조회된 카드가 없습니다.</td></tr>`;
	    return;
	  }

	  tbody.innerHTML = items.map(card => `
	    <tr>
	      <td>${card.cardId}</td>
	      <td>${card.cardName}</td>
	      <td>${card.companyName}</td>
	      <td>${TYPE_LABEL[card.cardType] ?? card.cardType}</td>
	      <td>${STAT_LABEL[card.cardStatus] ?? card.cardStatus ?? '-'}</td>
	      <td>${formatPeriod(card.publishStartAt, card.publishEndAt)}</td>
	    </tr>
	  `).join('');
	}
	
	function formatPeriod(from, to) {
	  const f = from ? from.slice(0, 10) : '';
	  const t = to   ? to.slice(0, 10)   : '';
	  return `${f} ~ ${t}`;
	}
	
	function renderPagination(totalCount) {
	  const totalPages = Math.ceil(totalCount / PAGE_SIZE);
	  const pg = document.getElementById('pagination');

	  if (totalPages <= 1) { pg.innerHTML = ''; return; }

	  const startPage = Math.max(0, currentPage - 2);
	  const endPage   = Math.min(totalPages - 1, startPage + 4);

	  let html = `<button data-page="${currentPage - 1}"
	                ${currentPage === 0 ? 'disabled' : ''}>이전</button> `;

	  for (let i = startPage; i <= endPage; i++) {
	    html += `<button data-page="${i}"
	               style="${i === currentPage ? 'font-weight:bold; text-decoration:underline;' : ''}"
	             >${i + 1}</button> `;
	  }

	  html += `<button data-page="${currentPage + 1}"
	             ${currentPage === totalPages - 1 ? 'disabled' : ''}>다음</button>`;

	  pg.innerHTML = html;
	  pg.querySelectorAll('button[data-page]:not([disabled])').forEach(btn => {
	    btn.addEventListener('click', () => loadCards(Number(btn.dataset.page)));
	  });
	}

	async function fetchCards(page) {
	  const keyword         = document.getElementById('searchKeyword').value.trim();
	  const cardType        = document.getElementById('filterType').value;
	  const cardStatus      = document.getElementById('filterStatus').value;
	  const publishStartFrom = document.getElementById('publishStartFrom').value;
	  const publishStartTo   = document.getElementById('publishStartTo').value;

	  const params = new URLSearchParams({ page, size: PAGE_SIZE });
	  if (keyword)          params.set('keyword', keyword);
	  if (cardType)         params.set('cardType', cardType);
	  if (cardStatus)       params.set('cardStatus', cardStatus);
	  if (publishStartFrom) params.set('publishStartFrom', publishStartFrom + 'T00:00:00');
	  if (publishStartTo)   params.set('publishStartTo',   publishStartTo   + 'T23:59:59');

	  const res = await fetch(`/api/admin/cards?${params}`, { credentials: 'include' });
	  if (res.status === 401) { location.href = '/admin/login'; return; }
	  if (!res.ok) throw new Error(`서버 오류 (${res.status})`);

	  const json = await res.json();
	  return json.data;
	}
	
	async function loadCards(page = 0) {
	  currentPage = page;
	
	  document.getElementById('tableBody').innerHTML =
	    `<tr><td colspan="6">불러오는 중...</td></tr>`;
	  document.getElementById('pagination').innerHTML = '';
	
	  try {
	    const pageData = await fetchCards(page);
	
	    document.getElementById('totalCount').textContent =
	      pageData.totalCount.toLocaleString();
	
	    renderTable(pageData.content);
	    renderPagination(pageData.totalCount);
	
	  } catch (err) {
	    document.getElementById('tableBody').innerHTML =
	      `<tr><td colspan="6">오류: ${err.message}</td></tr>`;
	  }
	}
	
	function resetSearch() {
	  document.getElementById('searchKeyword').value   = '';
	  document.getElementById('filterType').value      = '';
	  document.getElementById('filterStatus').value    = '';
	  document.getElementById('publishStartFrom').value = '';
	  document.getElementById('publishStartTo').value   = '';
	  loadCards(0);
	}
	
	loadCards(0);
</script>

</body>
</html>
