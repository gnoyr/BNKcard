<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>결재 신청서 목록</title>
</head>
<body>

  <h2>결재 신청서 목록</h2>
  <span id="total-count"></span>

  <!-- 검색 필터 -->
  <div>
    <select id="filter-status">
      <option value="">전체 상태</option>
      <option value="PENDING">대기</option>
      <option value="APPROVED">승인</option>
      <option value="REJECTED">반려</option>
    </select>

    <select id="filter-type">
      <option value="">전체 유형</option>
      <option value="CARD_PUBLISH">카드 등록</option>
      <option value="CARD_UPDATE">카드 수정</option>
      <option value="TERMS_PUBLISH">약관 등록</option>
    </select>

    <button id="btn-search">검색</button>
  </div>

  <!-- 테이블 -->
  <table border="1">
    <thead>
      <tr>
        <th>번호</th>
        <th>유형</th>
        <th>요청자</th>    
        <th>요청일시</th>
        <th>상태</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <!-- 페이지네이션 -->
  <div id="pagination"></div>

  <script>
    const TYPE_LABEL = {
      CARD_PUBLISH:  '카드 등록',
      CARD_UPDATE:   '카드 수정',
      TERMS_PUBLISH: '약관 등록',
    };
    const STATUS_LABEL = { PENDING: '대기', APPROVED: '승인', REJECTED: '반려' };

    let currentPage = 0;
    const PAGE_SIZE = 20;

    function formatDate(dt) {
      if (!dt) return '-';
      return new Date(dt).toLocaleString('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit',
      });
    }

    function renderTable(items) {
      const tbody = document.getElementById('table-body');
      if (!items || items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5">결재 신청 내역이 없습니다.</td></tr>`;
        return;
      }
      
      tbody.innerHTML = items.map((item, index) => `
      <tr data-id="${item.approvalId}" style="cursor:pointer;">
        <td>${index + 1}</td>
        <td>${TYPE_LABEL[item.requestTypeCode] ?? item.requestTypeCode}</td>
        <td>${item.requesterName ?? '-'}</td>
        <td>${formatDate(item.requestedAt)}</td>
        <td>${STATUS_LABEL[item.statusCode] ?? item.statusCode}</td>
      </tr>
    `).join('');

      tbody.querySelectorAll('tr[data-id]').forEach(row => {
        row.addEventListener('click', () => {
          location.href = `/admin/approvals/detail.html?id=${row.dataset.id}`;
        });
      });
    }

    function renderPagination(totalCount) {
   	  const totalPages = Math.ceil(totalCount / PAGE_SIZE);
   	  const el = document.getElementById('pagination');

   	  if (totalPages <= 1) { el.innerHTML = ''; return; }

   	  const startPage = Math.max(0, currentPage - 2);
   	  const endPage   = Math.min(totalPages - 1, startPage + 4);

   	  let html = `<button data-page="${currentPage - 1}"
   	                ${currentPage === 0 ? 'disabled' : ''}>&lsaquo;</button> `;

   	  for (let i = startPage; i <= endPage; i++) {
   	    html += `<button data-page="${i}"
   	               ${i === currentPage ? 'disabled' : ''}>${i + 1}</button> `;
   	  }

   	  html += `<button data-page="${currentPage + 1}"
   	             ${currentPage === totalPages - 1 ? 'disabled' : ''}>&rsaquo;</button>`;

   	  el.innerHTML = html;
   	  el.querySelectorAll('button[data-page]:not([disabled])').forEach(btn => {
   	    btn.addEventListener('click', () => load(Number(btn.dataset.page)));
   	  });
   	}

    async function fetchApprovals(page) {
      const status = document.getElementById('filter-status').value;
      const type   = document.getElementById('filter-type').value;
      const params = new URLSearchParams({ page, size: PAGE_SIZE });
      if (status) params.set('statusCode', status);
      if (type)   params.set('requestTypeCode', type);

      const res  = await fetch(`/api/admin/approvals?${params}`, { credentials: 'include' });
      if (!res.ok) throw new Error(res.status);
      const json = await res.json();
      return json.data; // PageResponse
    }
    
    async function load(page) {
      currentPage = page;
      document.getElementById('table-body').innerHTML =
        `<tr><td colspan="5">불러오는 중...</td></tr>`;
      try {
        const data = await fetchApprovals(page);
        document.getElementById('total-count').textContent = `총 ${data.totalCount ?? 0}건`;
        renderTable(data.content);
        renderPagination(data.totalCount);
      } catch (e) {
        document.getElementById('table-body').innerHTML =
          `<tr><td colspan="5">데이터를 불러오지 못했습니다. (${e.message})</td></tr>`;
      }
    }

    document.getElementById('btn-search').addEventListener('click', () => load(0));

    // 페이지 진입 시 바로 전체 조회
    load(0);
  </script>

</body>
</html>
