<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 관리</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
</head>
<body>

<!-- ===================== 회원 목록 화면 ===================== -->
<div id="page-list">

  <h2>회원 목록</h2>
  <span id="total-count"></span>

  <!-- 검색 필터 -->
  <div>
	<select id="filter-field">
	  <option value="name">이름</option>
	  <option value="email">이메일</option>
	  <option value="phone">전화번호</option>
	  <option value="birth">생년월일</option>
	</select>
	
	<input type="text" id="filter-value" placeholder="이름을 입력하세요">
	
	<span id="date-range-wrap" style="display:none;">
	  <input type="date" id="filter-birth-from">
	  ~
	  <input type="date" id="filter-birth-to">
	</span>
	
	<select id="filter-status">
	  <option value="">전체 상태</option>
	  <option value="ACTIVE">활성</option>
	  <option value="SUSPENDED">정지</option>
	  <option value="DORMANT">휴면</option>
	  <option value="WITHDRAWN">탈퇴</option>
	</select>
	
	<button id="btn-search">검색</button>
	<button id="btn-reset">초기화</button>
  </div>

  <!-- 테이블 -->
  <table border="1">
    <thead>
      <tr>
        <th>번호</th>
        <th>이름</th>
        <th>이메일</th>
        <th>전화번호</th>
        <th>생년월일</th>
        <th>상태</th>
        <th>가입일</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <!-- 페이지네이션 -->
  <div id="pagination"></div>

</div>

<!-- ===================== 회원 상세 화면 ===================== -->
<div id="page-detail" style="display:none;">

  <button id="btn-back">← 목록으로</button>
  <h2>회원 상세</h2>

  <!-- 기본 정보 -->
  <h3>기본 정보</h3>
  <table border="1">
    <tbody id="detail-info"></tbody>
  </table>

  <!-- 계정 제어 -->
  <h3>계정 제어</h3>
  <div>
    <label>상태 변경:</label>
    <select id="select-status">
      <option value="ACTIVE">활성 (ACTIVE)</option>
      <option value="SUSPENDED">정지 (SUSPENDED)</option>
      <option value="DORMANT">휴면 (DORMANT)</option>
      <option value="WITHDRAWN">탈퇴 (WITHDRAWN)</option>
    </select>
    <button id="btn-change-status">상태 변경</button>

    &nbsp;&nbsp;

    <button id="btn-unlock">계정 잠금 강제 해제</button>
  </div>

  <!-- 로그인 이력 -->
  <h3>로그인 이력 (최근 5건)</h3>
  <table border="1">
    <thead>
      <tr>
        <th>로그인 일시</th>
        <th>결과</th>
        <th>실패 사유</th>
        <th>IP</th>
      </tr>
    </thead>
    <tbody id="detail-login-histories"></tbody>
  </table>

  <!-- 약관 동의 -->
  <h3>약관 동의 내역</h3>
  <table border="1">
    <thead>
      <tr>
        <th>약관명</th>
        <th>동의 여부</th>
        <th>동의 일시</th>
      </tr>
    </thead>
    <tbody id="detail-agreements"></tbody>
  </table>

</div>

<script>
  const API_BASE = '/api/admin';

  let currentPage = 0;
  const PAGE_SIZE = 20;
  let currentUserId = null;

  function fmt(v) {
    if (!v) return '-';
    return new Date(v).toLocaleString('ko-KR');
  }

  function showList() {
    document.getElementById('page-list').style.display = '';
    document.getElementById('page-detail').style.display = 'none';
  }

  function showDetail() {
    document.getElementById('page-list').style.display = 'none';
    document.getElementById('page-detail').style.display = '';
  }

  document.getElementById('filter-field').addEventListener('change', function () {
    const isBirth = this.value === 'birth';
    document.getElementById('filter-value').style.display = isBirth ? 'none' : '';
    document.getElementById('date-range-wrap').style.display = isBirth ? '' : 'none';
    const labels = { name:'이름을 입력하세요', email:'이메일을 입력하세요', phone:'전화번호를 입력하세요' };
    document.getElementById('filter-value').placeholder = labels[this.value] ?? '';
  });

  function buildQuery(page) {
    const params = new URLSearchParams();
    const field  = document.getElementById('filter-field').value;
    const value  = document.getElementById('filter-value').value.trim();
    const status = document.getElementById('filter-status').value;
    const from   = document.getElementById('filter-birth-from').value;
    const to     = document.getElementById('filter-birth-to').value;

    if (field === 'name'  && value)  params.set('name', value);
    if (field === 'email' && value)  params.set('email', value);
    if (field === 'phone' && value)  params.set('phone', value);
    if (field === 'birth') {
      if (from) params.set('birthDateFrom', from);
      if (to)   params.set('birthDateTo', to);
    }
    if (status) params.set('statusCode', status);
    params.set('page', page);
    params.set('size', PAGE_SIZE);

    return params.toString();
  }

  function resetSearch() {
    document.getElementById('filter-field').value = 'name';
    document.getElementById('filter-value').value = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-birth-from').value = '';
    document.getElementById('filter-birth-to').value = '';
    document.getElementById('filter-value').style.display = '';
    document.getElementById('date-range-wrap').style.display = 'none';
  }

  async function fetchUserList(page) {
    currentPage = page;
    const qs = buildQuery(page);
    try {
      const res = await fetch(`${API_BASE}/users?${qs}`, { credentials: 'include' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const data = json.data;
      renderUserTable(data.content ?? []);
      renderPagination(data.totalCount ?? 0, data.currentPage ?? page, data.pageSize ?? PAGE_SIZE);
      document.getElementById('total-count').textContent = `총 ${(data.totalCount ?? 0).toLocaleString()}명`;
    } catch (e) {
      alert('목록 조회 실패: ' + e.message);
    }
  }

  function renderUserTable(users) {
    const tbody = document.getElementById('table-body');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="7">조회된 회원이 없습니다.</td></tr>'; return; }
    tbody.innerHTML = users.map((u, i) => `
      <tr style="cursor:pointer;" onclick="fetchUserDetail(${u.userId})">
        <td>${currentPage * PAGE_SIZE + i + 1}</td>
        <td>${u.name ?? '-'}</td>
        <td>${u.email ?? '-'}</td>
        <td>${u.phone ?? '-'}</td>
        <td>${u.birthDate ?? '-'}</td>
        <td>${u.statusCode ?? '-'}</td>
        <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString('ko-KR') : '-'}</td>
      </tr>`).join('');
  }

  function renderPagination(totalCount, currentPageNum, pageSize) {
    const totalPages = Math.ceil(totalCount / pageSize);
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    const s = Math.max(0, currentPageNum - 2), e = Math.min(totalPages - 1, s + 4);
    let h = `<button onclick="fetchUserList(${currentPageNum - 1})" ${currentPageNum === 0 ? 'disabled' : ''}>이전</button> `;
    for (let i = s; i <= e; i++) h += `<button onclick="fetchUserList(${i})" ${i === currentPageNum ? 'disabled style="font-weight:bold"' : ''}>${i + 1}</button> `;
    h += `<button onclick="fetchUserList(${currentPageNum + 1})" ${currentPageNum >= totalPages - 1 ? 'disabled' : ''}>다음</button>`;
    el.innerHTML = h;
  }

  async function fetchUserDetail(userId) {
    currentUserId = userId;
    showDetail();
    try {
      const res = await fetch(`${API_BASE}/users/${userId}`, { credentials: 'include' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = (await res.json()).data;
      renderUserDetail(data);
    } catch (e) {
      alert('상세 조회 실패: ' + e.message);
    }
  }

  function renderUserDetail(u) {
    document.getElementById('detail-info').innerHTML = `
      <tr><th>회원 ID</th><td>${u.userId}</td></tr>
      <tr><th>이름</th><td>${u.name ?? '-'}</td></tr>
      <tr><th>이메일</th><td>${u.email ?? '-'}</td></tr>
      <tr><th>전화번호</th><td>${u.phone ?? '-'}</td></tr>
      <tr><th>생년월일</th><td>${u.birthDate ?? '-'}</td></tr>
      <tr><th>상태</th><td><b>${u.statusCode ?? '-'}</b></td></tr>
      <tr><th>신용점수</th><td>${u.creditScore ?? '-'}</td></tr>
      <tr><th>가입일</th><td>${fmt(u.createdAt)}</td></tr>
      <tr><th>수정일</th><td>${fmt(u.updatedAt)}</td></tr>`;

    document.getElementById('select-status').value = u.statusCode ?? 'ACTIVE';

    const lh = document.getElementById('detail-login-histories');
    lh.innerHTML = (u.loginHistories ?? []).slice(0, 5).map(h => `
      <tr>
        <td>${fmt(h.loginAt)}</td>
        <td>${h.success ? '성공' : '실패'}</td>
        <td>${h.failReason ?? '-'}</td>
        <td>${h.ipAddress ?? '-'}</td>
      </tr>`).join('') || '<tr><td colspan="4">이력 없음</td></tr>';

    const ag = document.getElementById('detail-agreements');
    ag.innerHTML = (u.termAgreements ?? []).map(a => `
      <tr>
        <td>${a.termsTitle ?? '-'}</td>
        <td>${a.agreedYn === 'Y' ? '동의' : '미동의'}</td>
        <td>${fmt(a.agreedAt)}</td>
      </tr>`).join('') || '<tr><td colspan="3">동의 내역 없음</td></tr>';
  }

  async function changeStatus() {
    const newStatus = document.getElementById('select-status').value;
    if (!confirm(`상태를 ${newStatus}(으)로 변경하시겠습니까?`)) return;
    try {
      const res = await fetch(`${API_BASE}/users/${currentUserId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ statusCode: newStatus })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      alert('상태가 변경되었습니다.');
      fetchUserDetail(currentUserId);
    } catch (e) {
      alert('상태 변경 실패: ' + e.message);
    }
  }

  async function unlockUser() {
    if (!confirm(`회원 #${currentUserId}의 계정 잠금을 강제 해제하시겠습니까?`)) return;
    try {
      const res = await fetch(`${API_BASE}/users/${currentUserId}/unlock`, {
        method: 'PATCH',
        credentials: 'include'
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      alert('계정 잠금이 해제되었습니다.');
      fetchUserDetail(currentUserId);
    } catch (e) {
      alert('잠금 해제 실패: ' + e.message);
    }
  }

  document.getElementById('btn-search').addEventListener('click', () => fetchUserList(0));
  document.getElementById('btn-reset').addEventListener('click', () => { resetSearch(); fetchUserList(0); });
  document.getElementById('btn-back').addEventListener('click', () => { showList(); fetchUserList(currentPage); });
  document.getElementById('btn-change-status').addEventListener('click', changeStatus);
  document.getElementById('btn-unlock').addEventListener('click', unlockUser);

  fetchUserList(0);
</script>
</body>
</html>
