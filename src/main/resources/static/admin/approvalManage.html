<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>결재 관리 | BNK 관리자</title>

  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
</head>

<body>

<div id="app-header"></div>

<!-- ===================================================== -->
<!-- 목록 페이지 -->
<!-- ===================================================== -->
<div id="listPage" class="page-wrap">

  <div class="page-header">
    <h2>결재 목록</h2>
    <p>나에게 할당된 결재 신청 목록입니다.</p>
  </div>

  <!-- 필터 -->
  <div class="filter-bar">

    <label>
      상태

      <select id="statusFilter"
              onchange="loadApprovals(0)">

        <option value="">전체</option>
        <option value="PENDING">PENDING</option>
        <option value="APPROVED">APPROVED</option>
        <option value="REJECTED">REJECTED</option>

      </select>
    </label>

    <label>
      유형

      <select id="typeFilter"
              onchange="loadApprovals(0)">

        <option value="">전체</option>
        <option value="CARD_PUBLISH">카드 등록</option>
        <option value="CARD_UPDATE">카드 수정</option>
        <option value="TERMS_PUBLISH">약관 등록</option>

      </select>
    </label>

    <span class="total-label">
      총 <strong id="totalCount">0</strong>건
    </span>

  </div>

  <!-- 테이블 -->
  <div class="table-wrap">

    <table border="1">

      <thead>
        <tr>
          <th>결재 ID</th>
          <th>유형</th>
          <th>카드명 / 약관명</th>
          <th>요청자</th>
          <th>상태</th>
          <th>요청일시</th>
        </tr>
      </thead>

      <tbody id="approvalTbody">
        <tr>
          <td colspan="7" class="empty-cell">
            로딩 중...
          </td>
        </tr>
      </tbody>

    </table>

  </div>

  <!-- 페이지네이션 -->
  <div id="pagination"
       class="pagination"></div>

</div>

<!-- ===================================================== -->
<!-- 상세 페이지 -->
<!-- ===================================================== -->
<div id="detailPage"
     class="page-wrap"
     style="display:none">

  <div class="page-header">

    <h2>결재 상세</h2>

    <p>
      <a href="/admin/approvalManage.html">
        ← 결재 목록
      </a>
    </p>

  </div>

  <!-- 기본정보 -->
  <h3>기본 정보</h3>

  <table border="1"
         cellpadding="6"
         cellspacing="0"
         id="infoTable">

    <tr>
      <td>로딩 중...</td>
    </tr>

  </table>

  <br>

  <!-- 결재 처리 -->
  <div id="actionArea"
       style="display:none">

    <h3>결재 처리</h3>

    <label>

      의견 (반려 시 필수):

      <input type="text"
             id="commentInput"
             placeholder="결재 의견 입력"
             style="width:300px">

    </label>

    <br><br>

    <button onclick="doApprove()"
            style="
              background:#28a745;
              color:#fff;
              padding:8px 20px">

      ✔ 승인

    </button>

    &nbsp;

    <button onclick="doReject()"
            style="
              background:#dc3545;
              color:#fff;
              padding:8px 20px">

      ✗ 반려

    </button>

  </div>

  <br>

  <div id="msg"></div>

</div>

<script>

  // =====================================================
  // 공통
  // =====================================================

  const params =
    new URLSearchParams(location.search);

  const approvalId =
    params.get('approvalId');

  let currentPage = 0;

  const PAGE_SIZE = 20;

  const TYPE_LABEL = {
    CARD_PUBLISH:  '카드 등록',
    CARD_UPDATE:   '카드 수정',
    TERMS_PUBLISH: '약관 등록',
  };

  const TYPE_CLASS = {
    CARD_PUBLISH:  'type-card-publish',
    CARD_UPDATE:   'type-card-update',
    TERMS_PUBLISH: 'type-terms-publish',
  };

  const STATUS_CLASS = {
    PENDING:  'badge-pending',
    APPROVED: 'badge-approved',
    REJECTED: 'badge-rejected',
  };

  const LINE_CLASS = {
    PENDING:  'line-node-pending',
    APPROVED: 'line-node-approved',
    REJECTED: 'line-node-rejected',
  };

  // =====================================================
  // API 공통 함수
  // =====================================================

  async function api(method, url, body) {

    const opts = {
      method,
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json'
      }
    };

    if (body) {
      opts.body = JSON.stringify(body);
    }

    const res = await fetch(url, opts);

    return {
      ok: res.ok,
      data: await res.json().catch(() => null)
    };
  }

  // =====================================================
  // 목록 조회
  // =====================================================

  async function loadApprovals(page = 0) {

    currentPage = page;

    const status =
      document.getElementById('statusFilter').value;

    const type =
      document.getElementById('typeFilter').value;

    let url =
      `/api/admin/approvals?page=${page}&size=${PAGE_SIZE}`;

    if (status) {
      url += '&statusCode=' + status;
    }

    if (type) {
      url += '&requestTypeCode=' + type;
    }

    const tbody =
      document.getElementById('approvalTbody');

    tbody.innerHTML = `
      <tr>
        <td colspan="7"
            class="empty-cell">
          로딩 중...
        </td>
      </tr>
    `;

    try {

      const res =
        await fetch(url, {
          credentials: 'include'
        });

      if (res.status === 401) {

        location.href =
          '/auth/admin-login.html';

        return;
      }

      const json =
        await res.json().catch(() => null);

      if (!res.ok || !json?.data) {

        tbody.innerHTML = `
          <tr>
            <td colspan="7"
                class="empty-cell">
              조회 실패
            </td>
          </tr>
        `;

        return;
      }

      const { content, totalCount } =
        json.data;

      document.getElementById('totalCount')
        .textContent = totalCount ?? 0;

      if (!content || content.length === 0) {

        tbody.innerHTML = `
          <tr>
            <td colspan="7"
                class="empty-cell">
              결재 건이 없습니다.
            </td>
          </tr>
        `;

        renderPagination(0);

        return;
      }

      tbody.innerHTML = content.map(a => {

        const typeLabel =
          TYPE_LABEL[a.requestTypeCode]
            ?? a.requestTypeCode;

        const typeCls =
          TYPE_CLASS[a.requestTypeCode]
            ?? '';

        const statusCls =
          STATUS_CLASS[a.statusCode]
            ?? '';

        const lineSummary = a.lines?.length

          ? a.lines.map((l, i) => {

              const cls =
                LINE_CLASS[l.statusCode]
                  ?? '';

              const arrow =
                i < a.lines.length - 1
                  ? '<span class="line-arrow">›</span>'
                  : '';

              return `
                <span class="line-node ${cls}">
                  ${l.approvalOrder}.
                  ${l.approverName ?? '?'}
                </span>

                ${arrow}
              `;
            }).join('')

          : '<span class="line-none">-</span>';

        const requestedAt =
          a.requestedAt
            ? a.requestedAt
                .substring(0,16)
                .replace('T',' ')
            : '-';

        return `
          <tr onclick="goDetail(${a.approvalId})"
              style="cursor:pointer">

            <td class="cell-id">
              ${a.approvalId}
            </td>

            <td>
              <span class="type-badge ${typeCls}">
                ${typeLabel}
              </span>
            </td>

            <td class="cell-name">
              ${a.targetName ?? '-'}
            </td>

            <td>
              ${a.requesterName ?? '-'}
            </td>

            <td>
              <span class="badge ${statusCls}">
                ${a.statusCode}
              </span>
            </td>

            <td class="cell-date">
              ${requestedAt}
            </td>
          </tr>
        `;
      }).join('');

      renderPagination(totalCount);

    } catch (e) {

      tbody.innerHTML = `
        <tr>
          <td colspan="6"
              class="empty-cell">
            네트워크 오류
          </td>
        </tr>
      `;
    }
  }

  // =====================================================
  // 상세 이동
  // =====================================================

  function goDetail(approvalId) {

    location.href =
      `/admin/approvalManage.html?approvalId=${approvalId}`;
  }

  // =====================================================
  // 상세 조회
  // =====================================================

  async function loadDetail(approvalId) {

    const r = await api(
      'GET',
      `/api/admin/approvals/${approvalId}`
    );

    const infoTable =
      document.getElementById('infoTable');
    
    const actionArea =
      document.getElementById('actionArea');

    if (!r.ok || !r.data?.data) {

      infoTable.innerHTML = `
        <tr>
          <td>조회 실패</td>
        </tr>
      `;

      return;
    }

    const a = r.data.data;

    infoTable.innerHTML = `
      <tr>
        <th>결재 ID</th>
        <td>${a.approvalId}</td>
      </tr>

      <tr>
        <th>유형</th>
        <td>${a.requestTypeCode}</td>
      </tr>

      <tr>
        <th>대상</th>
        <td>${a.targetName ?? '-'}</td>
      </tr>

      <tr>
        <th>요청자</th>
        <td>${a.requesterName ?? '-'}</td>
      </tr>

      <tr>
        <th>요청 의견</th>
        <td>${a.requestComment ?? '-'}</td>
      </tr>

      <tr>
        <th>상태</th>
        <td>
          <b>${a.statusCode}</b>
        </td>
      </tr>

      <tr>
        <th>요청일시</th>
        <td>
          ${a.requestedAt
            ? a.requestedAt.substring(0,16)
            : '-'}
        </td>
      </tr>

      <tr>
        <th>완료일시</th>
        <td>
          ${a.completedAt
            ? a.completedAt.substring(0,16)
            : '-'}
        </td>
      </tr>
    `;

	if (a.statusCode === 'PENDING') {
	  actionArea.style.display = 'block';
	}
  }

  // =====================================================
  // 승인
  // =====================================================

  async function doApprove() {

    const comment =
      document.getElementById('commentInput')
        .value.trim();

    const r = await api(
      'POST',
      `/api/admin/approvals/${approvalId}/approve`,
      { comment }
    );

    const msg =
      document.getElementById('msg');

    if (r.ok) {

      msg.textContent =
        '승인 처리 완료';

      loadDetail(approvalId);

    } else {

      msg.textContent =
        '승인 실패';
    }
  }

  // =====================================================
  // 반려
  // =====================================================

  async function doReject() {

    const comment =
      document.getElementById('commentInput')
        .value.trim();

    if (!comment) {

      alert('반려 시 의견은 필수입니다.');

      return;
    }

    const r = await api(
      'POST',
      `/api/admin/approvals/${approvalId}/reject`,
      { comment }
    );

    const msg =
      document.getElementById('msg');

    if (r.ok) {

      msg.textContent =
        '반려 처리 완료';

      loadDetail(approvalId);

    } else {

      msg.textContent =
        '반려 실패';
    }
  }

  // =====================================================
  // 페이지네이션
  // =====================================================

  function renderPagination(totalCount) {

    const totalPages =
      Math.ceil(totalCount / PAGE_SIZE);

    const el =
      document.getElementById('pagination');

    if (totalPages <= 1) {

      el.innerHTML = '';

      return;
    }

    const startPage =
      Math.max(0, currentPage - 2);

    const endPage =
      Math.min(totalPages - 1,
               startPage + 4);

    let html = `
      <button class="page-btn"
              onclick="loadApprovals(${currentPage - 1})"
              ${currentPage === 0 ? 'disabled' : ''}>
        이전
      </button>
    `;

    for (let i = startPage;
         i <= endPage;
         i++) {

      html += `
        <button class="page-btn
                       ${i === currentPage
                         ? 'active'
                         : ''}"
                onclick="loadApprovals(${i})">

          ${i + 1}

        </button>
      `;
    }

    html += `
      <button class="page-btn"
              onclick="loadApprovals(${currentPage + 1})"
              ${currentPage === totalPages - 1
                ? 'disabled'
                : ''}>
        다음
      </button>
    `;

    el.innerHTML = html;
  }

  // =====================================================
  // 초기 진입 분기
  // =====================================================

  if (approvalId) {

    // 상세 모드

    document.getElementById('listPage')
      .style.display = 'none';

    document.getElementById('detailPage')
      .style.display = 'block';

    loadDetail(approvalId);

  } else {

    // 목록 모드

    document.getElementById('listPage')
      .style.display = 'block';

    document.getElementById('detailPage')
      .style.display = 'none';

    loadApprovals();
  }

</script>

</body>
</html>
