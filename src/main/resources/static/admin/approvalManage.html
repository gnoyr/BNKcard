<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>결재 관리 | BNK 관리자</title>

  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">  
  <link rel="stylesheet" href="/css/approvalManage.css">
</head>

<body>

<div id="app-header"></div>

<!-- ===================================================== -->
<!-- 목록 페이지 -->
<!-- ===================================================== -->
<div id="listPage" class="page-wrap">

  <div class="page-header">
    <h2>결재 목록</h2>
  </div>

  <!-- 필터 -->
  <div class="filter-bar">
    <span class="total-label">
      총 <strong id="totalCount">0</strong>건
    </span>
  
    <label>
      <select id="statusFilter">
        <option value="">전체 상태</option>
        <option value="PENDING">PENDING</option>
        <option value="APPROVED">APPROVED</option>
        <option value="REJECTED">REJECTED</option>
      </select>
    </label>

    <label>
      <select id="typeFilter">
        <option value="">전체 유형</option>
        <option value="CARD_PUBLISH">카드 등록</option>
        <option value="CARD_UPDATE">카드 수정</option>
        <option value="TERMS_PUBLISH">약관 등록</option>
      </select>
    </label>
    
    <button type="button" onclick="searchApprovals()" class="btn-search">검색</button>
    <button type="button" onclick="resetFilters()" class="btn-reset">초기화</button>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">

    <table border="1">

      <thead>
        <tr>
          <th>결재 ID</th>
          <th>유형</th>
          <th>카드명 / 약관명</th>
          <th>요청자</th>
          <th>상태</th>
          <th>요청일시</th>
        </tr>
      </thead>

      <tbody id="approvalTbody">
        <tr>
          <td colspan="7" class="empty-cell">
            로딩 중...
          </td>
        </tr>
      </tbody>

    </table>

  </div>

  <!-- 페이지네이션 -->
  <div id="pagination"
       class="pagination"></div>

</div>

<!-- ===================================================== -->
<!-- 상세 페이지 -->
<!-- ===================================================== -->
<div id="detailPage" class="page-wrap" style="display:none">

  <div class="page-header">
    <h2>결재 상세</h2>
    <p><a href="/admin/approvalManage.html">← 결재 목록</a></p>
  </div>

  <!-- 기본 정보 -->
  <h3>기본 정보</h3>
  <table border="1" cellpadding="6" cellspacing="0" id="infoTable">
    <tr><td>로딩 중...</td></tr>
  </table>

  <br>

  <!-- 결재 라인 -->
  <h3>결재 라인</h3>
  <table border="1" cellpadding="6" cellspacing="0">
    <thead>
      <tr>
        <th>순서</th>
        <th>결재자</th>
        <th>상태</th>
        <th>의견</th>
        <th>처리일시</th>
      </tr>
    </thead>
    <tbody id="linesTable"></tbody>
  </table>

  <br>

  <!-- 카드 스냅샷 -->
  <div id="snapshotSection" style="display:none">

    <h3>카드 기본 정보 (결재 당시 스냅샷)</h3>
    <table border="1" cellpadding="6" cellspacing="0" id="snapshotTable"></table>

    <br>

    <h3>혜택 목록</h3>
    <table border="1" cellpadding="6" cellspacing="0">
      <thead>
        <tr>
          <th>카테고리</th>
          <th>혜택명</th>
          <th>설명</th>
          <th>할인율</th>
          <th>한도</th>
        </tr>
      </thead>
      <tbody id="benefitTbody"></tbody>
    </table>

    <br>

    <h3>이미지 목록</h3>
    <table border="1" cellpadding="6" cellspacing="0">
      <thead>
        <tr>
          <th>유형</th>
          <th>URL</th>
        </tr>
      </thead>
      <tbody id="imageTbody"></tbody>
    </table>

    <br>

  </div>

  <!-- 결재 처리 -->
  <div id="actionArea" style="display:none">
    <h3>결재 처리</h3>
    <label>
      의견 (반려 시 필수):
      <input type="text" id="commentInput" placeholder="결재 의견 입력" style="width:300px">
    </label>
    <br><br>
    <button onclick="doApprove()" style="background:#28a745;color:#fff;padding:8px 20px">✔ 승인</button>
    &nbsp;
    <button onclick="doReject()" style="background:#dc3545;color:#fff;padding:8px 20px">✗ 반려</button>
  </div>

  <br>
  <div id="msg"></div>

</div>

<script>

  // =====================================================
  // 공통
  // =====================================================

  const params =
    new URLSearchParams(location.search);

  const approvalId =
    params.get('approvalId');

  let currentPage = 0;

  const PAGE_SIZE = 20;

  const TYPE_LABEL = {
    CARD_PUBLISH:  '카드 등록',
    CARD_UPDATE:   '카드 수정',
    TERMS_PUBLISH: '약관 등록',
  };

  const TYPE_CLASS = {
    CARD_PUBLISH:  'type-card-publish',
    CARD_UPDATE:   'type-card-update',
    TERMS_PUBLISH: 'type-terms-publish',
  };

  const STATUS_CLASS = {
    PENDING:  'badge-pending',
    APPROVED: 'badge-approved',
    REJECTED: 'badge-rejected',
  };

  const LINE_CLASS = {
    PENDING:  'line-node-pending',
    APPROVED: 'line-node-approved',
    REJECTED: 'line-node-rejected',
  };

  // =====================================================
  // API 공통 함수
  // =====================================================

  async function api(method, url, body) {

    const opts = {
      method,
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json'
      }
    };

    if (body) {
      opts.body = JSON.stringify(body);
    }

    const res = await fetch(url, opts);

    return {
      ok: res.ok,
      data: await res.json().catch(() => null)
    };
  }

  // =====================================================
  // 목록 조회
  // =====================================================
	  
  function searchApprovals() {
	  loadApprovals(0);
  }
  
  function resetFilters() {
	  document.getElementById('statusFilter').value = '';	
	  document.getElementById('typeFilter').value = '';	
	  loadApprovals(0);
	}

  async function loadApprovals(page = 0) {

    currentPage = page;

    const status =
      document.getElementById('statusFilter').value;

    const type =
      document.getElementById('typeFilter').value;

    let url =
      `/api/admin/approvals?page=${page}&size=${PAGE_SIZE}`;

    if (status) {
      url += '&statusCode=' + status;
    }

    if (type) {
      url += '&requestTypeCode=' + type;
    }

    const tbody =
      document.getElementById('approvalTbody');

    tbody.innerHTML = `
      <tr>
        <td colspan="7"
            class="empty-cell">
          로딩 중...
        </td>
      </tr>
    `;

    try {

      const res =
        await fetch(url, {
          credentials: 'include'
        });

      if (res.status === 401) {

        location.href =
          '/auth/admin-login.html';

        return;
      }

      const json =
        await res.json().catch(() => null);

      if (!res.ok || !json?.data) {

        tbody.innerHTML = `
          <tr>
            <td colspan="7"
                class="empty-cell">
              조회 실패
            </td>
          </tr>
        `;

        return;
      }

      const { content, totalCount } =
        json.data;

      document.getElementById('totalCount')
        .textContent = totalCount ?? 0;

      if (!content || content.length === 0) {

        tbody.innerHTML = `
          <tr>
            <td colspan="7"
                class="empty-cell">
              결재 건이 없습니다.
            </td>
          </tr>
        `;

        renderPagination(0);

        return;
      }

      tbody.innerHTML = content.map(a => {

        const typeLabel =
          TYPE_LABEL[a.requestTypeCode]
            ?? a.requestTypeCode;

        const typeCls =
          TYPE_CLASS[a.requestTypeCode]
            ?? '';

        const statusCls =
          STATUS_CLASS[a.statusCode]
            ?? '';

        const lineSummary = a.lines?.length

          ? a.lines.map((l, i) => {

              const cls =
                LINE_CLASS[l.statusCode]
                  ?? '';

              const arrow =
                i < a.lines.length - 1
                  ? '<span class="line-arrow">›</span>'
                  : '';

              return `
                <span class="line-node ${cls}">
                  ${l.approvalOrder}.
                  ${l.approverName ?? '?'}
                </span>

                ${arrow}
              `;
            }).join('')

          : '<span class="line-none">-</span>';

        const requestedAt =
          a.requestedAt
            ? a.requestedAt
                .substring(0,16)
                .replace('T',' ')
            : '-';

        return `
          <tr onclick="goDetail(${a.approvalId})"
              style="cursor:pointer">

            <td class="cell-id">
              ${a.approvalId}
            </td>

            <td>
              <span class="type-badge ${typeCls}">
                ${typeLabel}
              </span>
            </td>

            <td class="cell-name">
              ${a.targetName ?? '-'}
            </td>

            <td>
              ${a.requesterName ?? '-'}
            </td>

            <td>
              <span class="badge ${statusCls}">
                ${a.statusCode}
              </span>
            </td>

            <td class="cell-date">
              ${requestedAt}
            </td>
          </tr>
        `;
      }).join('');

      renderPagination(totalCount);

    } catch (e) {

      tbody.innerHTML = `
        <tr>
          <td colspan="6"
              class="empty-cell">
            네트워크 오류
          </td>
        </tr>
      `;
    }
  }

  // =====================================================
  // 상세 이동
  // =====================================================

  function goDetail(approvalId) {

    location.href =
      `/admin/approvalManage.html?approvalId=${approvalId}`;
  }

  // =====================================================
  // 상세 조회
  // =====================================================

  async function loadDetail(approvalId) {

    const r = await api('GET', `/api/admin/approvals/${approvalId}`);

    const infoTable  = document.getElementById('infoTable');
    const actionArea = document.getElementById('actionArea');

    if (!r.ok || !r.data?.data) {
        infoTable.innerHTML = '<tr><td>조회 실패</td></tr>';
        return;
    }

    const a = r.data.data;

    // 기본 정보
    infoTable.innerHTML = `
        <tr><th>결재 ID</th>   <td>${a.approvalId}</td></tr>
        <tr><th>유형</th>      <td>${a.requestTypeCode}</td></tr>
        <tr><th>대상</th>      <td>${a.targetName ?? '-'}</td></tr>
        <tr><th>요청자</th>    <td>${a.requesterName ?? '-'}</td></tr>
        <tr><th>요청 의견</th> <td>${a.requestComment ?? '-'}</td></tr>
        <tr><th>상태</th>      <td><b>${a.statusCode}</b></td></tr>
        <tr><th>요청일시</th>  <td>${a.requestedAt?.substring(0, 16) ?? '-'}</td></tr>
        <tr><th>완료일시</th>  <td>${a.completedAt?.substring(0, 16) ?? '-'}</td></tr>
    `;

    // 결재 라인
    document.getElementById('linesTable').innerHTML = a.lines?.length
        ? a.lines.map(l => `
            <tr>
                <td>${l.approvalOrder}</td>
                <td>${l.approverName ?? '-'}</td>
                <td><b>${l.statusCode}</b></td>
                <td>${l.commentText ?? '-'}</td>
                <td>${l.approvedAt?.substring(0, 16) ?? '-'}</td>
            </tr>`).join('')
        : '<tr><td colspan="5">결재라인 없음</td></tr>';

    // 카드 스냅샷
    const snapshotSection = document.getElementById('snapshotSection');
    const s = a.snapshot;

    if (s) {
        snapshotSection.style.display = 'block';

        const card = s.card;

        document.getElementById('snapshotTable').innerHTML = `
            <tr><th>카드코드</th>    <td>${card.cardCode ?? '-'}</td></tr>
            <tr><th>카드유형</th>    <td>${card.cardType ?? '-'}</td></tr>
            <tr><th>카드명</th>      <td>${card.cardName ?? '-'}</td></tr>
            <tr><th>카드사</th>      <td>${card.companyName ?? '-'}</td></tr>
            <tr><th>브랜드</th>      <td>${card.brandName ?? '-'}</td></tr>
            <tr><th>국내 연회비</th> <td>${card.annualFeeDomestic?.toLocaleString() ?? '-'} 원</td></tr>
            <tr><th>해외 연회비</th> <td>${card.annualFeeOverseas?.toLocaleString() ?? '-'} 원</td></tr>
            <tr><th>전월실적</th>    <td>${card.previousMonthSpend?.toLocaleString() ?? '-'} 원</td></tr>
            <tr><th>가입연령</th>    <td>${card.minimumAge ?? '-'} ~ ${card.maximumAge ?? '-'} 세</td></tr>
            <tr><th>타겟 고객</th>   <td>${card.targetUser ?? '-'}</td></tr>
            <tr><th>요약 설명</th>   <td>${card.summaryDescription ?? '-'}</td></tr>
            <tr><th>검색 노출</th>   <td>${card.searchableYn ?? '-'}</td></tr>
            <tr><th>화면 노출</th>   <td>${card.visibleYn ?? '-'}</td></tr>
            <tr><th>결재 필요</th>   <td>${card.approvalRequiredYn ?? '-'}</td></tr>
            <tr><th>게시 시작일</th> <td>${card.publishStartAt?.substring(0, 16) ?? '-'}</td></tr>
            <tr><th>게시 종료일</th> <td>${card.publishEndAt?.substring(0, 16) ?? '-'}</td></tr>
        `;
        

        document.getElementById('benefitTbody').innerHTML = s.benefits?.length
      	    ? s.benefits.map(b => {
      	        const rate = b.discountRate != null ? (b.discountRate * 100).toFixed(1) + '%'
      	                   : b.cashbackRate != null ? (b.cashbackRate * 100).toFixed(1) + '%'
      	                   : b.pointRate    != null ? (b.pointRate    * 100).toFixed(1) + '%'
      	                   : '-';
      	        const limit = b.monthlyLimitAmount != null ? b.monthlyLimitAmount.toLocaleString() + '원'
      	                    : b.dailyLimitAmount   != null ? b.dailyLimitAmount.toLocaleString()   + '원'
      	                    : '-';
      	        return `
      	        <tr>
      	            <td>${b.categoryName ?? '-'}</td>
      	            <td>${b.benefitTitle ?? '-'}</td>
      	            <td>${b.displayText ?? '-'}</td>
      	            <td>${rate}</td>
      	            <td>${limit}</td>
      	        </tr>`;
      	    }).join('')
      	    : '<tr><td colspan="5">혜택 없음</td></tr>';

    	document.getElementById('imageTbody').innerHTML = s.images?.length
    	    ? s.images.map(i => `
    	        <tr>
    	            <td>${i.imageType ?? '-'}</td>
    	            <td>
    	                <img src="${i.imageUrl}"
    	                     alt="${i.imageType ?? '카드이미지'}"
    	                     style="height:80px; object-fit:contain; display:block; margin-bottom:4px">
    	                <a href="${i.imageUrl}" target="_blank" style="font-size:12px">URL 열기</a>
    	            </td>
    	        </tr>`).join('')
    	    : '<tr><td colspan="3">이미지 없음</td></tr>';

    } else {
        snapshotSection.style.display = 'none';
    }

    // 본인 차례인 PENDING 라인이 있을 때만 처리 버튼 노출
    if (a.lines?.some(l => l.currentUser)) {
        actionArea.style.display = 'block';
    }
  }

  // =====================================================
  // 승인
  // =====================================================

  async function doApprove() {

    const comment =
      document.getElementById('commentInput')
        .value.trim();

    const r = await api(
      'POST',
      `/api/admin/approvals/${approvalId}/approve`,
      { comment }
    );

    const msg =
      document.getElementById('msg');

    if (r.ok) {

      msg.textContent =
        '승인 처리 완료';

      loadDetail(approvalId);

    } else {

      msg.textContent =
        '승인 실패';
    }
  }

  // =====================================================
  // 반려
  // =====================================================

  async function doReject() {

    const comment =
      document.getElementById('commentInput')
        .value.trim();

    if (!comment) {

      alert('반려 시 의견은 필수입니다.');

      return;
    }

    const r = await api(
      'POST',
      `/api/admin/approvals/${approvalId}/reject`,
      { comment }
    );

    const msg =
      document.getElementById('msg');

    if (r.ok) {

      msg.textContent =
        '반려 처리 완료';

      loadDetail(approvalId);

    } else {

      msg.textContent =
        '반려 실패';
    }
  }

  // =====================================================
  // 페이지네이션
  // =====================================================

  function renderPagination(totalCount) {

    const totalPages =
      Math.ceil(totalCount / PAGE_SIZE);

    const el =
      document.getElementById('pagination');

    if (totalPages <= 1) {

      el.innerHTML = '';

      return;
    }

    const startPage =
      Math.max(0, currentPage - 2);

    const endPage =
      Math.min(totalPages - 1,
               startPage + 4);

    let html = `
      <button class="page-btn"
              onclick="loadApprovals(${currentPage - 1})"
              ${currentPage === 0 ? 'disabled' : ''}>
        이전
      </button>
    `;

    for (let i = startPage;
         i <= endPage;
         i++) {

      html += `
        <button class="page-btn
                       ${i === currentPage
                         ? 'active'
                         : ''}"
                onclick="loadApprovals(${i})">

          ${i + 1}

        </button>
      `;
    }

    html += `
      <button class="page-btn"
              onclick="loadApprovals(${currentPage + 1})"
              ${currentPage === totalPages - 1
                ? 'disabled'
                : ''}>
        다음
      </button>
    `;

    el.innerHTML = html;
  }

  // =====================================================
  // 초기 진입 분기
  // =====================================================

  if (approvalId) {

    // 상세 모드

    document.getElementById('listPage')
      .style.display = 'none';

    document.getElementById('detailPage')
      .style.display = 'block';

    loadDetail(approvalId);

  } else {

    // 목록 모드

    document.getElementById('listPage')
      .style.display = 'block';

    document.getElementById('detailPage')
      .style.display = 'none';

    loadApprovals();
  }

</script>

<div id="toast-container"></div>
<script src="/js/header.js"></script>
</body>
</html>
