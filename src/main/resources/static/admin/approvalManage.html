<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>결재 관리 | BNK 관리자</title>

  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">  
  <link rel="stylesheet" href="/css/approvalManage.css">
</head>

<body>

<div id="app-header"></div>

<!-- ===================================================== -->
<!-- 목록 페이지 -->
<!-- ===================================================== -->
<div id="listPage" class="page-wrap">

  <div class="page-header">
    <h2>결재 목록</h2>
  </div>

  <!-- 필터 -->
  <div class="filter-bar">
    <span class="total-label">
      총 <strong id="totalCount">0</strong>건
    </span>
  
    <label>
      <select id="statusFilter">
        <option value="">전체 상태</option>
        <option value="PENDING">PENDING</option>
        <option value="APPROVED">APPROVED</option>
        <option value="REJECTED">REJECTED</option>
      </select>
    </label>

    <label>
      <select id="typeFilter">
        <option value="">전체 유형</option>
        <option value="CARD_PUBLISH">카드 등록</option>
        <option value="CARD_UPDATE">카드 수정</option>
        <option value="TERMS_PUBLISH">약관 등록</option>
      </select>
    </label>
    
    <button type="button" onclick="searchApprovals()" class="btn-search">검색</button>
    <button type="button" onclick="resetFilters()" class="btn-reset">초기화</button>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">

    <table border="1">

      <thead>
        <tr>
          <th>결재 ID</th>
          <th>유형</th>
          <th>카드명 / 약관명</th>
          <th>요청자</th>
          <th>상태</th>
          <th>요청일시</th>
        </tr>
      </thead>

      <tbody id="approvalTbody">
        <tr>
          <td colspan="7" class="empty-cell">
            로딩 중...
          </td>
        </tr>
      </tbody>

    </table>

  </div>

  <!-- 페이지네이션 -->
  <div id="pagination"
       class="pagination"></div>

</div>

<!-- ===================================================== -->
<!-- 상세 페이지 -->
<!-- ===================================================== -->
<div id="detailPage" class="page-wrap" style="display:none">

  <div class="page-header">
    <h2>결재 상세</h2>
    <p><a href="/admin/approvalManage.html">← 결재 목록</a></p>
  </div>

  <!-- 기본 정보 -->
  <h3>기본 정보</h3>
  <table border="1" cellpadding="6" cellspacing="0" id="infoTable">
    <tr><td>로딩 중...</td></tr>
  </table>

  <br>

  <!-- 결재 라인 -->
  <h3>결재 라인</h3>
  <table border="1" cellpadding="6" cellspacing="0">
    <thead>
      <tr>
        <th>순서</th>
        <th>결재자</th>
        <th>상태</th>
        <th>의견</th>
        <th>처리일시</th>
      </tr>
    </thead>
    <tbody id="linesTable"></tbody>
  </table>

  <br>

  <!-- 카드 스냅샷 -->
  <div id="snapshotSection" style="display:none">

    <h3>카드 기본 정보 (결재 당시 스냅샷)</h3>
    <table border="1" cellpadding="6" cellspacing="0" id="snapshotTable"></table>

    <br>

    <h3>혜택 목록</h3>
    <table border="1" cellpadding="6" cellspacing="0">
      <thead>
        <tr>
          <th>카테고리</th>
          <th>혜택명</th>
          <th>설명</th>
          <th>할인율</th>
          <th>한도</th>
        </tr>
      </thead>
      <tbody id="benefitTbody"></tbody>
    </table>

    <br>

    <h3>이미지 목록</h3>
    <table border="1" cellpadding="6" cellspacing="0">
      <thead>
        <tr>
          <th>유형</th>
          <th>URL</th>
        </tr>
      </thead>
      <tbody id="imageTbody"></tbody>
    </table>

    <br>

  </div>

  <!-- 결재 처리 -->
  <div id="actionArea" style="display:none">
    <h3>결재 처리</h3>
    <label>
      의견 (반려 시 필수):
      <input type="text" id="commentInput" placeholder="결재 의견 입력" style="width:300px">
    </label>
    <br><br>
    <button onclick="doApprove()" style="background:#28a745;color:#fff;padding:8px 20px">✔ 승인</button>
    &nbsp;
    <button onclick="doReject()" style="background:#dc3545;color:#fff;padding:8px 20px">✗ 반려</button>
  </div>

  <br>
  <div id="msg"></div>

</div>

<script>
 
  // =====================================================
  // 공통 상수
  // =====================================================
 
  const params     = new URLSearchParams(location.search);
  const approvalId = params.get('approvalId');
  let   currentPage = 0;
  const PAGE_SIZE   = 20;
 
  const TYPE_LABEL = {
    CARD_PUBLISH:  '카드 등록',
    CARD_UPDATE:   '카드 수정',
    TERMS_PUBLISH: '약관 등록',
  };
  const TYPE_CLASS = {
    CARD_PUBLISH:  'type-card-publish',
    CARD_UPDATE:   'type-card-update',
    TERMS_PUBLISH: 'type-terms-publish',
  };
  const STATUS_CLASS = {
    PENDING:  'badge-pending',
    APPROVED: 'badge-approved',
    REJECTED: 'badge-rejected',
  };
  const LINE_CLASS = {
    PENDING:  'line-node-pending',
    APPROVED: 'line-node-approved',
    REJECTED: 'line-node-rejected',
  };
 
  // =====================================================
  // API 공통 함수 (업그레이드)
  // =====================================================
 
  async function api(method, url, body) {
    const opts = {
      method,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
 
    let res;
    try {
      res = await fetch(url, opts);
    } catch {
      showToast('서버에 연결할 수 없습니다. 네트워크를 확인해 주세요.', 'error');
      return { ok: false, data: null };
    }
 
    // 401 — 로그인 페이지로 이동
    if (res.status === 401) {
      location.href = '/auth/admin-login.html';
      return { ok: false, data: null };
    }
 
    // 403 — 권한 없음 즉시 Toast
    if (res.status === 403) {
      const json = await res.json().catch(() => ({}));
      showToast(json.message ?? '접근 권한이 없습니다.', 'error');
      return { ok: false, data: json };
    }
 
    // 5xx — 서버 오류 즉시 Toast
    if (res.status >= 500) {
      showToast('서버 내부 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.', 'error');
      return { ok: false, data: null };
    }
 
    const data = await res.json().catch(() => null);
    return { ok: res.ok, status: res.status, data };
  }
 
  /**
   * GlobalExceptionHandler 응답에서 사용자 메시지 추출
   * 우선순위: fieldErrors[0] > detail > message > fallback
   */
  function extractApiMsg(data, fallback = '처리 중 오류가 발생했습니다.') {
    if (data?.fieldErrors?.length) {
      const fe = data.fieldErrors[0];
      return fe.field ? `${fe.field}: ${fe.message}` : fe.message;
    }
    return data?.detail ?? data?.message ?? data?.data?.message ?? fallback;
  }
 
  // =====================================================
  // 목록 조회
  // =====================================================
 
  function searchApprovals() { loadApprovals(0); }
 
  function resetFilters() {
    document.getElementById('statusFilter').value = '';
    document.getElementById('typeFilter').value   = '';
    loadApprovals(0);
  }
 
  async function loadApprovals(page = 0) {
    currentPage = page;
 
    const status = document.getElementById('statusFilter').value;
    const type   = document.getElementById('typeFilter').value;
 
    let url = `/api/admin/approvals?page=${page}&size=${PAGE_SIZE}`;
    if (status) url += '&statusCode='       + status;
    if (type)   url += '&requestTypeCode='  + type;
 
    const tbody = document.getElementById('approvalTbody');
    tbody.innerHTML = `<tr><td colspan="7" class="empty-cell">로딩 중...</td></tr>`;
 
    const r = await api('GET', url);
 
    if (!r.ok || !r.data?.data) {
      const msg = r.data ? extractApiMsg(r.data, '목록 조회에 실패했습니다.') : '목록 조회에 실패했습니다.';
      tbody.innerHTML = `<tr><td colspan="7" class="empty-cell">${msg}</td></tr>`;
      // 403/500은 api() 내부에서 이미 toast 처리됨. 나머지만 toast.
      if (r.status && r.status !== 403 && r.status < 500) {
        showToast(msg, 'error');
      }
      return;
    }
 
    const { content, totalCount } = r.data.data;
    document.getElementById('totalCount').textContent = totalCount ?? 0;
 
    if (!content?.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-cell">결재 건이 없습니다.</td></tr>`;
      renderPagination(0);
      return;
    }
 
    tbody.innerHTML = content.map(a => {
      const typeLabel  = TYPE_LABEL[a.requestTypeCode]  ?? a.requestTypeCode;
      const typeCls    = TYPE_CLASS[a.requestTypeCode]   ?? '';
      const statusCls  = STATUS_CLASS[a.statusCode]      ?? '';
 
      const lineSummary = a.lines?.length
        ? a.lines.map((l, i) => {
            const cls   = LINE_CLASS[l.statusCode] ?? '';
            const arrow = i < a.lines.length - 1 ? '<span class="line-arrow">›</span>' : '';
            return `<span class="line-node ${cls}">${l.approvalOrder}. ${l.approverName ?? '?'}</span>${arrow}`;
          }).join('')
        : '-';
 
      return `
        <tr class="clickable-row" onclick="loadDetail(${a.approvalId})">
          <td>${a.approvalId}</td>
          <td><span class="badge ${typeCls}">${typeLabel}</span></td>
          <td>${a.requesterName ?? '-'}</td>
          <td>${a.targetName ?? '-'}</td>
          <td><span class="badge ${statusCls}">${a.statusCode}</span></td>
          <td><div class="line-summary">${lineSummary}</div></td>
          <td>${a.requestedAt ? a.requestedAt.substring(0, 16) : '-'}</td>
        </tr>`;
    }).join('');
 
    renderPagination(totalCount);
  }
 
  // =====================================================
  // 상세 조회
  // =====================================================
 
  async function loadDetail(id) {
    const aid = id ?? approvalId;
    if (!aid) return;
 
    document.getElementById('listPage').style.display   = 'none';
    document.getElementById('detailPage').style.display = 'block';
 
    const infoTbody  = document.getElementById('infoTbody');
    const lineTbody  = document.getElementById('lineTbody');
    const actionArea = document.getElementById('actionArea');
 
    if (infoTbody)  infoTbody.innerHTML  = `<tr><td colspan="2">불러오는 중...</td></tr>`;
    if (lineTbody)  lineTbody.innerHTML  = `<tr><td colspan="5">불러오는 중...</td></tr>`;
    if (actionArea) actionArea.style.display = 'none';
 
    const r = await api('GET', `/api/admin/approvals/${aid}`);
 
    if (!r.ok || !r.data?.data) {
      const msg = r.data ? extractApiMsg(r.data, '상세 조회에 실패했습니다.') : '상세 조회에 실패했습니다.';
      if (infoTbody) infoTbody.innerHTML = `<tr><td colspan="2">${msg}</td></tr>`;
      if (r.status && r.status !== 403 && r.status < 500) {
        showToast(msg, 'error');
      }
      return;
    }
 
    const a = r.data.data;
 
    if (infoTbody) {
      infoTbody.innerHTML = `
        <tr><th>결재 ID</th>  <td>${a.approvalId}</td></tr>
        <tr><th>유형</th>     <td>${TYPE_LABEL[a.requestTypeCode] ?? a.requestTypeCode}</td></tr>
        <tr><th>대상</th>     <td>${a.targetName ?? '-'}</td></tr>
        <tr><th>요청자</th>   <td>${a.requesterName ?? '-'}</td></tr>
        <tr><th>요청 의견</th><td>${a.requestComment ?? '-'}</td></tr>
        <tr><th>상태</th>     <td><span class="badge ${STATUS_CLASS[a.statusCode] ?? ''}">${a.statusCode}</span></td></tr>
        <tr><th>요청일시</th> <td>${a.requestedAt ? a.requestedAt.substring(0, 16) : '-'}</td></tr>
        <tr><th>완료일시</th> <td>${a.completedAt  ? a.completedAt.substring(0, 16)  : '-'}</td></tr>
      `;
    }
 
    let canProcess = false;
    if (lineTbody) {
      lineTbody.innerHTML = a.lines?.length
        ? a.lines.map(l => {
            if (l.currentUser && l.statusCode === 'PENDING') canProcess = true;
            const highlight = l.currentUser ? 'style="background:#fffde7"' : '';
            const statusColor = l.statusCode === 'APPROVED' ? 'color:green'
                              : l.statusCode === 'REJECTED'  ? 'color:red' : 'color:orange';
            return `
              <tr ${highlight}>
                <td>${l.approvalOrder}</td>
                <td>${l.approverName ?? '-'}${l.currentUser ? ' ★ (내 차례)' : ''}</td>
                <td><b style="${statusColor}">${l.statusCode}</b></td>
                <td>${l.commentText ?? '-'}</td>
                <td>${l.approvedAt ? l.approvedAt.substring(0, 16) : '-'}</td>
              </tr>`;
          }).join('')
        : `<tr><td colspan="5">결재 라인 없음</td></tr>`;
    }
 
    if (actionArea && canProcess && a.statusCode === 'PENDING') {
      actionArea.style.display = 'block';
      document.getElementById('commentInput').value = '';
    }
  }
 
  // =====================================================
  // 승인
  // =====================================================
 
  async function doApprove() {
    const comment = document.getElementById('commentInput').value.trim();
    const btn     = document.querySelector('[onclick="doApprove()"]');
    if (btn) btn.disabled = true;
 
    const r = await api('POST', `/api/admin/approvals/${approvalId}/approve`, { comment });
 
    if (r.ok) {
      showToast('승인 처리가 완료되었습니다.', 'success');
      document.getElementById('actionArea').style.display = 'none';
      loadDetail(approvalId);
    } else if (r.data && r.status !== 403 && r.status < 500) {
      // 403/500은 api()에서 처리됨. 4xx 비즈니스 오류만 여기서 표시.
      showToast(extractApiMsg(r.data, '승인 처리에 실패했습니다.'), 'error');
    }
 
    if (btn) btn.disabled = false;
  }
 
  // =====================================================
  // 반려
  // =====================================================
 
  async function doReject() {
    const comment = document.getElementById('commentInput').value.trim();
 
    // ✅ alert() 제거 → showToast() 교체
    if (!comment) {
      showToast('반려 시 의견은 필수입니다.', 'error');
      document.getElementById('commentInput').focus();
      return;
    }
 
    const btn = document.querySelector('[onclick="doReject()"]');
    if (btn) btn.disabled = true;
 
    const r = await api('POST', `/api/admin/approvals/${approvalId}/reject`, { comment });
 
    if (r.ok) {
      showToast('반려 처리가 완료되었습니다.', 'success');
      document.getElementById('actionArea').style.display = 'none';
      loadDetail(approvalId);
    } else if (r.data && r.status !== 403 && r.status < 500) {
      showToast(extractApiMsg(r.data, '반려 처리에 실패했습니다.'), 'error');
    }
 
    if (btn) btn.disabled = false;
  }
 
  // =====================================================
  // 목록으로 돌아가기
  // =====================================================
 
  function goList() {
    document.getElementById('listPage').style.display   = 'block';
    document.getElementById('detailPage').style.display = 'none';
    loadApprovals(currentPage);
  }
 
  // =====================================================
  // 페이지네이션
  // =====================================================
 
  function renderPagination(totalCount) {
    const totalPages = Math.ceil(totalCount / PAGE_SIZE);
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
 
    const startPage = Math.max(0, currentPage - 2);
    const endPage   = Math.min(totalPages - 1, startPage + 4);
 
    let html = `<button class="page-btn" onclick="loadApprovals(${currentPage - 1})"
                        ${currentPage === 0 ? 'disabled' : ''}>이전</button>`;
    for (let i = startPage; i <= endPage; i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}"
                       onclick="loadApprovals(${i})">${i + 1}</button>`;
    }
    html += `<button class="page-btn" onclick="loadApprovals(${currentPage + 1})"
                     ${currentPage === totalPages - 1 ? 'disabled' : ''}>다음</button>`;
    el.innerHTML = html;
  }
 
  // =====================================================
  // 초기 진입 분기
  // =====================================================
 
  if (approvalId) {
    document.getElementById('listPage').style.display   = 'none';
    document.getElementById('detailPage').style.display = 'block';
    loadDetail(approvalId);
  } else {
    document.getElementById('listPage').style.display   = 'block';
    document.getElementById('detailPage').style.display = 'none';
    loadApprovals();
  }
 
</script>

<div id="toast-container"></div>
<script src="/js/header.js"></script>
</body>
</html>
