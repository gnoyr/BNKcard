<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 계정 관리 | BNK 관리자</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
  <style>
    body { font-family: 'Pretendard', sans-serif; background:#f5f7fa; }
    .wrap { max-width:1100px; margin:32px auto; padding:0 16px; }
    .page-title { font-size:22px; font-weight:700; color:#003087; margin-bottom:24px; }

    /* 탭 */
    .tab-bar { display:flex; gap:8px; margin-bottom:24px; }
    .tab-btn {
        padding:9px 20px; border:1px solid #dde3ef; border-radius:8px;
        background:#fff; color:#555; font-size:14px; cursor:pointer;
        font-weight:500; transition:all .18s;
    }
    .tab-btn.active { background:#003087; color:#fff; border-color:#003087; }

    /* 목록 테이블 */
    .admin-table { width:100%; border-collapse:collapse; background:#fff;
                   border-radius:10px; overflow:hidden;
                   box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .admin-table th {
        background:#003087; color:#fff; padding:12px 14px;
        font-size:13px; font-weight:600; text-align:left;
    }
    .admin-table td { padding:12px 14px; font-size:13px;
                      border-bottom:1px solid #eef0f5; }
    .admin-table tr:last-child td { border-bottom:none; }
    .admin-table tr:hover td { background:#f8faff; }

    /* 역할 배지 */
    .badge { display:inline-block; padding:3px 10px; border-radius:20px;
             font-size:12px; font-weight:600; }
    .badge-super  { background:#fff0f0; color:#c62828; }
    .badge-manager{ background:#e8f5e9; color:#2e7d32; }
    .badge-operator{ background:#e3f2fd; color:#1565c0; }

    /* 상태 배지 */
    .status-active   { color:#2e7d32; font-weight:600; }
    .status-inactive { color:#888; }
    .status-locked   { color:#c62828; font-weight:600; }

    /* 등록 폼 */
    .form-card {
        background:#fff; border-radius:10px; padding:24px;
        box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:24px;
    }
    .form-card h3 { font-size:16px; font-weight:700;
                    color:#003087; margin-bottom:20px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group label { font-size:13px; font-weight:600; color:#444; }
    .form-group input, .form-group select {
        padding:10px 12px; border:1px solid #dde3ef; border-radius:8px;
        font-size:14px; outline:none;
    }
    .form-group input:focus, .form-group select:focus {
        border-color:#003087;
    }
    .btn-primary {
        padding:11px 24px; background:#003087; color:#fff;
        border:none; border-radius:8px; font-size:14px;
        font-weight:600; cursor:pointer; margin-top:16px;
    }
    .btn-sm {
        padding:5px 12px; border-radius:6px; font-size:12px;
        font-weight:600; cursor:pointer; border:none;
    }
    .btn-role   { background:#e8f5e9; color:#2e7d32; }
    .btn-status { background:#fff3e0; color:#e65100; }
    .btn-danger { background:#fff0f0; color:#c62828; }
  </style>
  <link rel="stylesheet" href="/css/admin-nav.css">
</head>
<body>
<div id="app-header"></div>

<div class="wrap">
  <div class="page-title">관리자 계정 관리</div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('list', this)">관리자 목록</button>
    <button class="tab-btn" onclick="switchTab('create', this)">관리자 등록</button>
    <button class="tab-btn" onclick="switchTab('super', this)">SUPER_ADMIN 등록</button>
  </div>

  <!-- 목록 탭 -->
  <div id="tab-list">
    <table class="admin-table">
	<thead>
	    <tr>
	        <th>ID</th>
	        <th>아이디</th>
	        <th>이름</th>
	        <th style="cursor:pointer;" onclick="sortByRole()">
	            역할
	            <span id="sort-role-icon">▲</span>
	        </th>
	        <th>상태</th>
	        <th>최근 로그인</th>
	        <th>등록일</th>
	        <th>관리</th>
	    </tr>
	</thead>
      <tbody id="admin-tbody">
        <tr><td colspan="8" style="text-align:center; color:#999;">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 관리자 등록 탭 -->
  <div id="tab-create" style="display:none;">
    <div class="form-card">
      <h3>새 관리자 등록 (MANAGER / OPERATOR)</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>아이디 <span style="color:#e65100;">*</span></label>
          <input type="text" id="c-username" placeholder="영문/숫자 조합">
        </div>
        <div class="form-group">
          <label>비밀번호 <span style="color:#e65100;">*</span></label>
          <input type="password" id="c-password" placeholder="8자 이상">
        </div>
        <div class="form-group">
          <label>이름 <span style="color:#e65100;">*</span></label>
          <input type="text" id="c-name" placeholder="실명 입력">
        </div>
        <div class="form-group">
          <label>역할 <span style="color:#e65100;">*</span></label>
          <select id="c-role">
            <option value="">-- 선택 --</option>
            <option value="MANAGER">MANAGER (중간 관리자)</option>
            <option value="OPERATOR">OPERATOR (하위 운영자)</option>
          </select>
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="c-email" placeholder="이메일 (선택)">
        </div>
        <div class="form-group">
          <label>전화번호</label>
          <input type="text" id="c-phone" placeholder="010-0000-0000 (선택)">
        </div>
      </div>
      <button class="btn-primary" onclick="submitCreate()">등록</button>
      <div id="create-msg" style="margin-top:12px; font-size:13px;"></div>
    </div>
  </div>

  <!-- SUPER_ADMIN 등록 탭 -->
  <div id="tab-super" style="display:none;">
    <div class="form-card" style="border:2px solid #c62828;">
      <h3 style="color:#c62828;">⚠ SUPER_ADMIN 등록</h3>
      <p style="font-size:13px; color:#888; margin-bottom:20px;">
        최상위 관리자는 모든 기능에 접근할 수 있습니다. 신중하게 등록해 주세요.
      </p>
      <div class="form-grid">
        <div class="form-group">
          <label>아이디 <span style="color:#e65100;">*</span></label>
          <input type="text" id="s-username" placeholder="영문/숫자 조합">
        </div>
        <div class="form-group">
          <label>비밀번호 <span style="color:#e65100;">*</span></label>
          <input type="password" id="s-password" placeholder="8자 이상">
        </div>
        <div class="form-group">
          <label>이름 <span style="color:#e65100;">*</span></label>
          <input type="text" id="s-name" placeholder="실명 입력">
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="s-email" placeholder="이메일 (선택)">
        </div>
      </div>
      <button class="btn-primary" style="background:#c62828;"
              onclick="submitSuperCreate()">SUPER_ADMIN 등록</button>
      <div id="super-msg" style="margin-top:12px; font-size:13px;"></div>
    </div>
  </div>

  <!-- 역할/상태 변경 모달 -->
  <div id="modal-overlay" style="display:none; position:fixed; inset:0;
       background:rgba(0,0,0,.4); z-index:100; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:28px;
                width:380px; box-shadow:0 8px 32px rgba(0,0,0,.18);">
      <h3 id="modal-title" style="font-size:16px; font-weight:700;
                                   color:#003087; margin-bottom:20px;"></h3>
      <div id="modal-body"></div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="closeModal()"
                style="flex:1; padding:11px; background:#f0f2f6; color:#333;
                       border:none; border-radius:8px; cursor:pointer;">취소</button>
        <button id="modal-confirm" onclick="confirmModal()"
                style="flex:1; padding:11px; background:#003087; color:#fff;
                       border:none; border-radius:8px; font-weight:600; cursor:pointer;">확인</button>
      </div>
    </div>
  </div>

</div>

<script>
// ── 상태 ─────────────────────────────────────────────────────────────
let modalMode   = '';
let modalTarget = null;

// ── 탭 전환 ──────────────────────────────────────────────────────────
function switchTab(tab, btn) {
    ['list','create','super'].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
    });
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'list') loadAdminList();
}

// ── API 헬퍼 ─────────────────────────────────────────────────────────
async function adminApi(method, url, body) {
    const opts = { method, credentials:'include',
                   headers:{'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res  = await fetch(url, opts);
    const json = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, json };
}

// ── 목록 조회 ─────────────────────────────────────────────────────────
async function loadAdminList() {
    const tbody = document.getElementById('admin-tbody');
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#999;">불러오는 중...</td></tr>`;

    const r = await adminApi('GET', '/api/admin/admins');
    if (!r.ok) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:red;">
            조회 실패: ${r.json?.message ?? '오류'}</td></tr>`;
        return;
    }

    const list = r.json.data ?? [];
    if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#999;">
            등록된 관리자가 없습니다.</td></tr>`;
        return;
    }

    tbody.innerHTML = list.map(a => `
        <tr>
            <td>${a.adminId}</td>
            <td><b>${a.username}</b></td>
            <td>${a.name}</td>
            <td>${roleBadge(a.roleCode, a.roleName)}</td>
            <td>${statusBadge(a.statusCode)}</td>
            <td style="font-size:12px; color:#888;">
                ${a.lastLoginAt ? a.lastLoginAt.substring(0,16) : '-'}
            </td>
            <td style="font-size:12px; color:#888;">
                ${a.createdAt ? a.createdAt.substring(0,10) : '-'}
            </td>
            <td>
                ${a.roleCode !== 'SUPER_ADMIN' ? `
                    <button class="btn-sm btn-role"
                            onclick="openRoleModal(${a.adminId}, '${a.roleCode}')">
                        역할변경
                    </button>
                    <button class="btn-sm btn-status"
                            onclick="openStatusModal(${a.adminId}, '${a.statusCode}')">
                        상태변경
                    </button>
                ` : '<span style="font-size:12px;color:#888;">보호됨</span>'}
            </td>
        </tr>
    `).join('');
}

function roleBadge(code, name) {
    const cls = code === 'SUPER_ADMIN' ? 'badge-super'
              : code === 'MANAGER'     ? 'badge-manager'
              : 'badge-operator';
    return `<span class="badge ${cls}">${name ?? code}</span>`;
}

function statusBadge(code) {
    const cls = code === 'ACTIVE'   ? 'status-active'
              : code === 'LOCKED'   ? 'status-locked'
              : 'status-inactive';
    const label = code === 'ACTIVE' ? '정상'
                : code === 'LOCKED' ? '잠김' : '비활성';
    return `<span class="${cls}">${label}</span>`;
}

// ── 관리자 등록 ───────────────────────────────────────────────────────
async function submitCreate() {
    const username = document.getElementById('c-username').value.trim();
    const password = document.getElementById('c-password').value;
    const name     = document.getElementById('c-name').value.trim();
    const roleCode = document.getElementById('c-role').value;
    const email    = document.getElementById('c-email').value.trim();
    const phone    = document.getElementById('c-phone').value.trim();
    const msg      = document.getElementById('create-msg');

    if (!username || !password || !name || !roleCode) {
        msg.style.color = '#e65100';
        msg.textContent = '필수 항목을 모두 입력해 주세요.';
        return;
    }
    if (password.length < 8) {
        msg.style.color = '#e65100';
        msg.textContent = '비밀번호는 8자 이상이어야 합니다.';
        return;
    }

    const r = await adminApi('POST', '/api/admin/admins', {
        username, password, name, roleCode,
        email: email || null,
        phone: phone || null
    });

    if (!r.ok) {
        msg.style.color = '#e65100';
        msg.textContent = '등록 실패: ' + (r.json?.detail ?? r.json?.message ?? '오류');
        return;
    }

    msg.style.color = '#2e7d32';
    msg.textContent = `✅ ${name} 관리자가 등록되었습니다.`;
    ['c-username','c-password','c-name','c-email','c-phone'].forEach(id => {
        document.getElementById(id).value = '';
    });
    document.getElementById('c-role').value = '';
}

// ── SUPER_ADMIN 등록 ──────────────────────────────────────────────────
async function submitSuperCreate() {
    const username = document.getElementById('s-username').value.trim();
    const password = document.getElementById('s-password').value;
    const name     = document.getElementById('s-name').value.trim();
    const email    = document.getElementById('s-email').value.trim();
    const msg      = document.getElementById('super-msg');

    if (!username || !password || !name) {
        msg.style.color = '#e65100';
        msg.textContent = '필수 항목을 모두 입력해 주세요.';
        return;
    }
    if (password.length < 8) {
        msg.style.color = '#e65100';
        msg.textContent = '비밀번호는 8자 이상이어야 합니다.';
        return;
    }
    if (!confirm('SUPER_ADMIN을 등록하시겠습니까? 모든 기능에 접근할 수 있습니다.')) return;

    const r = await adminApi('POST', '/api/admin/admins/super', {
        username, password, name, roleCode: 'SUPER_ADMIN',
        email: email || null
    });

    if (!r.ok) {
        msg.style.color = '#e65100';
        msg.textContent = '등록 실패: ' + (r.json?.detail ?? r.json?.message ?? '오류');
        return;
    }

    msg.style.color = '#2e7d32';
    msg.textContent = `✅ SUPER_ADMIN [${name}] 등록 완료!`;
    ['s-username','s-password','s-name','s-email'].forEach(id => {
        document.getElementById(id).value = '';
    });
}

// ── 역할 변경 모달 ────────────────────────────────────────────────────
function openRoleModal(adminId, currentRole) {
    modalMode   = 'role';
    modalTarget = adminId;
    document.getElementById('modal-title').textContent = '역할 변경';
    document.getElementById('modal-body').innerHTML = `
        <select id="modal-role" style="width:100%; padding:10px; border:1px solid #dde3ef;
                border-radius:8px; font-size:14px;">
            <option value="MANAGER"  ${currentRole==='MANAGER' ?'selected':''}>MANAGER (중간 관리자)</option>
            <option value="OPERATOR" ${currentRole==='OPERATOR'?'selected':''}>OPERATOR (하위 운영자)</option>
        </select>`;
    showModal();
}

// ── 상태 변경 모달 ────────────────────────────────────────────────────
function openStatusModal(adminId, currentStatus) {
    modalMode   = 'status';
    modalTarget = adminId;
    document.getElementById('modal-title').textContent = '상태 변경';
    document.getElementById('modal-body').innerHTML = `
        <select id="modal-status" style="width:100%; padding:10px; border:1px solid #dde3ef;
                border-radius:8px; font-size:14px;">
            <option value="ACTIVE"   ${currentStatus==='ACTIVE'  ?'selected':''}>정상 (ACTIVE)</option>
            <option value="INACTIVE" ${currentStatus==='INACTIVE'?'selected':''}>비활성 (INACTIVE)</option>
            <option value="LOCKED"   ${currentStatus==='LOCKED'  ?'selected':''}>잠김 (LOCKED)</option>
        </select>`;
    showModal();
}

function showModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    modalMode = ''; modalTarget = null;
}

async function confirmModal() {
    if (modalMode === 'role') {
        const roleCode = document.getElementById('modal-role').value;
        const r = await adminApi('PUT', `/api/admin/admins/${modalTarget}/role`, { roleCode });
        if (!r.ok) { alert('변경 실패: ' + (r.json?.detail ?? '오류')); return; }
        alert('역할이 변경되었습니다.');
    } else if (modalMode === 'status') {
        const statusCode = document.getElementById('modal-status').value;
        const r = await adminApi('PATCH', `/api/admin/admins/${modalTarget}/status`, { statusCode });
        if (!r.ok) { alert('변경 실패: ' + (r.json?.detail ?? '오류')); return; }
        alert('상태가 변경되었습니다.');
    }
    closeModal();
    loadAdminList();
}

// ── 초기 로드 ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => loadAdminList());

//── 정렬 상태 ─────────────────────────────────────────────
let sortRoleAsc = true;
let adminListCache = [];

// loadAdminList 함수에서 목록 캐싱 추가
// tbody.innerHTML = list.map(...) 윗줄에 추가
adminListCache = list;

// 역할 정렬 함수
function sortByRole() {
    sortRoleAsc = !sortRoleAsc;
    document.getElementById('sort-role-icon').textContent =
        sortRoleAsc ? '▲' : '▼';

    const roleOrder = { 'SUPER_ADMIN': 1, 'MANAGER': 2, 'OPERATOR': 3 };
    const sorted = [...adminListCache].sort((a, b) => {
        const ra = roleOrder[a.roleCode] ?? 9;
        const rb = roleOrder[b.roleCode] ?? 9;
        return sortRoleAsc ? ra - rb : rb - ra;
    });

    const tbody = document.getElementById('admin-tbody');
    tbody.innerHTML = sorted.map(a => `
        <tr>
            <td>${a.adminId}</td>
            <td><b>${a.username}</b></td>
            <td>${a.name}</td>
            <td>${roleBadge(a.roleCode, a.roleName)}</td>
            <td>${statusBadge(a.statusCode)}</td>
            <td style="font-size:12px;color:#888;">
                ${a.lastLoginAt ? a.lastLoginAt.substring(0,16) : '-'}
            </td>
            <td style="font-size:12px;color:#888;">
                ${a.createdAt ? a.createdAt.substring(0,10) : '-'}
            </td>
            <td>
                ${a.roleCode !== 'SUPER_ADMIN' ? `
                    <button class="btn-sm btn-role"
                            onclick="openRoleModal(${a.adminId}, '${a.roleCode}')">
                        역할변경
                    </button>
                    <button class="btn-sm btn-status"
                            onclick="openStatusModal(${a.adminId}, '${a.statusCode}')">
                        상태변경
                    </button>
                ` : '<span style="font-size:12px;color:#888;">보호됨</span>'}
            </td>
        </tr>
    `).join('');
}


</script>



<script src="/js/utils.js"></script>
<script src="/js/header.js"></script>
</body>
</html>
