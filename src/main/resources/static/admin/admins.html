<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 계정 관리 | BNK 관리자</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
  <link rel="stylesheet" href="/css/admin-nav.css">
  <link rel="stylesheet" href="/css/admin-common.css">
</head>
<body>

<div id="app-header"></div>

<div class="wrap wrap--narrow">
  <div class="page-title">관리자 계정 관리</div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('list',   this)">관리자 목록</button>
    <button class="tab-btn"        onclick="switchTab('create', this)">관리자 등록</button>
    <button class="tab-btn"        onclick="switchTab('super',  this)">SUPER_ADMIN 등록</button>
  </div>

  <!-- ── 목록 탭 ── -->
  <div id="tab-list">
    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>아이디</th>
          <th>이름</th>
          <th data-sortable onclick="sortByRole()">
            역할 <span id="sort-role-icon">▲</span>
          </th>
          <th>상태</th>
          <th>최근 로그인</th>
          <th>등록일</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="admin-tbody">
        <tr class="empty-row"><td colspan="8">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ── 관리자 등록 탭 (MANAGER / OPERATOR) ── -->
  <div id="tab-create" hidden="hidden">
    <div class="form-card">
      <h3>새 관리자 등록 (MANAGER / OPERATOR)</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>아이디 <span class="required">*</span></label>
          <input type="text" id="c-username" placeholder="로그인 아이디">
        </div>
        <div class="form-group">
          <label>이름 <span class="required">*</span></label>
          <input type="text" id="c-name" placeholder="실명">
        </div>
        <div class="form-group">
          <label>비밀번호 <span class="required">*</span></label>
          <input type="password" id="c-password" placeholder="초기 비밀번호">
        </div>
        <div class="form-group">
          <label>역할 <span class="required">*</span></label>
          <select id="c-role">
            <option value="">선택</option>
            <option value="MANAGER">MANAGER</option>
            <option value="OPERATOR">OPERATOR</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" onclick="createAdmin()">등록</button>
    </div>
  </div>

  <!-- ── SUPER_ADMIN 등록 탭 ── -->
  <div id="tab-super" hidden="hidden">
    <div class="form-card">
      <h3>SUPER_ADMIN 등록</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>아이디 <span class="required">*</span></label>
          <input type="text" id="s-username" placeholder="로그인 아이디">
        </div>
        <div class="form-group">
          <label>이름 <span class="required">*</span></label>
          <input type="text" id="s-name" placeholder="실명">
        </div>
        <div class="form-group">
          <label>비밀번호 <span class="required">*</span></label>
          <input type="password" id="s-password" placeholder="초기 비밀번호">
        </div>
        <div class="form-group">
          <label>등록 비밀키 <span class="required">*</span></label>
          <input type="password" id="s-secret" placeholder="관리자 발급 키">
        </div>
      </div>
      <button class="btn-primary" onclick="createSuperAdmin()">등록</button>
    </div>
  </div>
</div>

<!-- ── 역할/상태 변경 모달 ── -->
<div id="modal-overlay" class="modal-overlay" hidden="hidden">
  <div class="modal-box">
    <h3 class="modal-title" id="modal-title">변경</h3>

    <div id="modal-role-group" class="form-group" hidden="hidden">
      <label>변경할 역할</label>
      <select id="modal-role">
        <option value="MANAGER">MANAGER</option>
        <option value="OPERATOR">OPERATOR</option>
      </select>
    </div>

    <div id="modal-status-group" class="form-group" hidden="hidden">
      <label>변경할 상태</label>
      <select id="modal-status">
        <option value="ACTIVE">정상 (ACTIVE)</option>
        <option value="INACTIVE">비활성 (INACTIVE)</option>
        <option value="LOCKED">잠금 (LOCKED)</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn-primary" onclick="submitModal()">확인</button>
      <button class="btn-sm btn-status" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/header.js"></script>
<script src="/js/admin-admins.js"></script>
</body>
</html>
