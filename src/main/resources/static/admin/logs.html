<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그 조회 | BNK 관리자</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
  <link rel="stylesheet" href="/css/admin-nav.css">
  <link rel="stylesheet" href="/css/admin-common.css">
</head>
<body>

<div id="app-header"></div>

<div class="wrap">
  <div class="page-title">
    로그 조회
    <a href="/admin/dashboard.html">← 대시보드로</a>
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('admin', this)">관리자 활동 로그</button>
    <button class="tab-btn"        onclick="switchTab('audit', this)">감사 로그 (로그인/보안)</button>
    <button class="tab-btn"        onclick="switchTab('user',  this)">회원 활동 로그</button>
  </div>

  <!-- 필터 -->
  <div class="filter-card">
    <div class="filter-row" id="filter-row">
      <!-- JS에서 탭별로 동적 렌더링 -->
    </div>
  </div>

  <!-- 테이블 -->
  <div class="table-card">
    <div class="table-header">
      <h3 id="table-title">관리자 활동 로그</h3>
      <span id="table-count">총 0건</span>
    </div>
    <table class="data-table">
      <thead id="table-head"></thead>
      <tbody id="table-body">
        <tr class="empty-row"><td colspan="7">불러오는 중...</td></tr>
      </tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/header.js"></script>
<script src="/js/admin-logs.js"></script>
</body>
</html>
