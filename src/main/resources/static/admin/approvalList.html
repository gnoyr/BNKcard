<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결재 목록 | BNK 관리자</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/teal-theme.css">
</head>
<body>

<div id="app-header"></div>

<h2>결재 목록</h2>
<p>
  <a href="cardManage.html">[카드 목록]</a>
  &nbsp;|&nbsp;
  <a href="requestApproval.html">[결재 처리]</a>
</p>

<label>상태:
  <select id="statusFilter" onchange="loadApprovals(0)">
    <option value="">전체</option>
    <option value="PENDING">PENDING (대기)</option>
    <option value="APPROVED">APPROVED (승인)</option>
    <option value="REJECTED">REJECTED (반려)</option>
  </select>
</label>
&nbsp;
<label>유형:
  <select id="typeFilter" onchange="loadApprovals(0)">
    <option value="">전체</option>
    <option value="CARD_PUBLISH">카드 등록</option>
    <option value="CARD_UPDATE">카드 수정</option>
    <option value="TERMS_PUBLISH">약관 등록</option>
  </select>
</label>

<br><br>

<span id="totalCount">-</span>건

<table border="1" cellpadding="6" cellspacing="0" style="margin-top:8px; width:100%;">
  <thead>
    <tr>
      <th>결재ID</th>
      <th>유형</th>
      <th>카드명 / 약관명</th>
      <th>요청자</th>
      <th>상태</th>
      <th>요청일시</th>
      <th>결재라인 현황</th>
      <th>처리</th>
    </tr>
  </thead>
  <tbody id="approvalTbody">
    <tr><td colspan="8">로딩 중...</td></tr>
  </tbody>
</table>

<div id="pagination" style="margin-top:10px;"></div>
<div id="msg"></div>

<script>
  let currentPage = 0;
  const PAGE_SIZE = 20;

  async function loadApprovals(page = 0) {
    currentPage = page;
    const status = document.getElementById('statusFilter').value;
    const type   = document.getElementById('typeFilter').value;

    let url = `/api/admin/approvals?page=${page}&size=${PAGE_SIZE}`;
    if (status) url += '&statusCode=' + status;
    if (type)   url += '&requestTypeCode=' + type;

    const res = await fetch(url, { credentials: 'include' });
    if (res.status === 401) { location.href = '/auth/admin-login.html'; return; }
    const data = await res.json().catch(() => null);
    const tbody = document.getElementById('approvalTbody');

    if (!res.ok || !data?.data) {
      tbody.innerHTML = '<tr><td colspan="8">조회 실패</td></tr>';
      return;
    }

    const { content, totalCount } = data.data;
    document.getElementById('totalCount').textContent = totalCount ?? 0;

    if (!content || content.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8">할당된 결재 건이 없습니다.</td></tr>';
      renderPagination(0);
      return;
    }

    tbody.innerHTML = content.map(a => {
      const lineSummary = a.lines?.length
        ? a.lines.map(l => {
            const color = l.statusCode === 'APPROVED' ? 'green' : l.statusCode === 'REJECTED' ? 'red' : 'orange';
            return `<span style="color:${color}">[${l.approvalOrder}]${l.approverName ?? '?'}</span>`;
          }).join(' → ')
        : '-';

      const statusColor = a.statusCode === 'PENDING' ? 'orange' : a.statusCode === 'APPROVED' ? 'green' : 'red';
      const typeLabel = { CARD_PUBLISH: '카드 등록', CARD_UPDATE: '카드 수정', TERMS_PUBLISH: '약관 등록' }[a.requestTypeCode] ?? a.requestTypeCode;

      return `
        <tr>
          <td>${a.approvalId}</td>
          <td>${typeLabel}</td>
          <td>${a.targetName ?? '-'}</td>
          <td>${a.requesterName ?? '-'}</td>
          <td><b style="color:${statusColor}">${a.statusCode}</b></td>
          <td>${a.requestedAt ? a.requestedAt.substring(0,16) : '-'}</td>
          <td style="font-size:12px">${lineSummary}</td>
          <td><a href="approvalDetail.html?approvalId=${a.approvalId}">${a.statusCode === 'PENDING' ? '▶ 처리' : '상세'}</a></td>
        </tr>`;
    }).join('');

    renderPagination(totalCount);
  }

  function renderPagination(totalCount) {
    const totalPages = Math.ceil(totalCount / PAGE_SIZE);
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    const startPage = Math.max(0, currentPage - 2);
    const endPage   = Math.min(totalPages - 1, startPage + 4);
    let html = `<button onclick="loadApprovals(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>이전</button> `;
    for (let i = startPage; i <= endPage; i++) {
      html += `<button onclick="loadApprovals(${i})" ${i === currentPage ? 'disabled style="font-weight:bold"' : ''}>${i + 1}</button> `;
    }
    html += `<button onclick="loadApprovals(${currentPage + 1})" ${currentPage === totalPages - 1 ? 'disabled' : ''}>다음</button>`;
    el.innerHTML = html;
  }

  loadApprovals();
</script>

<script src="/js/header.js"></script>
</body>
</html>
