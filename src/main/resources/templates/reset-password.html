<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 — BNKcard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono&display=swap');

    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3250; --accent: #4f8ef7; --accent-dim: rgba(79,142,247,0.12);
      --success: #3dd68c; --error: #f76f6f;
      --text: #e2e8f0; --text-dim: #7a85a3;
      --sans: 'IBM Plex Sans KR', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
    }

    .logo {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
      font-family: var(--mono);
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text-dim); opacity: 0.5; }

    .hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 5px;
      font-family: var(--mono);
    }

    /* 비밀번호 강도 바 */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 7px;
    }
    .strength-seg {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.2s;
    }
    .strength-seg.weak   { background: var(--error); }
    .strength-seg.medium { background: var(--accent); }
    .strength-seg.strong { background: var(--success); }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover   { opacity: 0.88; }
    .btn:active  { opacity: 0.75; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* 상태 메시지 */
    .msg {
      display: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 16px;
    }
    .msg.ok  { display: block; background: rgba(61,214,140,0.1);  color: var(--success); border: 1px solid rgba(61,214,140,0.25); }
    .msg.err { display: block; background: rgba(247,111,111,0.1); color: var(--error);   border: 1px solid rgba(247,111,111,0.25); }

    /* 토큰 만료/없음 상태 */
    .invalid-token {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .invalid-token .icon { font-size: 40px; margin-bottom: 14px; opacity: 0.6; }
    .invalid-token p { font-size: 14px; color: var(--text-dim); line-height: 1.7; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }

    /* 완료 상태 */
    .done-state {
      display: none;
      text-align: center;
      padding: 10px 0;
    }
    .done-state .icon { font-size: 48px; margin-bottom: 16px; }
    .done-state h2 { font-size: 18px; margin-bottom: 8px; }
    .done-state p  { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }
    .done-state .counter {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">BNKcard</div>

  <!-- 유효하지 않은 토큰 -->
  <div class="invalid-token" id="invalidState">
    <div class="icon">🔒</div>
    <p>비밀번호 재설정 링크가<br>만료되었거나 올바르지 않습니다.</p>
    <a href="/" class="back-link" style="margin-top:20px;display:inline-block;">← 처음으로 돌아가기</a>
  </div>

  <!-- 재설정 폼 -->
  <div id="formState">
    <h1>비밀번호 재설정</h1>
    <p class="subtitle">새로운 비밀번호를 입력하세요.<br>재설정 후 기존 로그인 세션은 모두 만료됩니다.</p>

    <div class="field">
      <label>새 비밀번호</label>
      <input id="pw" type="password" placeholder="영문 + 숫자 + 특수문자 8자 이상"
             oninput="checkStrength(this.value)">
      <div class="strength-bar">
        <div class="strength-seg" id="seg1"></div>
        <div class="strength-seg" id="seg2"></div>
        <div class="strength-seg" id="seg3"></div>
        <div class="strength-seg" id="seg4"></div>
      </div>
      <div class="hint" id="strength-label"></div>
    </div>

    <div class="field">
      <label>비밀번호 확인</label>
      <input id="pw2" type="password" placeholder="비밀번호를 다시 입력하세요"
             oninput="checkMatch()">
      <div class="hint" id="match-hint"></div>
    </div>

    <button class="btn" id="submit-btn" onclick="submit()" disabled>비밀번호 변경</button>

    <div class="msg" id="msg"></div>
    <a href="/" class="back-link">← 로그인으로 돌아가기</a>
  </div>

  <!-- 완료 상태 -->
  <div class="done-state" id="doneState">
    <div class="icon">✅</div>
    <h2>비밀번호가 변경되었습니다</h2>
    <p>새 비밀번호로 다시 로그인하세요.<br>기존 세션은 모두 만료되었습니다.</p>
    <div class="counter" id="redirect-counter">3초 후 로그인 페이지로 이동합니다...</div>
  </div>
</div>

<script>
  const BASE = 'http://localhost:8080';

  // URL에서 token 추출
  const token = new URLSearchParams(location.search).get('token');

  if (!token) {
    document.getElementById('formState').style.display = 'none';
    document.getElementById('invalidState').style.display = 'block';
  }

  /* ── 비밀번호 강도 체크 ── */
  const PW_RE = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,50}$/;

  function checkStrength(val) {
    const segs = [1,2,3,4].map(i => document.getElementById('seg' + i));
    const label = document.getElementById('strength-label');
    segs.forEach(s => s.className = 'strength-seg');

    let score = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val)) score++;
    if (/\d/.test(val))    score++;
    if (/[@$!%*#?&]/.test(val)) score++;

    const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
    const txt = score <= 1 ? '약함' : score <= 2 ? '보통' : score === 3 ? '양호' : '강함';
    for (let i = 0; i < score; i++) segs[i].classList.add(cls);
    label.textContent = val ? `강도: ${txt}` : '';
    checkMatch();
    toggleBtn();
  }

  function checkMatch() {
    const v1 = document.getElementById('pw').value;
    const v2 = document.getElementById('pw2').value;
    const hint = document.getElementById('match-hint');
    if (!v2) { hint.textContent = ''; return; }
    if (v1 === v2) {
      hint.style.color = 'var(--success)';
      hint.textContent = '✓ 일치합니다';
    } else {
      hint.style.color = 'var(--error)';
      hint.textContent = '✗ 비밀번호가 일치하지 않습니다';
    }
    toggleBtn();
  }

  function toggleBtn() {
    const pw  = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    const ok  = PW_RE.test(pw) && pw === pw2;
    document.getElementById('submit-btn').disabled = !ok;
  }

  /* ── 제출 ── */
  async function submit() {
    const pw  = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('msg');

    btn.disabled = true;
    btn.textContent = '변경 중...';
    msg.className = 'msg';

    try {
      const res = await fetch(`${BASE}/api/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: pw, newPasswordConfirm: pw2 })
      });
      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        document.getElementById('formState').style.display = 'none';
        document.getElementById('doneState').style.display = 'block';
        startRedirect();
      } else {
        const errMsg = data?.message || '오류가 발생했습니다. 링크가 만료되었을 수 있습니다.';
        msg.className = 'msg err';
        msg.textContent = errMsg;
        btn.disabled = false;
        btn.textContent = '비밀번호 변경';
      }
    } catch (e) {
      msg.className = 'msg err';
      msg.textContent = '서버에 연결할 수 없습니다.';
      btn.disabled = false;
      btn.textContent = '비밀번호 변경';
    }
  }

  /* ── 완료 후 리다이렉트 카운트다운 ── */
  function startRedirect() {
    let count = 3;
    const el = document.getElementById('redirect-counter');
    const t = setInterval(() => {
      count--;
      el.textContent = `${count}초 후 로그인 페이지로 이동합니다...`;
      if (count <= 0) {
        clearInterval(t);
        location.href = '/';
      }
    }, 1000);
  }
</script>
</body>
</html>
